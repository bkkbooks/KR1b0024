body:
  text: 尚書詳解卷十三宋胡士行撰文侯之命第三十周書此篇作於東遷之初以上為成康為文武以下為春秋為戰國乃消長升降之交會也文侯之命權猶自天子出夫子猶有望焉故序之書委靡至魯隱公初平王在位且五十年竟以不振夫子且絶望矣此平王所以為書之終而春秋之始也平王錫晉文侯名仇秬鬯圭瓉以圭為杓此周公二卣之錫也作文侯之命幽王娶襃姒生伯服廢申后及太子冝臼申侯與犬戎攻弑幽王晉文侯鄭武公立宜臼是為平王平王無枕戈復讎之志顧以文侯之立己自足而以成王錫周公之禮錫之夫子之序蓋貶之且傷之也文侯之命王若曰父不曰伯父叔父而曰父尊之也義和不名而字之丕顯文武克愼明德昭升于上天敷聞在下民惟時上帝集厥命于文王亦惟先正臣克左右昭事厥辟君越小大謀猷罔不率從民皆恱服肆先祖成康以降懷安在位文武之精誠平王何足以知之然老師宿儒之傳未泯猶能舉其語也降是則異端起而言帝王者始支矣嗚呼閔傷予小子嗣繼造遭天丕愆過則稱已不咎幽王此周家忠厚之遺也殄盡絶資用澤恩于下民侵犬戎侵伐戎傷我國家純大即我御事皆新進罔或耆老壽俊在厥服位予則罔克興衰撥亂曰所望曰惟祖惟父同姓諸侯之尊老其庶伊此恤憂念朕躬嗚呼有績予一人永綏安在位父義和汝克昭乃顯祖唐叔汝肈刑法文武用會合紹繼乃辟君追孝于前文人文德之人汝多功多修治扞衞我于艱若汝予嘉文侯未必能踐此言也平王不自意得之視之為多也燕昭小國慨然復讎而士爭趨燕惜平王之無志也王曰父義和其歸晉視爾師衆寧爾邦國用賚予爾秬鬯一卣彤赤弓一彤矢百盧黒弓一盧矢百諸侯賜弓矢得征伐馬四匹父往哉柔逺能邇惠康小民無荒寧簡簡核恤憂爾都國都用成爾顯德嗚呼周之終於東周於此章見之大讎未報王略未復正君臣卧薪嘗膽之時奔亡之餘僅得苟安釋然遽自以為足曰歸視爾師寧爾邦恤爾都兵已罷矣王室無復事矣嗚呼周轍其不復西矣夫費誓第三十一周書周之東王道不可復得如伯禽之治兵穆公之悔過則可以庶幾於王道故升二書以補之魯侯伯禽初封宅都曲阜徐夷三監及淮夷叛並興東郊東門外不開閉城作費誓禹之家學見於甘誓周公之家學見於費誓伯禽初就封驟當徐夷之變一旦誓師曲折詳盡若老於行陳者蓋聖賢之學本末並舉而無遺故也費誓公曰嗟人無譁喧聽命徂往兹者淮浦夷徐州戎並興侵東郊善􅙀簡乃甲胄兜鍪敿施紛乃干楯無敢不弔極至備乃弓矢鍛鍊乃戈矛礪磨乃鋒刃無敢不善夷戎意伯禽之未更事也而伯禽所以應之者整暇如此今惟淫大舎放牧牿平日閑牢所牿牛馬于費地杜塞乃擭張獸機檻敜乃穽陷獸坑無敢傷損牿牛馬牿之傷汝則有常刑戎備修則師出此以除道路也馬牛其風遇風瞀亂奔逸城濮之役晉中軍風於澤亡大斾之左旃臣妾逋逃潰散此行師之變不可不預戒勿敢越亂部伍逐追祗復歸之我商議賚賞汝乃越逐不復汝則有常刑無敢寇羣行攻劫攘物至而取踰垣墻竊潛入盜物馬牛誘以言調人臣妾汝則有常刑此以嚴部伍也甲戌我惟征徐戎峙具乃糗乾糧無敢不逮及汝則有大刑此出師之期會也魯人三郊國外三遂郊外孔云東郊不開其地被兵故不便峙乃楨築所立兩木榦兩邊障土版甲戌我惟築無敢不供汝則有同坐無餘遺免刑非不至殺甲戌出師同日而築且攻且守戎不得撓城築也魯人三郊三遂峙乃芻茭餉屬無敢不多汝則有大刑其臨事而懼嚴密如此豈宋襄陳餘之所謂仁義乎秦誓第三十二周書帝王之澤至文侯之命竭矣受以費誓以故國之法制猶可因也受以秦誓以禮義之在人心猶可復也充穆公之心因伯禽之法馴致帝王何逺之有觀書之終而後知帝王之道初無所終也秦穆公伐鄭晉襄公帥師敗諸崤還歸作秦誓事詳見左傳僖三十年襲鄭書伐發其謀也滅滑書鄭誅其心也晉敗諸殽乗人之隙人亦乗之出乎爾反乎爾也還歸作誓傷於外者反於家動心忍性將以進於帝王之治者此其階也始終予奪立義之精春秋之筆乎秦誓公曰嗟我士聽無譁予誓告汝羣衆言之首總要古人有言曰民訖盡自若順是理多盤樂責人斯則無難惟受責人責俾如流易是惟艱哉我心之憂日月逾過邁往若弗云來鄭之伐不若是也蹇叔之怒責人不受責也公今而後悔之矣汲汲然改圖之懼日月之不我與也惟古執古義之謀人謂蹇叔則曰未就成予我所欲忌惡惟今之謀人百里孟明西乞術白乙丙杞子楊孫逢孫姑且將以為親雖則云然如前之過尚庶猷詢問兹黄髮老成則罔所愆過此覺昨非而圖今是也番番武勇良善士旅精力旣愆過也謂老成人我尚庶有之仡仡壯勇勇夫射御不違謂新進前所侉過門超乗者也我尚不欲喜惟截截察善諞巧佞言俾使君子易辭為所昡惑改易其說不得自伸我皇大多有之謂杞子等昧昧暗昧我思心思之暗故受欺之如有一介耿介臣斷斷專慤猗兮無他技藝能小智者大受之賊無他技則賊之者寡矣其心休休焉廣大其如如是有容吕云其如者莫測其量難形容也人見人之有技若如己有之人之彦美聖通其心眞心好愛之不啻止如自其己口出口所稱冇限心之好無窮是能眞能容容人之善之以用保安我子孫黎民亦職主有利興邦哉此人如天涵地育無所不包所謂好善優於天下況秦國乎一云不啻如自己口所出言視人之善猶於己之善也人之有技冒蔽疾害以惡之人之彦聖而違背塞之俾使不不得達上達是不能容以不能保我子孫黎民亦曰殆危哉穆公前日之怒蹇叔甚不能容幾於亡矣殽之敗其殆矣乎今而後知悔之也邦之杌隉危殆不安曰由從一人不能容邦之榮華懷安亦尚庶一人一介臣能容之慶此以總結前說也吕云安危皆由我一人所任公所以責己也穆公之悔過善矣何為而有拜賜焚舟之師哉知之非難行之惟艱然實其言則可為湯武也故夫子取之尚書詳解卷十三
