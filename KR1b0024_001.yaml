body:
  text: 尚書詳解卷一宋胡士行撰堯典第一虞書堯典唐書左傳引勸之以九歌曰夏書而皆繫之虞堯授舜舜授禹三聖授受一道也正義以堯典為虞史追書昔在帝堯唐帝名聦聽無不聞明視無不見文經緯天地思心無不通光徳盛輝光宅如宅覆冐天下將遜遁于位讓于虞舜老仗舜攝遂禪之作堯典史臣作堯典一書以紀之此孔子序述一篇之大旨也績用弗成以前光宅天下之實事咨岳巽位以後將遜於位之實吕云聦明先知先覺也文聦明之散見於外者也思聦明之緼蓄於内者也光輝方在天下一旦遜位視天下如敝屣所過之化如此堯典此史臣舊題篇目後篇皆然曰史臣曰若順稽考古帝堯孔云能順考古道而行者帝堯吕云若稽史臣之辭謂我順考於古得堯之為君曰亦史臣言放放法學勲功孔云言堯放上世功化吕云勲者天地萬物之成理堯依放之而已此有天下而不與之意夏云堯功勲放于四海欽明文思安安孔云以四徳安天下之當安者吕云序言聦明指其生知全徳之自然也書言欽明指其作聖終始之工夫也欽之一字堯所以作聖也欽則聦在其中矣去聰言明聰明不可分也堯自安其安與天下共安其安於止知其所止也允信恭敬克能讓光被葢覆四海表外格感至于上天下地允克者恭讓之至出於誠實非外飾也故四方上下皆在堯恭讓中光輝無不被也所謂孝悌之至通于神明光于四海堯舜之道孝弟而已克明明其俊美徳孔云能明俊徳之士而用之一説人皆有此徳惟堯能明之大學曰在明明徳明徳本性之明也在明明之也以親九族九族既睦平均齊調一章明也使之通達無壅蔽百姓百官族姓受氏王畿之民百姓昭明協合和萬邦國黎衆民於美變化時一世雍和明徳修身也親九族齊家也章百姓治國也和萬邦平天下也既睦昭明時雍所謂綏斯來動斯和也以親平章協和用功處也睦明見功處也吕用孔説曰明徳在親族之先何也中庸曰尊賢也親親也伊川謂尊賢在親親之先所以講明齊家治國平天下之道也前言光明之散見也此言明光之藴蓄也明性之覺也克明己之覺也昭人亦覺也孔云九族高祖小功三月曽祖大功九月祖期父衰年三已子孫期曽孫大功𤣥孫小功夏侯説九族堯典父族四五屬之内父之女昆弟適人者及其子已之女昆弟適人者及其子已之女子適人者及其子母族三母之父姓母之母姓母之女昆弟適人者及其子妻族二妻之父姓妻之母姓乃命職在羲和而命在堯無為之中有為者存羲和顓帝命南正重司天以屬神北正黎司地以屬民羲和重黎之後世掌天地四時之官欽若昊元氣廣大天厯書也洪範厯數是也象器也舜典璿璣玉衡是也日月星四方中星辰日月所㑹十二辰敬授人時分至啓閉之時此堯命官之序也羲和大臣也故最先焉下將分命申命必先總命之者分之中有合欲其同此欽敬之心也欽之一字堯心法也欽若於厯象之先先天而天不違也敬授於厯象之後後天而奉天時也厯象不特治天而已宅天下被四表悉不外此葢堯時天人未離帝道之大非治天之外别有治人之理也觀分命之辭若民若物洪纎巨細無不得宜堯之功與天一厯象之法所以與天為徒也羲和始以氏居官後因以名官猶伶氏掌樂後遂以樂官為伶官也五行生數木生火生土生金生水克數木克土克水克火克金洪範數水火木金土四時春木夏火四季土秋金冬水四徳元亨利貞四方東左南前中央西右北後五帝太皡炎帝黄帝少皡顓頊五岳岱東衡南嵩中華西恒北五聲角徴宫商羽五色青赤黄白黒五味酸苦甘辛鹹五常仁禮信義智五臟肝心脾肺腎五事貌視思言聽十干甲乙丙丁戊巳庚辛壬癸十二支寅夘辰巳午未申酉戌亥子丑二十八宿東角亢氐房心尾箕北斗牛女虚危室壁西奎婁胃昴畢觜參南井鬼栁星張翼軫八卦震東巽東南離南坤西南兊西乾西北坎北艮東北析木竒律太蔟三陽寅正立春初氣雨水大火耦吕夾鍾四陽卯二驚蟄春分壽星竒律姑洗五陽辰三清明穀雨鶉尾耦吕中吕六陽巳四立夏小滿鶉火竒律蕤賔一隂午五芒種夏至鶉首耦吕林鍾二隂未六小暑大暑實沈竒律夷則三隂申七立秋處暑大梁耦吕南吕四隂酉八白露秋分降婁竒律無射五隂戌九寒露霜降娵訾耦吕應鍾六隂亥十立冬小雪𤣥枵竒律黄鍾一陽子十一大雪冬至星紀耦吕大吕二陽丑十二小寒大寒析木至星紀為十二辰大蔟至大吕為十二律吕寅至丑為十二支立春至大寒為二十四氣八節分春分秋分至夏至冬至啓立春立夏閉立秋立冬日中晝五十刻夜五十刻日永晝六十刻夜四十刻宵中晝五十刻夜五十刻日短晝四十刻夜六十刻分命羲仲治東方之官宅奠也定也居也嵎夷東表地曰名𤾉谷日出𤾉明之地據地而言曰嵎夷據日出而言曰𤾉谷寅敬賔迎出日日日出也平均秩序東春作萬物皆作孔云耕作日中春分日與夜中星鳥朱鳥七星昬見南以殷定仲春舉仲以推孟季厥民析丁壯分析就田鳥兩翼獸四足孳乳化尾尾交申命羲叔治南方宅南極南交交趾地孔云春與夏交相見乎離隂陽之交也平秩南夏訛萬物皆化敬致周禮馮相氏冬夏致日致言夏則冬可推致日月星辰之運以騐時氣早晚故一説南方為候中星所在皆敬致而三方可見日永夏至日長夜短星火蒼龍中星舉中則七星可推以正猶殷也仲夏厥民因因春事鳥獸希少革改分命和仲治西方宅西極西曰昧谷日入昧冥之地寅餞送納日昬日入也平秩西秋成萬物皆成宵中星虚𤣥武中星以殷仲秋厥民夷禾稼將穫心力平夷鳥獸毛毨更生整理申命和叔治北方宅朔極北方曰幽暗都聚平在察朔北謂之朔朔初也北終其隂而後始其陽易冬而春萬物皆交易終而復始此天地生生不窮之道尤當加察日短冬至日短夜長星昴白虎中星以正仲冬厥民隩暖也入此室處鳥獸氄細毛夏云此為作厯也作厯之法必先準定四面方隅以表識然後地中可求即地中然後知日月之出没星辰之轉運宅定也非居其地也故暘谷南交昧谷幽都者定方隅也出日納日者驗昬旦也作東訛南成西易北者測時氣也日中永短者齊晷刻也鳥火虚昴者候中星也然後以殷以正而四時之中氣二分二至可定猶未也又以析因夷隩而驗之民事焉以孶革毨氄而驗之物𩔖焉則堯之作厯仰觀俯察可謂不苟也已吕云賔導以隨從之謂所謂日出而作也餞納日者日入而息也厥民而繼以鳥獸者聖人一視同仁先民及物參賛之妙如舜之若上下禹之咸若周之澤虞山虞也帝曰咨汝羲暨及和朞周匝四時三百有六旬有六日以閠月定四時成嵗允信釐治百工官庶績功咸皆熈廣此起閏法也周天三百六十五度四分度之一日一周天為一嵗月一周天為一月月行速一日行十三度有竒二十九日半強一周天大約五十九日強而兩周天兩箇月六十日期餘一日矣一年十二箇月則餘六日矣故一年置月小盡者六而後晦月盡朔初一弦初七上弦二十三下弦望月半不差日行遲一日行一度近三百六十六日一周天一年十二月三百六十日已少六日六小盡月又少六日三年少三十六日五年少六十日故三年一閏五年再閏十九年七閏為一章二十七章為㑹三㑹為統三統為元而後春夏秋冬不差而後嵗功成而後工釐績熈矣閏餘不置則三年差一箇月必以正為二九年差三箇月必以春為夏十九年差六箇月而四時相反矣如此欲百工之釐可乎故堯之命不先禹稷契而先羲和者禹稷契所職百工之事耳未若羲和之重也邵康節云日月星辰堯則之江河淮海禹平之王肅云斗之所建為中氣日月所在斗指兩辰之間無中氣則置為閏中氣未定則閏餘未得而定前既定中氣矣故以閏餘繼之吕云閏一嵗之樞紐天地之數惟竒則無窮閏所以歸竒也羲和非止厯象亦掌四方諸侯朝㑹之禮如後世方伯連帥之類堯時天人為一羲和之任甚重至周馮相氏特星官厯象之職而治人之任備矣帝王之事不過奉天治人堯未嘗親一事克明俊徳乃命任羲和而已可以觀人君之道焉帝曰疇誰咨嗟若順時是登升庸大用放齊臣名曰𦙍嗣子朱名朱啓開明帝曰吁歎嚚口不道忠信之言訟爭可乎夏祖程曰堯咨嗟誰能順是登庸之任者此老將廣求聖賢以巽位之意父子相傳古今通義故放齊以朱對然朱之開明乃飾外而祗為嚚訟者放齊不識也惟堯之哲能知之孔以若時為順是熙績之事𦙍為國子為爵或以若時為順天道對若采為順人事帝曰疇咨若予采事也揆度百事一相之任驩兜奸人曰都美共工為共工官者方鳩聚僝見功帝曰吁静言静時能言庸違用則違之象外貌恭謙恭滔天心中包蔵滔天莫測帝曰咨四岳羲和四子湯湯水流貌洪大水方割害蕩蕩水奔突有滌除懐包山高襄上陵平丘浩浩盛大滔天漫天下民其咨嗟有能能治者俾使乂治僉四岳皆曰於美鯀崇伯哉帝曰吁咈逆哉治水者行其無事也拂逆則非無事矣方逆也物圓則行方則止命教命吕曰天之正理圮壊族善類岳曰异已哉已乎哉在朝未見賢於鯀者試試用之可治水乃已止無求其他故帝曰徃欽哉九載年績功用鯀有才非全無功也弗成終不欽故不底於成鯀非無治水之才惟其忽視天下事故至方命欽之一字堯心法也可以治鯀之病矣使鯀能領此敎安知其不可用乎記曰禹能修鯀之功則鯀非無功者四岳之舉未為無見也惟堯深燭其恃才方命之病然猶以岳之言試用之所謂舎己從人此堯公天下之心也帝曰咨四岳朕在位七十載堯年十六以唐侯為天子至此年八十六汝能庸用命巽順朕位岳曰否不徳忝辱帝位曰帝明明顯明高明者揚稱側僻陋淺師衆錫與帝曰有鰥老而無妻在下曰虞氏舜名帝曰俞然予聞亦聞如何果何如岳曰瞽瞽瞍瞽無目之稱子父頑心不則徳義之經母嚚象弟傲慢克舜能諧和父母以孝孝道烝烝如炊熏蒸乂治不格至姦瞽瞍厎豫不至終惡帝曰我其試哉女嫁女于時是觀厥刑示法于二女娥皇女英釐理也舜能以理降下二女止于媯水汭此舜所居嬪盡婦道于虞帝曰欽哉美舜欽之工夫也治國平天下之道於齊家占之頑嚚傲處父母兄弟之難也帝女至貴易致驕怨處夫婦之難也烝乂釐降何道以致然哉曰欽是已此堯心法也舜之心即堯之心斯其為授受之懿歟舜典第二虞書虞舜側地偏微人微堯聞之聰明生知之徳將使嗣位歴件件試諸難難事作舜典舜典曰若稽古帝舜曰重並華光協合于帝堯濬宏深哲智也明之體文明温和恭允塞實元幽潜德升上聞聞於天朝乃命以位舜於堯如日月遞明自然吻合有是華必有是實濬哲文明温恭允塞與欽明文思允恭克讓亦無少異此聖人氣象如文之徽柔懿恭夫子之温良恭儉讓此史筆形容之妙堯之知舜非聞於言語物色閒也以徳合徳以心合心二聖同時自有感動處慎謹也敬敷之意徽美也在寛之意五典常教也孔云父義母慈兄友弟恭子孝五典克從無違教也納于百揆度百官總百事百揆時敘無廢事也賔接于四門四方諸侯來朝見四門穆穆和也無凶人納于大麓太史公云送之大山之中意堯使舜攝祭事于大山之麓孔云麓録也使録萬幾之政烈風雷雨弗迷錯也隂陽和風雨時所謂使之主祭而百神享之也此所謂諸難也從敘穆人事之和也不迷天人之和㑹也舜歴試氣象如春氣至隨其枝葉脉絡生意自然𤼵越與堯典克明一章相似帝曰格來汝舜詢問事考言乃言厎可績功三載汝陟升帝位岳舉堯試知舜審矣方詢焉考焉誠厎績至三載之久焉乃命陟位者位也非堯之位舜讓于徳弗嗣天地萬物之責一旦將任之惕然如不勝此堯之兢兢舜之業業文王之純亦不已非具文之遜也正月上日朔日受終于文祖顓頊堯不許舜辭乃與舜受終于祖廟葢天下文祖之天下堯平時兢兢不敢有一豪忽心今為天下得人其責方塞曾子所謂吾知免夫者也堯受終則舜之正始可知其在祖廟受堯付托惕然甚於當讓之時想象堯舜在廟之心而萬世為君之道著矣在察璿珠璣渾天儀象天形以璿為之玉衡管以玉為之以齊七政日月五星與君政通各有異曰七政考天文者懸璣於上運轉如天以衡從下望之璣衡異見皆日月五星時數軌度之當然不知璣衡則為變易而不齊矣此舜受堯命攝位審已之當天心與否也夏云如堯典厯象將協時月正日也肆遂𩔖祭天以蒼璧禮天因天事天于上帝以形體謂之天以主宰謂之帝禋精意以享于六宗孔氏説六宗四時寒暑日月星辰水旱劉歆説六宗乾坤六子水火風雷山澤賈逵説六宗天宗日月星辰地宗河海岱馬融説六宗天地四時鄭𤣥説六宗星五緯辰謂十二次司中文昌第四星司命文昌第五星風師箕星雨師畢星張髦説六宗三昭三穆以祭義考之祭時祭寒暑祭日祭月祭星祭水旱與孔説合意安國必有傳授非臆説者望望祭于山五岳川四瀆徧皆祭于羣神丘陵墳衍古之聖賢五岳岱東衡南嵩中華西恒北四瀆江河淮濟輯斂五瑞既月孔云盡正月中夏云正月盡後乃日日日覲見四岳掌四方諸侯者羣牧九州牧班以所歛玉頒還之也瑞于羣后五瑞公桓圭侯信圭伯躬圭子穀璧男蒲璧兹者七政齊既當天心乃舉祭禮也人君之有天下曰神曰民而已𩔖至徧對神天也天子不敢自有其天下天之天下也輯而班新民聽也諸侯不敢自有其土天子之土也嵗二月東巡守適諸侯巡所守至于岱宗即泰山東岳山之大者柴燔柴祭天望秩以序于山川肆覲東東方后諸侯協合使齊一時四時節氣月小大正日甲乙同律十二律度尺度量斗斛衡斤兩修明五禮吉凶軍賔嘉五玉以寶言曰瑞以物言曰玉三帛二生一死贄執以見如五器卒乃復禮終則還玉帛生死則否三帛諸侯世子執纁公之孤執𤣥附庸之君執黄二生卿執羔大夫執鴈一死士執雉協同不使國異政也天子頒朔於諸侯諸侯受厯於天子以授其民此堯授時法也律十二生於厯之十二辰前漢志云推厯生律而度量衡又生於律修五禮欲禮樂征伐自天子出也此規模想堯時亦然舜攝位舉而治之耳五月南巡守至于南岳衡山如岱東禮八月西巡守至于西岳華山如初東十有一月朔北巡守至于北岳恒山如西禮史官省文歸格告至于藝文祖廟用特一牛有以少為貴者舜負藝祖天地民物之托惕然恐不勝徧巡天下禮舉政行無不順序乃可以妥藝祖之靈矣此與受終首尾同此一念之敬五載年一一畨巡守羣后四朝甸服朝夕見侯服一年一朝要服三年一朝荒服四年一朝四年朝畢則五載天子巡守四朝者朝京師巡守之年則朝于方岳之下敷陳奏進以言明試以功車服以庸民功曰庸以車服賞其功五年以提警之使人不倦也車服以庸即詩路車乗馬𤣥衮及黼之意肇始十有二州禹治水後分冀為幽并分青為營封殖也禁樵採十有二州山孔云封大也毎州擇山之大者為州鎮濬導深之使為利不為害川治水時川嘗濬矣復言濬者安不忘危工夫承續純亦不已之心也經略土地表州鎮滌川源此舜經綸天下之大綱也十二州冀兖青徐揚荆豫梁雍營幽并象孔云法也法用常刑王云象者垂以示人周官垂之象魏是也王者之法如江河必使易避而難犯荀子云治古無肉刑而有象法世俗謂畫衣冠易章服而民不犯是也以用典常刑肉刑墨劓剕宫大辟流放宥寛恕五刑宥而不刑則放之鞭作官官事刑扑夏楚作教刑不勤學業則朴之金黄金作贖刑誤則入金贖刑𤯝自己誤犯災因人致罪肆未獲則寛縱之赦已獲則除釋之怙有所恃而為惡終不悛賊刑殺刑之肉刑疑不仁者然垂示之使不犯又流以宥之鞭扑以警之又於𤯝災者肆赦之必怗終而後賊刑焉則刑之所及者長惡不悛之人而已若嚴而實寛也林云肆縱緩不勤事者左傳殺人不忌為賊三赦三刑欽哉欽哉惟刑之恤哉孔云舜勑天下使敬吕云史敘舜制刑之法歎美其恤刑之至也流共工窮竒于幽洲北裔水中可居曰洲放驩兜渾敦于崇山南裔竄三苗饕餮于三危西裔殛鯀檮杌于羽山東裔四罪而天下咸服左傳云見文公十八年舜流四凶族投諸四裔以禦魑魅流放竄殛一也天下皆曰可放而放之故服太祖讀書歎曰堯舜之世四凶之罪止從投竄何後世法網之密非聖人不足以知聖人之心也史敘之肉刑之後是舜之刑僅見之流耳肉刑未始用也二十有八載舜攝位二十八年帝堯乃殂魂氣歸天落體魄降地百姓如喪考妣父母亡曰考妣三載四海遏絶密静八音金石絲竹匏士革木舜攝則堯與民相忘久矣何百姓念之深也此可見堯之徳在民深亦見舜遵堯法雖攝也而猶臣道焉堯之為天下君自若也月正正月元日上日舜格至于文祖三年之喪畢始告廟即位不敢專也詢謀于四岳闢開四四方門廣賢路明四目以天下之視為視達通四聰以天下之聽為聼此新政第一義也四岳累朝元老既詢之矣猶未也闢焉天下一家也明達焉天下一身也此舜取人為善公天下之大也十二牧九官之事皆由此得之咨十有二州牧牧以養民為職曰食民以食為天哉惟時農時柔安逺能讀如不相能之能邇惇厚徳有德者允信元善之長者而難遏絶任人佞而包藏不測蠻夷四夷率相率服來服牧之咨治内焉耳而蠻夷自服牧然則侯國皆然豈有生事求邊功者哉難者非特去之常有戒謹恐懼之意任人之可畏甚於蠻夷之可畏舜稱舜以别堯此後言帝者皆舜曰咨四岳有能奮起庸功熈廣帝堯之載事使宅居百揆相亮弼采事惠順疇如九疇𩔖也順其𩔖則不至倒行逆施孔云能順其事者誰乎天下之理不進則退奮者日新之道所以生生不窮者也人主所以論相者在此僉曰伯禹鯀子作司空水土之官治水有功帝曰俞咨禹汝平水土美其前功惟時懋居是職勉百揆事哉美之而且勉之不矜之意也禹拜手至首稽首首至地讓于稷居稷官名棄契暨及臯陶帝曰俞然其所推之賢汝徃哉不許讓使就職所謂九官濟濟相遜也禹之遜誠也帝之俞誠也夫殛其父而與其子一堂都俞無少疑避純乎天也帝曰棄黎民阻艱飢洪水艱食汝后稷稷五穀之長故主榖之官名稷播種時是百穀帝曰契名百姓不親五品五常之教孔説見五典註孟子以為父子君臣夫婦長幼朋友不遜順汝作司徒掌教之官敬敷布五教在寛五常之理斯民秉彛之良心也逐物而拂之者非其中心誠然也敬敷在寛慎徽之義也帝曰臯陶名蠻夷猾亂夏中華寇攻刼賊殺姦在外宄在内汝作士理官五刑有服已服其罪五服三就就輕就重就輕重之中五流流宥五刑有宅居五宅三居居逺居近居逺近之中惟明明則得其情克乃能允當帝因禹讓三人而官不轉各述前功以勸之播有生生日新之意乃粒矣而不忘阻飢也敬吾心之天也乃可以還民心之天寛者漸漬涵養使自𤼵越明刑而制猾夏者在其中古兵刑之大也帝曰疇誰若順予工金工土工石工木工獸工草工之類僉曰垂名哉帝曰俞咨垂汝作共工官名垂拜稽首讓于殳斨人暨伯與帝曰俞徃哉汝諧能諧和其官諧生於若後世技巧工匠咸精其能者事同而意異也帝曰疇若予上山下澤草木鳥獸僉曰益名哉帝曰俞咨益汝作朕虞虞山澤之官益拜稽首讓于朱虎熊羆四臣名帝曰俞徃哉汝諧君為萬物之主交之有道取之以時使順其性益嘗掌山澤故因所經歴而用之帝曰咨四岳有能典主朕三禮天神地祗人鬼僉曰伯夷名帝曰俞咨伯汝作秩宗主郊廟之官宗主天秩之禮夙早夜惟寅敬直敬以直内哉惟清直則清明在躬無一毫私累汩之伯拜稽首讓于夔龍二臣帝曰俞徃欽哉郊廟修五禮中之吉禮禮之最大者也故獨與百揆咨四岳而命欽者對天地感鬼神之道寅直清欽再三申命葢天下事無不當敬而於禮為尤切帝曰夔命汝典樂教冑子元子已下至卿大夫子弟與之任者世禄將襲位故不可不教直勁正而温和寛而栗莊栗不失之緩剛而無虐簡而無傲此教以樂徳也直正直也寛柔也剛簡剛也此三徳乃其氣質之異直焉而教以温使適其中寛焉而教以栗使不失之不及剛簡焉而教以無虐無傲使不失之太過吕云此教者之事也不直則道不見然必即之也温寛者規模廣大然必栗而有縝密之工夫剛者師嚴道尊然必無虐以強其所不能簡者簡黙舉一隅引而不𤼵然必無傲天下之才以為不可教也詩言志心之所之歌永長言歌者以詩而長言之聲五聲也宫商角徴羽依永長言之中有高下疾徐依之而五聲成焉律六律六吕和聲聲叶律而後和八音聲成文謂之音克諧和無相奪倫各有倫敘不相錯亂神人以和此教之以樂語也樂從詩生詩從心出聲音之與政通以政之和致心之和以心之和為樂之和典樂者以樂之和而教人於以𤼵越其良心是以其出於人心者而還以入乎人心也動天地感鬼神詩莫近焉而况於胄子乎神人以和因以樂教胄子而極言聲詩感通之妙也五聲宫舌居中商口閒張角舌縮郤徴舌拄齒羽撮口聚八音金鐘石磬絲琴瑟竹簫管匏笙土塤革鼓木柷敔夔曰於如字或音烏而絶句歎美也予擊大擊石磬聲之清者孟子玉振之也者終條理也詩曰依我磬聲磬八音之終也拊小擊石百獸率舞惟舜樂之和故擊拊之而獸舞焉䕫非自言其功所以信舜樂感通之必然爾獸且舞況神人乎帝曰龍朕聖疾惡讒邪説㸃白成黒殄絶行君子之行震動驚恐朕師衆氏命汝作納言喉舌之官夙夜出受上言宣於下納聽下言納於上朕命惟允信讒説之得以動衆者以上下之情不通故也有納言以出納之則下情上達上情下孚一切以帝命之公為信讒説之私自無庸得行矣益稷工以納言即此職也帝曰咨汝二十有二人四岳十二牧九官共二十五人曰二十二人者有一人而兼二職者也欽哉惟時欽則不失時亮弼天工三載三年有成考績功三考几年黜降陟升幽暗職之廢音明職之修者庶績咸熈此總命也岳牧九官之事皆天之事也天工人其代之惟天之命於穆不已可一時息乎欽則誠與天一矣此堯舜傳心之妙所以咨命之要領也三載以下史臣述舜事非舜語也考焉黜陟焉課之三載三考之後而庶績無不熈者欽之成處也周官三歳大比而誅賞不待九年者帝王氣量之異分别北背三苗前既竄其君而未滅其國其同惡猶有不悛者故分背之所謂旌别淑慝殊厥井疆也禹貢三苗丕敘則其君竄於三危者孔云衆功皆廣三苗幽暗故分北之舜生側微三十徴庸堯始升用三十攝位二十八年居喪三年在位即帝位五十載舜踐位三十三年薦禹於天禹攝位十七年然後舜崩陟升方遐乃死在位五十年舜典載其一年事而略其餘規模一定四十九年之事皆枝葉流派也此作史之妙陟方孔以為舜升道南方巡守死於蒼梧之野而𦵏焉案堯老舜攝則巡守舜行之矣豈有禹既攝而舜猶巡守者乎司馬温公詩云虞舜既倦勤薦禹為天子豈肯復南巡迢迢渡湘水帝釐理治下土諸侯方各方設立官居方居其方别分生姓族分𩔖士農工商分其𩔖使相從作汩治作與也言治民之功興一篇亡九共言九州供貢劉敝以為即九丘孔安國除九丘非也共丘字相似安國為𨽻古定誤以丘為共耳九篇槀勞飫賜此七書序安國所謂不可復知者也無篇首可冠隨其次附之前書之末訓傳順序文為之説既不見書其是非不可得而知也尚書詳解卷一
