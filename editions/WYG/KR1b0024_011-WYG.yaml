  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0024_WYG_011-1a, image: WYG0060/WYG0060-0410a.png}
body:
  text: 尚書詳解卷十一宋胡士行撰周官第二十二周書金縢幼年書也洛誥還政書也無逸立政敎戒書也周官親政書也合而觀可以見成王之本質與其昬明疑信之變講貫啟發之深與其知類通達離師傅而不反過此君陳又過此顧命而成王進德終始之序周公格君造化之功著矣成王旣黜殷命盡去武庚餘黨滅淮夷成王即政再叛還歸在豐告文王廟作周官海内清晏創制立法之事可興矣周官惟周王撫臨萬邦巡侯甸侯國四征弗庭朝綏安厥兆民六服羣衆辟侯罔不承奉德王德歸于宗周豐董督正裁治官虞五服甸侯綏要荒周六服侯甸男采衞要六服承德則四海皆隨其運轉治官董正則萬世皆入其維持其進不可階級數其大不可尺度量也王曰若順昔上古大逺猷謀制治于未亂保邦于未危闔闢屈伸閒不容髪曰唐虞稽考古上古建立官惟百内有百揆四岳統内治外有州牧十二牧侯伯五國一長統外治庶政惟和萬國咸寧夏商官建官倍二百亦克用乂明王注云聖帝明王立政不惟其官具官惟其人得人揆岳牧伯挈其綱也綱舉則目張矣和寧者無為而治唐虞之治體然也百而倍焉不矜於同而同於治要在得人而已今予小子祗勤于德君德夙夜恐不逮及仰惟前代時是若順訓敎迪啟厥官正身以正百官立太師導之敎訓太傅輔以德義太保保其身體兹惟三公論道經經綸邦燮和理調陰陽三光全寒暑平官不必備具官惟其人得人則任無人寧闕明則邦國幽則陰陽所以然者乃所謂道也經綸之功藏於無迹和調之妙閒不容髪論云者擬議以成其變化講明啟沃而精一之者也少師少傅少保曰三孤孤特自守貳副公𢎞大化寅敬亮相天地弼予一人陰陽以氣言天地以形言燮理運之也寅亮承之也公不言弼一人者論道未有不自君心始特王尊三公若不欲以身煩之冢大宰天官之長天子之相掌邦治統百官官異職管攝之使歸於一均四海四海異宜均調之使平司徒地官之長掌邦敎敷五典常擾馴習蓄養在寛之義兆民宗伯春官之長掌邦禮郊壇昭穆之等聘享射御之節貫本末等文質治神人使不僭亂謟瀆和上下使不乖爭陵犯司馬夏官之長掌邦政戎政統六師平邦國平其不平非夸武功天討也司寇秋官之長掌邦禁詰推鞠窮詰姦慝隱而難言刑直刑之暴亂顯而易見司空冬官之長掌邦土居各居其所不遷異物四民士農工商時因時使民種樹地利三公三孤天子所與共調精祲之原而無所治者也統萬事而分治之六卿實為之綱冢宰相天子統百官司徒以下皆屬焉而均列之六者綱在網中而首豈越身外哉乾坤與六子並列八方冢宰與六卿並居六職一也六卿分職各率其屬以倡率九州牧阜大成兆民六年五服一朝每一年一服入覲要服不責其必來其年五服各休本國又六年十二年五服一朝王乃時四時巡巡四岳考制度于四岳諸侯各朝于方岳詳見舜典大明黜無功削地貶爵陟有功加地進律卿牧倡和表裏有彞矣然久歴嵗序非時振之豈無壅滯而不達者乎巡而考焉禮樂刑政斯四達而不悖矣王曰嗚呼凡我有官君子合尊卑小大同訓之欽乃攸司不出位慎乃出令審於未然之先令出惟行已出必行弗惟反不可誤而反以公理滅勝私情民其允信懷感學古古訓入官議事以制所學成法政乃不迷膠滯疑惑其爾典常當代之法作之師無以利口亂厥官制度蓄疑有疑即辨可否立決蓄而不辨一前一却敗謀謀所以不成怠不及忽過荒政不學古牆面莅事惟煩牆面則事至無以應不勝其煩矣戒爾卿士功業之成崇高惟志勤由志生業功之積廣惟勤志由勤進惟克果敢斷決乃罔後艱不果斷則志勤廢矣位高不期覺驕禄厚不期侈恭儉惟必德實德無載容爾偽聲音笑貎之為作德心逸安日休廣胖作偽心勞殫其智慮左蔽右隱日拙人見肺肝百短呈露居寵得君思危罔不惟畏弗若不畏則入畏矣推尊賢人之賢讓能庶官乃和無爭功能不和政庬雜舉薦能其官惟爾之能稱舉匪其人惟爾不任勝任王曰嗚呼三事三公曁至大夫敬爾有官亂治爾有政以佑乃辟永康兆民萬邦惟無斁所以期庶官者大且逺矣成王旣伐東夷肅愼東北逺夷來賀王俾榮國伯爵作賄賜以財賄肅愼之命冊書一書亡周公在豐致政歸豐邑成王不容逺去魯國將没欲葬成周以己所營終始念之公薨成王葬于畢附文武兆域告周公柩作亳姑孔云成王踐奄遷其君蒲姑告葬並合一書亡君陳第二十三周書周公旣没命君陳鄭𤣥以為周公子然書中皆不及恐不然分正尹東郊洛之東成周殷民所遷作君陳此繼周公之任也君陳王若曰君陳惟爾令粹美德孝恭惟孝友于兄弟克施有政命汝尹君長兹東郊敬哉孝恭親愛父母而敬之至也孝則必友德之美孰大焉本立道生移之官政何不克之有昔周公師敎保安萬民民懷感其德往愼乃司兹率循厥常法懋勉昭明周公之訓惟民其乂周公化商之道盡矣後來者懋而勉之可也紛更之不可也我聞曰吕云聞之周公夏云聞之人至極治馨香形質正而氣臭升正者有方升者無方馨香者精華之上達者也感于神明黍稷非不足為馨明德至治之本惟馨爾尚式法時是周公之猷道訓惟日孜孜無敢逸豫商頑非可以勢迫感孚之道至精至微周公之猷訓具在惟有日新篤實之功者能體之凡常人未見聖若如恐不弗克得見旣見聖亦不克由導行聖爾其戒哉君陳親見周公者故以不克申戒之爾惟風君子之德下民惟草小人之德圖謀厥政莫或不艱思艱有廢罷所有有興起所無出入反覆自從爾師衆虞度庶衆言同則繹紬思爾有嘉謀嘉猷出入虞繹而盡善者則入告爾后于内爾乃順承之于外曰斯謀斯猷惟我后之德嗚呼臣人咸皆若如時是惟良顯哉風動草偃機括之繫如此而可不艱乎廢興更革尤當斟酌始謀之衆終歸之君一毫有己之私不容焉良顯冝哉王曰君陳爾惟𢎞周公丕大訓無依恃勢作威無倚專任法以削刻寛寛厚之中而有黙有制法制從容暇豫以和此和中之體當然殷民在辟法予曰辟爾惟勿辟予曰宥恕爾惟勿宥不徇上意惟厥中循理而已有民有弗不若順于汝政弗化于汝訓辟懲以可以止戒辟罪乃然後辟不可泛施狃習于姦宄敗常亂俗三三犯細雖小不不可宥恕也刑故無小之義爾無忿怒疾惡于頑敏者舉隅而己得頑者提耳而未諭無求備于一夫必有忍其乃有濟成有容忍猶有堅制力蓄之意容則洪裕寛綽忻忻然有餘地矣德乃大忍言事容言德淺深固有閒簡擇厥修能修飾者亦簡其或不修進用厥良善以率其或不良頑可疾也而化之者不可疾也自三細不宥之外餘昔忍而容之可也旌别淑慝舉善敎不能所以化之者蓋有不迫之道焉惟民生天降之衷厚本厚因物有物有遷移而為薄違不從上所命令從厥上攸所好意爾克敬典五典在德實有諸已時乃罔不變化實德感人捷於桴皷允升于大猷道惟予一人膺當受多福化之博福之厚也其爾之休美終有辭名稱于永世福之厚名之長也民性本善顧上有好者率之耳德化行世道升君之福臣之名何有紀極君陳可不勉哉顧命第二十四周書成王將崩命召公畢公率諸侯相康王作顧命臨終囘首作命力疾臨朝二公受重任所以公天位嚴大寳懲三監流言之變也顧命成王所以正其終康王之誥康王所以正其始顧命惟四月哉生魄十六王不懌恱快甲子王乃洮洗頮盥水相扶被加冕服憑依玉几乃同並召太保奭芮伯彤伯宗伯畢公司馬䘙侯司寇毛公司空師氏大夫虎臣宿衞百尹官長御事班庭聽命王曰嗚呼疾大漸進惟幾危病日臻至旣彌久留恐不獲得誓告言嗣續兹我志予審詳訓敎命汝此述顧命之意也昔君文王武王宣布重光如舜言重華奠定麗民所依附富之陳布敎則肄習之久而理事貫徹肄不違違道用以克達推而代殷集大命在後之侗我小子敬迓迎天威嗣守文武大訓無敢昬亂逾越今天降疾殆恐孔云危也絶句弗興起弗悟省爾尚明明聽時朕言命用敬保元太子釗康王名𢎞大濟渡于艱難之業柔懷逺能和邇安慰勸導小大庶邦思夫人人受天地之中以生自當自亂治于威儀有威儀之則皆天命也爾無以釗冐昧貢進于非幾威儀之非當於其幾微謹之此顧命之辭也謹威儀者所以迓天命此可以見成王之學力臨死生而不亂矣兹衆臣旣受命顧命還歸出徹綴衣帷幄于庭越翼次日乙丑王崩太保命仲桓南宫毛朝臣之賢俾使爰于齊侯吕伋太公子仕王朝宿衞以二二臣執干戈虎賁百人逆迎子釗於南門之外入自端門内外咸覩延迎入翼次室恤憂宅居宗主天下丁卯命作册板書立康王度依法越七日癸酉旣殯伯方伯相作相召公命士須預致材共喪百用之木狄下士設黼畫斧扆屏風設之牖户之閒綴衣帷帳牖閒忩東户西設一座南嚮敷重二重篾桃竹席黼白黒繒純絲華文彩玉飾几仍生時舊用几此朝諸侯見羣臣之坐也西序廂東嚮敷重底蒲苹席綴雜色純文貝玳瑁仍几此旦夕聽事之坐也東序西嚮敷重豐莞草厚席畫純雕刻玉仍几此養國老饗羣臣之坐也西夾夾室隱暎之處南嚮敷重筍竹籜席𤣥黒紛組純漆仍几此與親屬私宴之坐也越玉五重𢎞璧琬與琰大玉夷玉天球陳寶寶器赤刀大訓河圖赤色刀武王伐紂時刀大訓典謨𢎞大璧玉琬珪琰圭皆九寸在西序大玉玉之大者夷玉玉之常者天球磬河圖伏羲時神馬所負圖在東序廂此玉寶陳之兩廂𦙍𦙍國所作之舞衣大貝如車渠鼖皷長八尺在西房兊古巧工之戈和古弓人之弓垂舜共工之竹矢在東房明堂五室此路寢特有東西房者鎬京室武王之制左右房也大輅玉為車首在賔西階面前綴金次小輅在阼東階面先象與玉配輅在左塾夾閒側室之前門内之西自外向之在左次輅木次象在右塾之前成王殯在西故以上所陳座位器物以西為上二人雀赤黒如雀弁士服執惠三隅矛立于畢門路寢門之内四人綦青黒弁執戈上刃鐵向上夾兩東西階戺堂廉盡處士皆立堂下一人冕大夫服執劉鉞屬立于東堂路寢東門之前堂也階而立以備升降之一人冕執鉞斧立于西堂一人冕執戣㦸立于東垂路寢東階四達地一人冕執瞿戣屬立于西垂一人冕執銳矛屬立于側階堂北惟一階謂之側階猶言特階也堂垂立者四人二人立東西堂二人立東西垂則堂之南宿衛備矣故此一人立堂北側階大夫皆立堂上新王在東故執兵衞之人先東後西王麻冕黼裳主祭服當尊成王受冊命由賔階猶以子道自居隮升卿士邦君無事於奠祼故不純用祭服麻冕蟻黒裳祭服裳皆纁變其裳者酌吉凶之間入即就位太保召公受遺太史秉册太宗宗伯典禮皆麻冕彤纁赤裳祭服太保承奉介圭天子之守尺有二寸上宗宗伯奉同爵名瑁諸侯即位天子賜之至來朝執圭天子天子以瑁冒其刻處大小相當則本所賜此天子之權也由阼階隮以先王命奉符璽以傳嗣君有主道焉太史秉書奉册贊王與王接武由賔階隮御進王册命儀物備乃延康王受册命曰皇大后君成王憑玉几力疾道稱揚舉末臨終命命汝釗嗣繼守訓末訓臨君周邦率循大卞法燮調和天下用答揚文武之光訓此顧命册辭也王新王再拜興答曰眇眇微予末下小子其能而亂治四方以敬忌畏天威乃受同瑁王三宿進爵神位三祭酹酒於地三咤奠爵於地上宗曰贊王饗享此福酒此王受册而奠也太保受同王所執同降下堂盥盥手以更用異别同秉璋半圭以酢報也謂王祭而太保又祭授宗人小宗伯同拜拜成王告已傳顧命王答拜亦拜成王尊所受顧命太保受同祭祭於柩嚌飲福至齒不飲宅就位不動授宗人同拜曰事畢王答拜此太保告傳顧命而祭也太保降事畢降階收徹器物諸侯出廟門畢門也在應門内俟待新王命臯外朝朝士雉庫應内朝司士路燕朝路寢門所掌門門門所掌門大僕所掌路門又曰畢門以成王在殯故又曰廟門康王之誥第二十五周書除喪乃咨岳牧訪羣臣經也康王之誥權也太甲受伊訓於居憂之時禮之變昉此矣康王既尸主天子遂乃誥諸侯作康王之誥所以鎭浮議折奸萌也康王之誥王出在應門之内即畢門外内朝也圖見前太保召公率西方陜以西諸侯入應門左畢公率東方陜以東代周公諸侯入應門右北面以東為右西為左皆布陳乗四馬黄朱厥篚為庭實見新君賓諸侯於王為賓稱諸侯中一人前舉致辭奉執圭兼幣曰一二臣衞藩臣敢執壤土所生物奠贄見皆再拜稽首王義以義嗣繼德先人德答拜此分班也諸侯兩列二伯率之太保冢宰暨芮伯司徒二公為班首咸進少進相相禮者揖揖在位皆進皆再拜稽首此合班也六卿前列冢宰司徒班首也曰太保以下進戒敢敬告天子皇天改大邦殷之命惟周文武誕大受羑紂囚文王羑里憂患艱難莫甚焉若於此能順則天下之理無不順矣克恤憂念西土以己體人視民如傷惟新陟升遐王成王時未諡畢盡協合於理賞罰戡能定厥功文武功用敷布遺與後人休美今王敬之哉張皇大六師無壞我高祖寡少得命之命此太保以下進戒之辭也王若曰庶邦侯甸男衞惟予一人釗初立謙稱名報答誥昔君文武丕大平均富養至仁無外也不務咎罪罰志仁矣無惡也厎止至毫髮未至則不能止其極齊一信毫髮未實則不能一於信用昭明篤實則輝光表裏之稱也于天下則亦有熊羆忠勇之士不二心忠直之臣保乂王家君臣盡道用以端正理命受命于上帝皇天用訓式敎厥道付托畀予四方乃命建侯樹立屏藩在我後之人文武達君德明仁體長人而不嗜殺人者也篤實輝光而又有忠臣保之天命之受一出於正無少囘曲既得天下均天施分天職封建以遺後人異乎罷侯置守以私其子孫者矣今予一二伯父同姓尚庶胥相暨與顧念綏安行爾先公之臣服于先王之事雖爾身在外乃心罔不在王室人臣無已以人主為己人臣無心以人主為心用奉承恤憂厥若所當順者無遺與鞠稚子羞謙沖不以威力要求感人心之至者也此王報誥之辭羣公既皆聽命相相禮者揖揖之出趨出王釋冕反喪服冕服非得己也尚書詳解卷十一
