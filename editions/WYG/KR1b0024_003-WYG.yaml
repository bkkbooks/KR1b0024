body:
  text: 尚書詳解卷三宋胡士行撰禹貢第一夏書此書首列九州界次言治水經歴又次言田賦髙下土貢有無終言朝覲貢賦達帝都之道而獨以貢言者禹治水後因定貢賦法以任土為主五十而貢夏制也故書繫之夏禹别分九州隨山濬深川川原出於山任土作貢冀至雍别九州正經界也導山隨山也導水濬川也知也自九州攸同以後作貢也仁也山南曰陽北曰隂西曰右山谷曰畎海曲山曰島山再成曰伾地髙曰丘丘再成曰陶髙平曰原曰陸下濕曰隰水北曰陽曰汭曰表水停畜曰瀦水隈曲曰隩水所經曰至隨地得名非他水外來曰為大水受小水曰過小水歸大水曰入兩水𫝑均曰㑹溢而他流曰出順流曰浮順流而下曰沿絶流曰亂舍舟遵陸曰逾因水入水曰達土無塊曰壤起曰墳黏曰埴鹹曰斥疏曰壚禹貢禹敷分土隨山刋木去蔽通道奠定髙山大川以為每州標準孔云定岳瀆祭禮差秩此禹治水之規模也分布之則其用工不散亂參錯刋木達觀定山川之髙大以為標準而九州形勢了然目中矣冀州帝都者他州皆舉山川為界冀獨不然王無外也冀東南北皆距河既載始事也孔云賦貢役載於書冀三河環拱居河入海下流水當從下泄故始冀北兖東北次青東徐東以揚南荆南而豫中梁西雍西北終焉皆從下而向髙也夏云兖以下八州州名下皆為絶句惟冀州下有既載二字而壺口又無所屬詩曰俶載謂始有事也此亦始有事於壺口然後治梁及岐當以既載壺口為一句壺口山冀治梁山雍及岐山在雍壺口在河内屬冀梁岐在河外屬雍治冀而及梁岐者壺口龍門之上口梁龍門之南山岐梁之近山也龍門未闢吕梁未鑿河出孟門之上大溢横流禹於壺口之西闢孟門龍門之上口於梁山之北闢龍門以行水使河出二山間梁山岐山而餘功并及岐此平水用工最大處也既修治太原汾水之所出至于岳大岳陽山南覃懷近河地底致績功至于衡横漳漳水横流入河皆近河處也厥土惟白壤水平則土色見周官司徒辨十有二壤之物以教稼穡是也厥賦惟上上一錯雜出厥田惟中中五一上上二上中三上下四中上五中中六中下七下上八下中九下下冀上上錯上上為正雜出上中豫錯上中上中為正雜出上上揚下上上錯下上為正雜出中下梁下中三錯下中為正有時雜出下上有時雜出下下賦九等已有正法曰錯者又有隨年之豐凶而為之升降者也田九等賦九等上雍一徐二青三上冀一豫二荆三中豫四冀五兖六中青四徐五雍六下梁七荆八揚九下揚七梁八兖九以制田等有田髙而賦低者有田低而賦髙者人力之不齊也冀田五賦一相去獨逺者帝都百貨所聚且賦兼貢故也他州先田後賦冀先賦者賦出於田貢出於地他州專田賦而以地所生供貢冀帝都天子自賦田地一也貢在賦中所出不止在田故獨不言貢而賦在田先恒水衞水既從從故道大陸髙平曰陸地名既作可耕島海曲夷島居之夷皮服北地寒以皮為衣水平還舊俗或云貢皮服也平水土在田賦前者其害大須先治者也在田賦後者其害小可徐治者也夾右碣石山入于河此通運漕之道也冀北去帝都逺者自海逆流而西右顧碣石如在挾腋九州貢道皆達河達河則達冀州矣濟東南據濟據越過也河西北距河距至止也惟兖州兖鄰冀在河下流九河既道疏通之使復故道徒駭太史馬頰覆釡胡蘇簡潔鈎盤鬲津禹既鑿龍門河至此湍激湧溢禹不惜數百里地疏為九河以分其勢不與水爭地所捐者小所得者大雷夏澤有雷神故名既澤瀦水不泛溢灉水沮水㑹合同同入澤澤以容水亦不與爭地也桑土既蠶是降下丘水時人升髙丘宅居土平地厥土黒墳墳起厥草惟繇始抽厥木惟條此水平所致也厥田惟中下六厥賦貞賦當九貞正也以萬民惟正之供舉一可以槩九作耕十有三載乃同兖地卑受水患最甚故特寛之耕作十三載然後賦法同他州厥貢漆絲厥篚盛以筐篚織文織而成文錦綺之屬惟服食器用不貴異物浮順流于濟水漯水達因水入水于河此兖入貢道也海東北據海浮海有遼東即所分營州地也岱西南距岱惟青州嵎夷地接要荒故有夷既略封略濰水淄水其道順故道厥土白墳海濵水旁也廣大斥鹵鹹也厥田惟上下三厥賦中上四厥貢鹽絺細葛海物惟錯海雜物非一種林云治玉之石岱山畎谷絲枲麻鉛錫𩔖松怪石好石似玉萊夷地作牧可牧牛羊厥篚檿小桑絲絲中琴瑟弦浮于汶水達于濟達濟則達河矣海東至海岱北至岱及淮南至淮惟徐州淮水沂水其乂治䝉山羽山其藝種大野澤既豬聚水東原地底平厥土赤埴土黏墳草木漸進長包叢生厥田惟上中二厥賦中中五厥貢惟土五色王者封五色土為社建諸侯則各割其方色土與之使立社燾以黄土苴以白茅茅取其潔黄取王者覆四方羽山畎夏翟雉名羽中旌旄嶧山陽南向也孤特生桐中琴瑟泗水濵涯浮輕清磬磬石淮夷孔云二水鄭云淮水夷民也蠙蚌生珠暨及魚厥篚𤣥黒繒纎細縞白繒黒白繒皆縞者浮順流于淮泗達于河淮北據淮海南距海惟揚州彭蠡澤名今鄱陽湖江漢二水所㑹既豬陽鳥鴈隨陽之鳥秋南春北隨日所在攸所居水平有岸可居三江既入孔云三江入震澤鄭云入海震澤吳南太湖今蘇湖二州底定震澤水多震動亦已底定篠竹箭蕩大竹既敷布生厥草惟夭少長厥木惟喬髙韋昭說三江吳松江浙錢塘江浦陽江郭景純說三江岷江浙江松江王介甫說三江一江自義興一江自毗陵一江自吳縣班固說三江南江從㑹稽吳縣南入海中江從丹陽蕪湖縣西東至㑹稽羨入海北江從㑹稽毗陵縣北東入海夏云此皆據所見為言非禹舊迹酈道元謂東南地卑萬流所輳觸地成川禹舊迹歴年湮没不可復考夏氏取曽氏說三江北江導漾為漢之流於夏口合江匯於彭蠡中江岷江之流二江經禹所導見導川經文中南江豫章之川如彭水鄱水塗水之𩔖凡九水合至彭蠡入江南江江之故迹非禹所導故不見導川經文中彭蠡之上止北江中江二江彭蠡之下并南江為三南江中江北江以禹貢言之彭蠡水派而為三以入海也然今江水自彭蠡而東由秣陵京口以入海無有别派陵谷之變也蘇云三江一江而各源合而分者自若水味不相入古今稱唐陸羽知水味三派相雜不能相敗是也厥土惟塗泥地泉濕厥田惟下下九厥賦下上七上錯六厥貢惟金三品金銀銅瑶琨皆美玉篠簜齒象牙革犀皮羽鳥羽毛旄牛尾惟木楩楠豫章島東海曲夷卉草服地俗以卉為衣厥篚織細紵貝水物或云織成為文厥包裹橘小柚大錫貢錫命乃貢沿順流而下于江海達于淮泗徐州已言浮于淮泗達于河此省文荆北據荆山及衡山陽南向及衡山惟荆州江水漢水朝宗似諸侯春朝夏宗於天子于海江漢至荆雖未入海而入海之勢已順九江孔甚殷正沱潛水自江出為沱自漢出為潛凡自江漢出者皆有此名既道雲澤卑土方見土夢澤髙作乂已可耕雲夢二澤跨江南北方八九百里孔說九江江於此分為九道潯陽記云烏白江蚌江烏江嘉靡江畎江源江廩江提江箘江曽說九江九水合於洞庭沅漸潕辰敘酉澧湘資厥土惟塗泥厥田惟下中八厥賦上下三厥貢羽毛齒革惟金三品與揚同杶似樗榦柘栝柏葉松身柏礪麤磨石砥細於礪砮石中矢鏃丹朱𩔖惟箘簵皆美竹楛木中箭笴魯語肅慎氏貢楛矢石砮三邦三物出雲夢澤近澤三國底致貢厥名天下稱善有名者包匭匣也包之又匣之菁茅茅之有刺者祭以縮酒或云管子所謂三􅆃茅孔以包為橘柚菁為菁菹厥篚𤣥纁三入為纁五入為𤣥此州染色善璣小珠組綬類九江納錫其納待錫命大龜龜千歲滿尺二寸所以決疑定策國之守龜不可常有故必有符方錫之納之浮于江沱潛漢逾越也舍舟陸行于洛至于南河荆西南至荆山河北距河惟豫州伊洛􅈆澗四水既入于河滎澤波水既豬後世塞為地導菏澤被孟豬孟豬澤在菏東北菏餘波流溢覆被之厥土惟壤髙者壤下土墳壚疏厥田惟中上四厥賦錯上中二厥貢漆枲絺葛紵布厥篚纎細纊緜錫貢磬錯治玉磬之石遇治磬乃錫之貢浮于洛達于河華陽東據華山南黒水西距黒水惟梁州岷山嶓冡既藝沱潛此梁水自江漢出者孔云沱潛發源此州入荆州既道蔡山蒙山旅祭平地和夷底績厥土青黎黒厥田惟下上七厥賦下中八三錯厥貢璆玉名鐡銀鏤剛鐵砮磬熊羆狐貍四獸織皮貢四獸皮織今罽西傾山屬雍州因桓水源出西傾是來浮于潛自桓來浮潛逾于沔漢上入于渭亂絶流于河黒水西距黒水西河東據河龍門之河在冀州西惟雍州弱水無力不能負芥既西萬水東注惟弱水不可東涇水屬逮入渭水汭北漆水沮水既從入渭灃水攸同同入渭荆山岐山既旅祭終南山惇物山至于鳥鼠山三山同上既旅原髙平隰底績至于豬野亦底績三危西裔山既宅可居三苗竄於三危丕大敘次之不以其有罪而棄亦使其得次序厥土惟黄壤厥田惟上上一厥賦中下六厥貢惟球琳皆玉名琅玕石如珠浮于積石山導河所自至于龍門山禹所鑿處西河㑹于渭汭孔云㑹逆流也自渭北涯逆水西上雍林云雍州來帝都二道一道自積石至西河一道自渭來亦㑹於西河織皮西戎織皮為衣崑崙析支渠搜西戎三國名西戎即就敘戎亦即敘平水之功大矣導疏導之與湮水異也岍及岐雍至于荆山雍逾于河梁即龍門西河壺口冀西雷首冀西至于太岳冀西底柱形如柱在冀南河中流析城冀南至于王屋冀南太行冀西恒山冀西至于碣石冀北入于海鄭𤣥以為正隂列馬融王肅以為北條西傾雍西朱圉雍西鳥鼠雍南至于太華雍豫之間熊耳豫西外方豫西桐柏豫南至于陪尾豫東次隂列中條導嶓冡梁南至于荆山内方荆至于大别次陽列岷山梁之陽至于衡山荆過九江荆至于敷淺原揚正陽列馬融王肅以二陽列為南條此隨山也取山之大者為標準且導山旁水也山水之源導山所以導水也逾人過也入水入也或以逾為山脉今隂陽家所謂過江龍也前已逐州載山水之治矣此更說首尾一經一緯也導弱水雍至于合黎雍水在流沙東餘波入于流沙雍導黒水雍幽若險漆至于三危梁入于南海梁水能為害亦能為利惟二水則有害無利故皆導之塞外載之導山導水之間上下皆不相屬外之也導河雍積石雍至于龍門河至龍門夾兩山間流最湍禹以其夾卯鑿而大之南至于華山隂北冀梁雍豫四州界東至于底柱山在河中流河水分流包山而過山見水中若柱然又東至于孟津過渡處在南河東過大水受小水洛汭洛入河處至于大伾山再成曰伾北過大水受小水洚水入河至于大陸地又北播散為九河河至大陸北流地皆平易決故疏為九以殺其勢同為逆河同為一大河名逆河入于海碣石之海河出崑崙山髙二千五百餘里日月所相隱暎去中國逺隱伏地中至積石山下有石門河水冒之以西南流其在積石之前者不為害故平水之功發於積石至于龍門或鑿山或穿地以通流馴致入海也導河水上積石山下自入海導河自積石而河不始於積石故先言河後言積石嶓冡山上導漾水下入江岷山山上導江水下自入海二水源出二山故先言山後言水導沇水自入海沇濟水所自漢入江洛渭入河濟最微然能絶横過河濟清河濁水不得亂涉汶而自入海故得與江河淮為四瀆有本故也人之為學可不立其本乎導淮自桐柏自入海出胎簪山東北然後過桐柏山導渭自鳥鼠入河出隴西首陽縣渭首亭南谷導洛自熊耳入河出冡嶺山三水源在三山上游不出三山治水施功自三山發耳故曰自嶓冡雍山導漾泉始出為漾東南流為沔東流為漢雍沔水至漢中為漢水隨所至地得名又東為滄浪之水豫過三澨水入漢處至于大别山南入于江漢東流觸大别山而南與江合東匯回旋曲折澤聚為彭蠡揚東為北江揚入于海漢水合江勢湍激得彭蠡回旋之又分為北江其勢漸殺乃安流而入海如河之播為九也岷山梁導江東别分為沱梁江之别流又東至于澧梁過九江荆至于東陵荆東迤敘行北㑹于匯彭蠡東為中江揚入于海導沇水冀東流為濟冀入于河溢滿為滎豫澤東出于陶丘北豫又東至于菏豫澤又東北㑹于汶青又北東入于海青導淮自桐柏豫東㑹于泗沂徐二水東入于海導渭自鳥鼠同穴雍鳥鼠共為雌雄同穴處此東㑹于澧雍又東㑹于涇雍又東過漆沮雍入于河導洛自熊耳豫東北㑹于澗􅈆豫二水又東㑹于伊豫又東北入于河九州攸同同底於平無水阻間四隩海表既宅可居九山九州之山刋槎木通道旅祭九川九州之川滌疏源九澤既陂障無決溢四海㑹同同朝㑹京師六府孔甚修庶土交皆正彼此互觀各得其正底慎謹之取有節財賦咸皆則法三壤田上中下成賦賦法中邦國錫與諸侯土胙之土使開國姓命之氏因生錫姓以顯之祗敬台我德先率諸侯不距人不違距朕行水患平則地利興乃則法壤土以成賦此貢法也然必行之以人故建侯焉又必先之以身故祗德焉如是則人皆翕從而賦法非徒法矣五百里規方千里去王城四面五百里甸服畿為天子治田百里近賦納總總穗稾納之二百里納銍穗三百里納秸止納稾以粟予之服服役輸賦之事以其處五百里之中便於服役使以力食四百里粟不去殻五百里米無殻地逾逺而愈輕五百里侯服建以屏王室百里采卿大夫采邑二百里男邦五十里之國三百里外三百里諸侯百里之國先小後大小國易得京師之助王畿不為大國所逼也五百里綏服逺畿甸而接要荒綏中國以服夷狄三百里内三百里近侯服者揆度文德教二百里外二百里接要荒者奮武威衞衞中國文教用夏也武衞使不得猾夏也所以嚴夷夏之辨猶所謂周索戎索也五百里九州之外要服要約羈縻之三百里内三百里夷徼外夷二百里外二百里蔡要夷蔡流皆夷狄名林云春秋蔡二叔之蔡索達反放罪人於此也吕云夷守中常之教蔡如字法三百里而差簡五百里荒服愈逺愈簡略三百里内三百里蠻蠻夷一也二百里流流共工之流亦放罪人之地孔云移也政教隨其俗東漸入于海西被及于流沙西海外朔北南暨及聲教訖盡至于四海患平利興賦法成疆理定東西南北無思不服也禹錫贄見𤣥天色圭玉告厥成功禹八年於外事從其宜不由中覆功既成贄圭見堯以告成事也孔云堯錫禹圭以顯之林云𤣥象天告成於天甘誓第二夏書啓與有扈有扈以堯舜與賢而啟繼父遂不臣戰于甘地之野作甘誓軍旅曰誓㑹同曰誥讀書必識時變三聖相承渾然無間有苗之征未嘗戰也曰與曰戰扈直與啓抗若勢均力敵者與徂征氣象有間矣甘誓大戰戰至於大尤見扈陵抗于甘乃召六卿冢宰司徒宗伯司馬司宼司空無事為六卿有事則分掌六師六卿分職司馬主兵官制也六卿並將司馬師一兵制也見官兵之制夏時已然成周潤色之而已夏云周禮鄉大夫每鄉卿一人各率其鄉之人屬大司徒非冡宰以下之六卿王曰嗟六事服役六軍之人天子六軍予誓告汝有扈氏威虐侮慢五行怠棄三正天地人天用勦截絶其命今予惟恭行天之罰五行之氣散在天地間秀者為人偏者為萬物扈殘民殄物威侮之實也天地人之正理貫通為一怠棄不存是自絶其天也自絶則天絶之啓奉天討而已一云王者以五行之德王三正夏建寅商建丑周建子易服色改正朔也左車左主射不攻治于左汝不恭命右車右勇力執戈退敵不攻于右汝不恭命御居中執馬馭以正馬非其馬之正汝不恭命各嚴部分不出其位所謂師出以律也用命賞于祖親征載遷廟主賞功不敢專不用命戮于社載社主社主殺予則孥子戮辱汝所謂臨事而懼以警衆亦以自警也啓承三聖熙洽之後未嘗按行陳之事一旦誓師如素講者古人體用之學於此可見五子之歌第三夏書太康啓子失邦昆兄弟五人須待于洛水汭北作五子之歌氣象又不同矣失邦者太康之惡也五子須之徬徨哀痛歌不能已其反覆愛篤之至所謂垂涕泣而道者也五子之歌太康尸居位以逸豫滅厥德黎民咸貳離心乃盤槃遊無度畋于有洛之表外十旬弗反民貳矣而方盤遊有窮國后羿因民弗忍堪距于河姦雄何世無之若太康不失民心羿雖有不臣之心何能為因云者明禍亂之本在此而不在彼也厥弟五人御其母以從徯于洛之汭北五子咸怨述大禹之戒以作歌所謂過大而怨也其一曰皇祖有訓民可近親不可下疎棄民惟邦本本固牢邦寧予視天下愚夫愚婦一能勝予一人三失二非矣況三乎怨豈在明已見用明而易短不見未明是圖予臨兆民懍乎若朽腐索之馭六馬一車駕六馬兩服兩驂驂外兩騑為人上者奈何不敬禹受位于舜其命曰可愛非君可畏非民后非衆罔與守邦故其訓堅決著明其功髙出一世之上而其心常在一世之下也其二曰訓有之内作色荒外作禽荒甘酒嗜音峻髙宇彫牆有一于此未或不亡有一且亡況兼之乎其三曰惟彼陶唐堯有此冀方王都今失厥道亂其紀綱乃底滅亡冀方者堯之冀方也當時聲名文物四海㑹同其盛何如也而今墜之邪其四曰明明我祖萬邦之君有典常也註謂經籍有則法貽與厥子孫闗通石二十四銖為兩十六兩為斤三十斤為鈞四鈞為石和平鈞王府則有荒墜厥緒基覆宗族絶祀典則道也鈞石器也精粗一致器道之所寓也鈞石天下皆有不如王府者適輕重之宜闗和之所謂同律度量衡也祖之遺子孫者詳盡如此而墜之可乎其五曰嗚呼曷何歸予懷之悲萬姓仇予兄弟一體仇其兄即仇其弟也予將疇誰依鬱陶精結乎予心顔面厚有忸怩羞恥弗慎厥德雖悔可追辭㫖惻然一出太康之口代為太康寒心也觀此可觀變風變雅矣𦙍征第四夏書羲和湎酒淫廢時亂日𦙍徃征之作𦙍征𦙍征惟仲康肇初位即位四海𦙍國侯命受王命掌六師羿逐太康太康崩其弟仲康立即位之初以六師之柄付之𦙍侯所以收兵權也即夜拜宋昌之意故終仲康之身羿不得逞至仲康子相始為羿所逐羿自立為帝羿淫亂為家衆所殺寒浞代之殺相相之后緡生少康夏之遺臣滅浞而立少康然後祀夏配天不失舊物事詳見左傳襄四年蘇氏云羲和忠於夏羿假仲康命使𦙍征之羲和堯時羲和四人至夏合為一天人分淳龎散若天之職簡政事日詳可以觀大勢之轉移矣廢厥職酒荒于厥邑𦙍后承王命徂征羲和湎淫疑羣聚崇飲以謀亂未必非羿之黨故征之告于衆曰嗟予有衆聖有謨訓戒後世明明明徵有驗定保所以保定國家先王克謹天戒日月食五星變天所以警戒人君臣人克有守常憲法百官修交修輔助厥后惟明明德明矣得修輔而又明每歲孟春遒人宣令之官以木鐸金口木舌徇告于路使人聞之官師衆相規正工百工執藝隨所執之藝事以諫如輪扁諫齊桓公其或不恭責難於君邦有常刑此將數羲和之罪而先舉先聖之訓也惟時是羲和顛覆敗厥德沈亂于酒畔棄官離次位俶始擾亂天紀時日遐逺棄厥司所職主乃季秋月朔辰日月所㑹謂之辰歲十二㑹弗集合孔云不合則日食可知于房所舍之次瞽樂官無目奏伐鼓所以助陽嗇夫孔云主幣之官馳庶人走馳走皆以供救日之役羲和尸主厥官罔聞知昬迷于天象以干犯先王之誅此責羲和之辭也政典夏刑書所謂司馬法也曰先時者殺無赦不及時者殺無赦此誓衆之辭欲其期㑹不愆也今予以爾有衆奉將天罰爾衆士同力王室尚庶弼予欽承天子威命罰曰天威命自天子火炎熾烈崑岡山出玉玉石俱皆焚無分别天吏天子之吏逸過德烈于猛火兵過不擇善惡其猛烈於火殱殺厥渠大魁首脅逼從隨亂罔治舊染漸汙濁俗咸皆與維新自新改過如此則無俱焚之失嗚呼威振厲奮發克勝厥愛私愛姑息允信濟集成愛克厥威允罔功其爾衆士懋勉戒警哉自契至于成湯契十四世至湯八遷契居商昭明居砥石相土居商丘湯居亳餘四遷未詳湯始居亳從先王契父帝嚳居亳居作帝學􅁵治沃沃土二書亡湯征諸侯葛伯不祀湯始征之作湯征一書亡事詳見孟子伊尹去亳適夏所謂五就桀湯使徃輔桀格其非心既醜惡有夏桀不悛復歸于亳入自北門商北門乃遇汝鳩汝方湯二賢臣作汝鳩汝方二書亡尚書詳解卷三
