body:
  text: 尚書詳解卷十二宋胡士行撰畢命第二十六周書康王命作册畢分善惡居里所居里成周遷商之地言周道以殷民而後成郊作畢命此代君陳之任也殷士始遷時反側未安故周公謹始一以包容君陳和中則簡修簡不修矣至畢公成終則世道已升善惡又可白矣所謂道有升降政由俗革也畢命惟十有二年六月庚午朏三日越三日壬申王朝步自宗周鎬京至于豐告文王廟以成周之衆命畢公保釐安治東郊洛邑東郊王若曰嗚呼父師畢公以太師作方伯父者同姓之尊者也惟文王武王敷布大德于天下用克受殷命得之難惟周公左右先王綏定厥家安之難毖謹殷頑民遷于洛邑密親邇近王室式用化變厥訓敎旣歴經三紀十二年為一紀世三十年為一世變風移四方無虞予一人以寧此前人積累艱難至此康王享之甚可念也道有升降殷末道之降也繼周公君陳之化而日月否者泰矣政由因俗革改不臧善厥臧民罔無攸所勸勉方周公時善惡不欲大明至畢公時則當别淑慝矣惟公懋德懋則貫稚耋而不息克勤小物事也勤則一小大而無閒弼亮四世四朝元老終始一心正色風厲百官率下表儀朝著罔不祗敬師言衆望素孚人皆敬服嘉美績功多多見于先王之世予小子垂衣拱手仰蒙賴成成功畢公元老也康王不稱其成德而稱其懋德不稱其總大綱而稱其勤小物蓋不以成德自居造次必於是非至誠不息者不能也誠則不嚴而威不動而化不言而信先王賴之予小子亦賴之誠之功用大矣哉王曰嗚呼父師今予祗命公以周公之事往哉旌記識别分淑善慝惡表異厥其宅所居里若今孝子順孫旌表門閭彰明善癉病惡樹立之風聲使人向慕風動草偃聲振響應弗有不率循訓敎典常殊異厥井所井田畆疆所居疆界王制所謂簡不率敎者移之俾使克畏惡慕善申重畫分郊郊外圻圻界愼固封疆守備以康四海君陳時為惡者猶衆故主寛至此漸嚴矣政貴有恒常辭令尚貴體大體要簡要不惟好異怪商俗靡靡詭隨利口惟賢紂拒諫飾非餘風風俗未殄絶公其念哉有常體要治道當然於商俗言之尤對病之藥我聞曰世傳世禄食禄之家鮮少克由禮以蕩驕縱陵蔑德實悖逆天道敝壞化習奢侈麗美萬世同流如一兹殷庶士席憑藉寵光寵惟舊久怙恃侈滅義服衣美于人驕淫矜侉將由用惡終雖收周化收放心閑防之惟尚艱難資財富足能訓敎惟以永長年惟德實然惟義當然時是乃大訓訓之大不由用古訓徳義有證于何其訓放商人之心者人欲也所以防之者天理而已王曰嗚呼父師邦之安危惟在兹殷士保治兢業之心也不剛過不柔不及厥德允信修惟周公克愼厥始遷商之初造端正始不可不謹惟君陳克和厥中繼周公後保養撫摩以和為貴惟公克成厥終耕而不穫前功廢矣終之責尤重三后協合心同厎極致于道道洽周浹政治澤潤生民四夷左衽罔不咸賴予小子永膺多福公其惟時是成周王畿四方之本建立無窮之基本亦有無窮之聞聲名子孫訓順其成定式法惟乂即君陳篇終之意嗚呼罔無曰弗克惟旣盡厥心罔曰民寡惟愼厥事欽敬若順先王成烈以休美于前周公君陳政畢公不待規也而不忘規三代君臣之相與無時不警戒也君牙第二十七周書君牙初年書也吕刑末年書也中閒八駿之失不能保其初心然暮年哀敬初心復還雖非令德猶為令王穆王穆王立而周道衰命君牙為周大司徒作君牙契為司徒所受纔一語君牙之贊書文勝甚矣然周之典刑文獻多在焉學者所宜盡心也君牙王若曰嗚呼君牙惟乃祖乃父史不可考世篤忠貞正服勞王家厥有成績紀于太常周禮司勲凡有勲者銘書於王之太常太常旗名畫日月示其功與日月同久惟予小子嗣守文武成康遺餘緒基亦惟念先王時之臣克左右亂治四方心之憂危若蹈虎尾涉于春氷欲泮今命爾予翼輔作股肱心膂腰膂纉乃汝舊祖父服事無忝辱祖考父𢎞大敷布五典常式用和民則降衷之天則爾身克正罔敢弗正民心罔中惟爾之中中正即則也以身之天率民之天此敎以身敎也夏暑雨小民惟曰怨咨嗟冬祁大寒小民亦惟曰怨咨天時之常民皆怨之其情之難保如此厥惟艱哉思其艱以圖其易民乃寧司徒掌敎擾民兼敎養之職故以養民之難告之嗚呼丕大顯哉所以興周者坦然明白文王謨謀丕承繼哉武王烈功啓開迪佑助我後人子孫咸皆以正罔缺失爾惟敬明敷乃司徒訓五敎用奉承若順于先王對揚文武之光命追配合于前人祖父文謨武烈正大周密去之百餘年而如一日也在後之人奉若對揚之而已王若曰君牙乃惟由先正臣舊典法時是式用民之治亂在兹式惟治否則亂率循乃祖考之攸行昭乃辟君之有乂冏命第二十八周書穆王命伯冏為周太僕正僕臣之長作冏命此立政重綴衣虎賁意也太僕掌内朝職雖微而與君最近冏命王若曰伯冏惟予弗克于德嗣先人宅居丕大后君怵惕警畏惟厲危中夜以興起思免厥愆過也穆王父昭王溺死漢水故其哀懼如此昔在文武聰聞逺明見大齊致一不變聖廣運能通小大之臣咸懷忠良其侍御小臣僕從罔匪正人以旦夕承弼厥辟文武君臣之際盛矣主聖臣直合而言之固咸懷忠良也别而言之地愈近選愈精曰罔匪正人蓋髪櫛而苗耨之不容一不堅正者厠其閒也則其於旦夕閒無寒之者矣出入起居所與皆正罔有不欽敬發號施令誠敬之著罔有不臧善下民祗若順萬邦咸休此旦夕承弼之功也使出入起居閒少不加省欲謹之號令閒得乎惟予一人無良不及文武實賴左右前後親近有位之士匡正其不及繩直愆過糾察謬失格正其非心俾克紹繼先烈今予命汝作大正官長正率于羣僕侍御之臣懋勉乃后德交修不逮及愼簡乃僚屬無以巧言令色便辟側不正媚求愛其惟吉善士僕臣正救君之失厥后克正僕臣諛從君之非厥后自聖不聞過后德惟因臣不德惟臣爾無昵近于憸小人充耳目為君耳目之官迪導上以非不合先王之典法非人得人其吉惟貨貨財其吉若如時是瘝病厥官惟爾大弗克祗厥辟惟予汝辜罪王曰嗚呼欽哉永弼乃后于彞常憲法吕刑第二十九周書吕命命吕侯為司寇穆王訓明暢夏夏禹贖刑金作贖刑之法作吕刑吕刑惟吕命王享國百年歳耄昧荒迷度權度作刑以詰禁四方穆公氣質有絶人者八駿之馳雖失道要非齷齪者所為及血氣衰矣耄荒之年訓告四方上引邃古下及民情朗然精明亦加人數等使無中年之失所至豈易量哉王曰若古有訓東遷以前大訓河圖尚藏王府三皇五帝之事尚見於書不可不詳玩蚩尤據黃帝紀乃炎帝末最暴虐之諸侯九黎國號蚩尤惟始作亂上古民淳無敗常之事始亂者蚩尤也延連染及于平善民罔不寇攻劫賊殺人鴟義義如鴟鴞害物姦宄奪攘矯偽䖍劉殺苗民顓頊誅九黎其子孫為王國曰苗弗不用靈善制以刑惟作五虐之刑曰自以為法殺戮無辜爰於始創淫為劓截鼻刵截耳㧻㧻隂黥墨額越於兹麗施刑并一切制斷不問輕重罔無差擇有辭自直之辭者民興起胥相漸染泯泯相似棼棼散亂罔無中當于信以覆反詛盟不畏神明虐威庶戮方告愬無辜罪于上天上帝監視民罔有馨香德刑發聞惟腥黄帝翦蚩尤於涿鹿矣而苗覆出為惡開五刑之法而又淫用之皇帝堯哀矜憐庶衆戮遭苗殺戮之不無辜罪報虐苗之虐以威德威遏止絶苗民無世子孫在下天下乃命重羲黎和絶地天通罔有降格神降之奸蚩尤三苗之虐民無所愬聽命於神天地人神雜揉瀆亂帝命重黎修明典禮尊卑上下限絶不通羣后在朝羣后之逮及在下羣吏明明精白一心棐輔助常常道鰥寡無蓋蓋蔽不得自伸民不復求之神常理明而情實無不得達者矣皇帝清明目達聰問下卑民鰥寡有辭言于苗苗之餘孽德威不怒而威惟畏苗自畏德明不察而明惟明苗自悟乃命三后恤憂念功于民伯夷降典天地人之三禮森然各有明法折逆折民民邪妄惟刑刑之理禹平水土洪水主名山川辨山川之主名以定九州之鎭稷降播種農殖嘉穀三后成功惟殷富盛于民士士師臯陶制百姓于刑之中中典以敎民祗敬德苗遏絶矣而餘孽猶為民害帝清問得之益修吾德苗遂畏明于威明之下則害民之患息而後恤民之功可施降典正其心也平水定其居也播種厚其生也三后功成民殷富矣防民之刑乃用中典於以收斂其敬心而敎之德此德刑先後之序穆穆和敬在上君明明精白在下臣灼光于四方民罔不惟德之勤故乃明示于刑之中率悉乂治于民棐輔彞常性堯君臣同德光于四方民皆觀感惟德之勤則刑之明非以毒民乃所以棐其彞性也自伯夷之典迄臯陶之刑制度文為具矣自穆穆明明至乂民棐彞則精神心術之運也苟無其本前數條卜祝工役農夫胥史之事耳典獄堯時典獄之官吕云此以戒當時典獄之官非不特訖絶于威威脅惟亦惟訖于富賄賂敬欽忌恤罔有擇言無擇言在身惟克天德自我作元大也乾元之元命配享當天意在下獄之不公威脅利誘兩端而已堯時典獄惟能兩絶之而加以欽恤參貫積累馴致其道言行粹精無過可擇則德與天合命自我作輕重上下無非天理雖在下而可上當天心以配之矣夏云有罪當誅威不可廢非欲斷絶之也惟欲斷絶賄賂以求富耳吕云刑可祈天命則功在王室祭於大烝與享無窮矣王曰嗟四方司掌政典獄非爾惟作天牧天之民牧乎今爾何監視法非時伯夷不典刑播刑之迪理而已舎臯陶而言伯夷禮所以折民於未犯刑之先理也所以致其原也刑所以折民於己犯刑之後法也所以治其流也其今爾何懲戒惟時苗民匪非察究于獄之麗輕重當施罔擇吉人觀于五刑之中惟時庶威旣威虐奪貨又奪於貨利斷制一切五刑以亂亂虐無辜上帝不蠲潔降咎于苗誅之苗民無辭說于罰乃絶厥世獄重事也不察者視為刀筆吏之事故告以天牧使知其職分之大監其厚天敘如伯夷者懲其拂天意如有苗者則庶乎無負於天之牧矣王曰嗚呼念之哉伯父伯兄仲叔季弟幼子童孫穆王享國百年其同姓諸侯尊卑昭穆如此之多皆聽朕言庶有格至命有終不中終今爾罔不由慰安行自喜日日日也汪云音曰勤爾罔無或戒悔艾不勤他事不勤而能戒可也刑苟不勤而戒則傷人矣何可哉天以刑齊整于民俾使我君五刑五用一日之閒非終不能終天之事惟終能終天之事在人在典獄之人勤與不勤爾尚庶敬逆迎奉天命齊天之命以奉我一人雖畏人所畏勿畏雖休人所休勿休惟敬天德五刑以成三德剛柔正直所以權是刑之輕重與輕重之閒者一人有慶君之福也兆民賴之民之幸也其寧安王國惟永刑天討也畏之休之而上下其手則非天矣惟主敬而以天德用之則德成而君民皆蒙其福王國之長可必矣一云俾我屬之君也君豈能一日之閒終之哉所以惟終之者在典獄得人而已王曰吁來有邦有土并異姓同姓諸侯而並命之告爾祥善也好生之德刑在今爾安百姓何擇當擇者非人典獄之人乎何敬當敬者非刑用刑乎何度當審度者非及獄所連及株根枝葛者乎兩爭造造庭具皆備已在目前師羣有司公衆聽察斷五辭兩造之辭刑有五等五辭簡核實一云簡要辭審之當者也孚信正加于五刑五刑不簡不簡則可疑正于五罰降為贖金五罰不服疑出於枉正于五過降為過則宥之五過之疵病也謂以私意故縱惟官惟勢惟反報恩惟内女謁惟貨賄賂惟來徃來干請其罪私縱之罪與人所犯罪惟均同其審察之之精克能一云克己私之五刑之疑不簡有赦正於五罰五罰之疑不服有赦正於五過其審克之簡孚有衆師聽惟貌辭可偽貌不可掩有稽考無簡不聽斷具嚴畏天威刑降罰罰降過固天德也然苟以私行之反非天矣墨涅顙辟刑疑赦從輕其罰贖金百鍰六兩曰鍰閱檢實移其罪罰雖輕亦不可濫劓截鼻辟疑赦其罰惟倍二百閱實其罪剕刖足辟疑赦其罰倍倍二百為四百差又加一半為百鍰通五百鍰閱實其罪宫男割勢女幽閉辟疑赦其罰六百鍰閱實其罪大辟死疑赦其罰千鍰閱實其罪墨罰之屬條千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千上下比罪刑律也屬比例也人情無窮法所未盡則比例其輕重而上下之無僭差亂辭辭在此而差之彼辭本直而亂為曲皆斷獄之大弊勿用妄用不行條例偶無裁決不行惟察察情惟法守法其審克之此贖刑之令也上刑罪重適輕情輕下服服下刑下刑罪輕適重情重上服服上刑輕重諸罰有權權其情加刑刑罰世輕新國用輕典世重亂國用重典惟齊均齊非齊適輕適重世輕世重若非齊也乃所以均齊有倫倫數有要㑹要適輕適重一人情之輕重也世輕世重一代世之輕重也斟酌升降不拘於一若不齊而乃所以為齊此中也權也時也非有倫要者能之乎罰金懲小懲非不至死人猶極于病殫人財力亦不可差非佞口折斷獄惟良温良長者視民如傷折獄罔非在中中則輕重不差察辭辭有情偽于差前後異同處眞情可見非從偽辭惟從眞情哀矜敬謹折獄明澄定精神澡雪耳目啟問刑書法胥衆相胥占占度裁咸皆庶庶幾中正其刑其罰其審克之獄成獄詞成而孚得其情實輸奏之上而孚如其本情其刑上備一人數罪一罪數法奏於上必備載之有并兩刑并兩刑則從一重者斷備其載者有司制其義者人主也此獄成而聞於上也王曰嗚呼敬之哉官伯長族同姓朕言多懼非諳於世故不及此朕敬于刑有德之人惟刑今天相輔民作立司刑者配命天在下明清明而又清表裏洞徹于單偏辭兩造之辭曲直易分一偏之辭毁譽難辨民之亂爭競紛紜罔不中執中道聽于獄之兩辭不偏徇於一無或私家私於其家黷貨鬻獄于獄之兩辭獄貨賄賂非寶惟府聚辜罪功報以庶衆尤禍永當長畏惟罰天罰非天不中天之罰非天不中也惟人在命人所為善惡即天命禍福天所以罰不極不協於極庶民罔有令善政在于天下不極者不罰而待天罰是我私家而故縱之也其無令政甚矣爽惟天其罰殛我我之罪乎天之不中乎此可以觀世變矣虞書訓刑無此事可戒也王曰嗚呼嗣孫諸侯嗣世子孫今往以往何監視法非德實德于與民之中乎尚庶明聽之哉哲人惟刑無疆窮之辭獄辭屬附于於五五刑極各協於極咸皆中凡中一偏不可言咸有慶中則有福受王嘉善師衆監于兹祥刑降於民為中得於己為德中德一也用刑者無德則犯刑者失其中矣然則典獄之當監者非以徳而體民之中乎為嗣孫者可不明聽此訓乎是訓也惟哲人能盡之哲則天理明其於聽刑之際雖偽辭紛紛無窮而各附之極刑無不中而慶豈外至乎故斷之曰受王嘉師嘉之一字以見民之性本中本善其䧟於罪者非其本心也民嘉矣而吾之刑其可不祥也邪一云明聽聽刑也無疆之辭無窮之譽也尚書詳解卷十二
