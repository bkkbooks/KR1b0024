body:
  text: 尚書詳解卷六宋胡士行撰泰誓上第一周書晁錯從伏生受書時未有泰誓壁書出以巫蠱未列學官張霸偽書與伏生書並行至晉世古書出偽泰誓始廢惟十有一年武王伐殷一月戊午師渡孟津作泰誓三篇孔云周自虞芮質成諸侯並附詳見詩大雅緜詩以為受命之年九年而文王卒武王三年觀兵孟津卜諸侯之心退而示弱十三年更與諸侯期而伐紂歐公闢之以十一年為武王即位十一年序戊午即中篇惟戊午直係於十一年之下與書十三年不同者非序誤字則經誤字也一月者仲尼序書寓春秋之法也春秋十二公定無正月蓋以舊君已終新君未立故不書正而書一也泰誓惟十有三年春大㑹八百諸侯于孟津此未渡河以前王曰嗟我友順邦冢大君越及我御治事庶衆士明聽誓嗟之一辭武王豈得已哉惟天地萬物父母惟人萬物之靈神亶誠聰明作元后元后作民父母大哉乾元萬物資始至哉坤元萬物資生故稱父母元氣始生初無厚薄得其全者為人得其偏者為物性之神靈人皆有之而能盡其性者不皆然也故天必擇其誠聰明者以全天地不全之功此文元后之所以稱父母者以聰明不失靈耳非靈外别有聰明也今商王受弗敬上天降災下民沈溺湎嗜酒冒亂色女敢忍行暴虐殺罪人以族及父母妻子官人以世不以賢才而以父兄惟但宮室臺上髙榭臺上有屋陂澤障池掘地停水侈奢服衣以殘賊害于爾萬姓焚炙炮烙之刑忠良刳剔剖腹孕婦皇甫謐云比干妻天所以作元后者何為而乃如是邪天安得不怒皇天震怒命我文考父肅敬將奉行天威大勲功未集三分天下有其二肆予小子發武王名以爾友邦冢君觀政紂所為于商惟受罔有悛心乃夷安然居處弗事上帝神祇遺厥先宗廟弗祀犧牲粢黍稷盛在器既于凶凶人盜食乃曰吾有民有命罔懲止其侮慢心觀政云者武王謂我與諸侯尚顧君臣大分有不忍之心庻㡬紂之改耳奈何觀察其政積十餘年而紂昬暴日甚漢儒不察遂以觀政為觀兵謂十一年觀而十三年遂伐紂非也天佑下民作之君治之作之師教之惟其克相助上帝寵愛綏安四方有罪無罪紂之有罪無罪天實臨之予曷安敢有越過時厥志私心紂之伐天也武王何心哉同力度計較徳力同有徳者勝同徳度義時措之宜徳同有義者勝受有臣億十萬萬惟億萬心人各有心予有臣三千惟一心視此則我之徳義其勝紂必矣商罪貫盈如繩貫之之滿天命誅之予弗順天厥罪惟鈞同予小子夙早夜祗懼受命文考類祭于上帝宜祭于冢土社以爾有衆厎致天之罰天矜憐于民民之所欲天必從之爾尚弼予一人永清四海紂濁而武清之時天意哉弗可失時哉見武王見天已的不可失所謂勅天之命也時惟時惟幾之時非後世所謂乘機㑹赴事功之比也泰誓中第二周書惟戊午王次舍于河朔此已渡河羣后以師畢盡㑹合王乃循廵師而誓曰嗚呼西土周都豐鎬地在西有衆咸聽朕言八百畢㑹而立約束獨有西土者自近始也我聞吉人為善惟日不足凶人為不善亦惟日不足人心本不息如天行健在用之善不善耳猶為善為利皆孜孜焉雞鳴而起也人可誤用其心乎今商王受力行此所謂惟日不足也無度法播散棄犂面垢老老成昵親比近罪人淫酗肆縱虐臣下化之朋聚家于家作仇妬害脅恃權勢相滅無辜籲呼天穢濁徳彰著聞上聞惟天惠愛民惟辟君奉承天有夏桀弗克若順天流散毒害下國天乃佑命成湯降黜退夏命惟受罪浮過于桀剥害喪元大良善也謂微子啓賊殺虐諫輔比干謂己有天命謂敬不足行謂祭無益謂暴無傷厥監以古鑑今惟不逺在彼夏王桀天其以予乂民朕夢協合朕卜襲重于休美祥善戎兵誅商必克勝其者不敢必之辭也紂乃謂己有天命此興亡之所以異也夢卜者心與天地合也受有億兆夷平人離心離徳予有亂治亂臣十人同心同徳雖有紂有周至親不如仁人海濵之老天視目自我民視天聽耳自我民聽民心即天心百姓有過罹紂之害在予一人今朕必往我武惟揚作精神侵伐于紂之疆取惟取紂彼凶殘害民者我伐用張于湯有光此大勇也所以安天下也武之心即湯之心也行有不慊於心則餒矣朂勉哉夫子将士罔或無畏臨事而懼寧執自處非敵恐不能敵彼者乃所以制勝百姓懔懔危急若崩摧厥角首也畏紂之害嗚呼乃汝一徳一心立定厥功惟克永世泰誓下第三周書時厥明戊午明日己未王乃大巡六師明誓衆士王曰嗚呼我西土君子天有顯明道厥類善祥惡殃各以其類應無有或爽惟彰明武何心哉天亦何心哉今商王受狎侮五常荒怠弗敬自絶于天結怨于民斮朝渉之脛冬月見朝渉者謂其脛耐寒斮而視之剖賢人之心比干忠諫以其心異於人剖而視之作威殺戮毒痡病四海崇重信奸回邪放逐黜棄師保師保之臣屏除棄典常刑法囚拘奴辱正士箕子郊天社土不修宗廟祖不享祭作竒怪技藝淫不正巧以恱取恱婦人妲己列女傳曰紂膏銅柱置炭火於下令有罪者行之輙墮火中妲己乃笑上帝弗順祝斷降時喪爾其孜孜奉予一人恭行天罰古人有言曰撫安我則后虐我則讎古人之言非武王私言也獨夫受殘賊之人謂之獨夫洪大惟作威乃汝世讎樹立徳務滋多長除惡務本去惡本肆予小子誕以爾衆士殄絶殱乃讎爾衆士其尚庶迪進果致敬毅致果以登成乃辟功多有厚賞不迪有顯戮嗚呼惟我文考若日月之照臨光于四方顯于西土惟我有周誕受多方予克受非予武惟朕文考無罪受克予非朕文考有罪惟予小子無良此原我周受命之本歸之文王而不敢以已必伐紂之功也可謂無必無我矣牧誓第四周書武王戎兵車三百两一車兩輪虎賁驍勇之士如虎賁物三百人與受戰于牧野作牧誓牧誓時甲子癸亥已陳甲子王至而誓昧爽将明未明之時王朝至于商紂郊近郊牧野地名乃誓王左左手杖持黄金鉞斧右手秉執白旄牛尾以麾指麾曰逖逺矣西土之人王曰嗟我友順邦冢大君御治事司徒司馬司空三卿亞次旅衆大夫次於卿師氏周官所謂王舉則從者千夫長統千人帥百夫長及庸蜀羌髳微盧彭濮人八國之人舉小則大者可知稱舉爾戈㦸短比相並爾干楯以扞敵立立之地爾矛㦸屬長予其誓王曰古人有言曰牝雌雞無晨鳴晨牝雞之晨惟家之索窮盡今商王受惟婦妲己言是用昬棄厥肆富祀弗答昬棄厥遺遺𦙍王父祖母弟王父之弟同母之弟不迪教乃惟四方之多罪逋逃亡是崇重是長尊是信是使是以為大夫卿士俾暴虐于百姓以姦宄于商邑今予發惟恭行天之罰今日之事不愆過于六步七步坐作進退之節乃止不全追齊焉夫子朂勉哉不愆于四伐五伐六伐七伐攻刺擊戰之節乃止不貪殺齊焉朂哉夫子尚庶桓桓武也師直為壮如虎如貔如熊如羆四猛獸于商郊弗迓迎擊克奔不敵來奔以役勞西土朂哉夫子爾所弗朂其于爾躬有戮武成第五周書武王伐殷往伐自往伐歸獸至歸獸識記其政事作武成武成惟一月壬辰旁近死魄明生則魄死死魄朔也近死魄初二日也越於翼次日癸巳王朝歩行自周鎬京于往征伐商厥四月哉始生明三日王來歸自商伐商至于豐文王所都乃偃息武武功修治文文事歸馬于華山之陽南放牛于桃林之野皆近豐地示天下弗服用記所謂倒載干戈包以虎皮也丁未十九日祀于周廟邦甸侯衛駿大奔走執豆木籩越三日二十二日庚戌柴望詳見舜典大告天地山川武成既盡生魄十六以後庶邦冢君皆生魄之日二十二柴望盡此生魄以後之日如舜典既月乃日也暨百工受命于周魄月之輪郭黑明日暎而生明光月状如銀丸本無光暎日而生明遇朔而日月㑹以漸而離則月以漸而明至望則中天直對其明始滿又以漸而離則月又以漸而虧以至于晦朔初一月光蘇而魄死死魄黑暈減也初二旁死魄朏初三月出哉生明上弦初八魄死明生至半望十五日月相望光滿生魄十六日明減黑暈生下弦二十三魄生明減至半晦日盡月全黑王若曰嗚呼羣后惟先王后稷稱王者尊之也建立邦國啓開土邰公劉后稷曽孫克篤厚前烈遷邠至于太王后稷十三世孫肇始基本王迹居岐山之陽實始翦商王季太王子名歴其勤王家我文考父文王名昌克成厥勲虞芮質成誕大膺受天命以撫綏方夏大邦力强畏其力小邦弱懐感其徳惟九年大統一統未集合三分有二予小子其承厥志先王王迹王家皆有天下後尊之之辭也文王地方百里有徳而已何力之云曰畏曰懐大邦小邦自随所見而然耳文王何心哉厎致商之罪告于皇天后土所過師所過名大山大川神曰惟有道歸道於祖曽孫周王史追書發武王名将有大正正其不正于商今商王受無道暴虐殄絶天物天所生之物害虐烝衆民為天下逋逃主宗主萃聚淵如淵聚魚藪如藪聚獸予小子既獲得仁人敢祗承上帝以遏止亂略為亂之謀略華夏中國蠻貊夷狄罔無不率相率俾使恭天成定命肆故予東征自西土東征綏厥商士女惟其士女篚盛厥𤣥黄幣昭明我周王當為王天休美震驚動民用附歸我大邑周惟爾有神尚庶克相予以濟拯救兆民無作神羞濟民一念對越神眀既戊午師逾過孟津癸亥陳于商郊俟天休美命甲子昧爽受率其旅若林㑹于牧野罔有敵于我周師前居前徒徒衆倒回戈攻于後以北血流漂杵一戎衣天下大定戎衣一衣天下即定乃反還商湯政政由用舊不改舊法釋放箕子囚紂所囚封髙比干紂所殺之墓式憑式敬之商容賢人紂所貶之閭門散鹿臺之財發鉅橋之粟鹿臺鉅橋紂厚斂所聚之地大賚予于四海而萬姓恱服列爵惟五公侯伯子男分土惟三公侯百里伯七十里子男五十里建官惟賢位事惟能賢之於事有能有不能居位任事必各随其能重不輕民五教五常之教惟食衣食足而後知禮節喪謹終祭追逺惇厚信有信者明顯義有義者崇重徳有徳者報荅功有功者垂衣拱手而天下治無為而治此天地重開之氣象也釋囚封墓式閭則君子賢其賢而親其親散財發粟大賚則小人樂其樂而利其利此未歸周時政事也列爵分土封諸侯也建官位事任百官也教食喪祭厚民生也惇明崇報勵風俗也此歸周後政事也其文理密察之政行乎公平廣大之中物付物事付事各得其所垂拱無為天下自治唐虞之治恍然若存於千載之下也尚書詳解卷六
