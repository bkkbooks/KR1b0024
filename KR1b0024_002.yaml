body:
  text: 尚書詳解卷二宋胡士行撰大禹謨第三虞書臯陶矢陳厥謨九徳之謀禹成厥功六府三事之功帝舜申之發揚暴白之使功與謨申而不屈於此見舜得君道焉林云申重也陶謨矣而舜以時乃功申致其功禹功矣而舜以汝亦昌言申致其言唐孔氏曰重美二子之言作大禹臯陶謨益稷虞史既述二典義有未備又敘其君臣嘉言善政為此三篇三篇意本相屬連古人編竹簡成書所載不能多故析之因取篇首所載以名非禹自禹臯自臯而益稷自益稷也此三書所以一序也先謨後功或以為功發於謨非也事辭之敘然也大禹謨曰若稽古大禹曰文徳命教敷布于四海祗敬承奉于帝此史述禹之德如堯舜典也吕云禹聲教訖四海方承於帝有君民之大德有事君之小心也重華有日月之意祗承則坤順承天之象而已此帝王之間也曰后克艱難厥后臣克艱厥臣政乃方乂治黎民敏勉速德此禹陳克艱之謨於舜也克艱者聖人相傳之道即堯舜所謂欽也為君難為臣不易政之本也本立則政乂上之艱下之敏感應之速有不期然而然者矣帝曰俞允信若如兹此心總意㑹一俞之外無餘辭兹者此外無餘理也嘉美言罔無攸所伏藏野無遺棄賢萬邦咸寧稽考于衆舍己己見從人人言不虐無告不廢棄困窮惟帝堯時是克從此舜信禹謨而舉堯克艱之道證之罔伏無遺矣方稽而從焉咸寧矣方懼其虐且廢焉此克艱之道惟堯時克也稽從知人也不虐廢安民也臯謨所謂帝其難之者也堯豈有如後世虐廢之政哉其哀憫之念一豪不到則堯以為若虐廢之矣益曰都美辭帝堯德廣大運流轉不息乃聖大而化之乃神聖不可知乃武戡定禍亂乃文經緯天地皇大天眷顧命奄合有四海為天下君孔云此益因舜言又美堯也大而不運猶可名也大而運之則化矣大可言也化不可言也乃謂之聖乃謂之神乃謂之武文名言之不可也故天命而君天下焉此克艱一念之不息所致也吕夏以惟帝為益美舜禹曰惠順迪道吉從逆非道凶惟影應形響應聲迪則吉逆則凶非於善惡之外别有禍福也其應之速可知迪即克艱之道益曰吁歎戒謹哉儆懼戒無可虞度之事罔失法度舊章也吕云不獨政事紀綱之謂一身之間動作飲食罔不有之所謂動容周旋中禮是也罔遊過于逸安罔淫過于樂任用賢勿無貳二心去邪邪人勿疑疑謀勿成可疑之謀如詩所謂築室于道謀也行之必無成事故勿成之或云邪人為疑謀以間賢人百志心所之惟熙廣大也或曰明或曰安罔違道以干求百姓之譽因民譽可以驗已治舍大道而行小惠以干之則不可罔咈逆百姓公以從己之欲私無怠惰無荒縱四夷東夷西戎南蠻北狄來王朝此克艱之目也天下無事上恬安下熙樂而治忽亂之幾微起每伏藏於意度之所不及到正克艱時也守法度而無遊淫修身也任去堅而絶疑謀尊賢也熙百志以順百姓子庶民也無怠荒而四夷王來逺人也勿焉罔焉事事而戒之也禹曰於歎美辭帝念哉前言保功而推其原於君心也德惟善政莫非政也以德乃善政在養民在者不可他求也水火金木土穀天地間常用之物惟修裁成六者使遂其性為利而不為害正德正民之德謹庠序之教也利用宣道流通使士農工商各安業厚生五畝宅百畝田以培養民生惟和三者施之天下無有差戾九功惟修之六府財用之所自出惟和之三事人事所當為九者皆有成功惟敘各得其叙而不失其和九敘惟歌民被其澤而歌詠之戒儆民之用以休賞言能保功之美董督之用威罰言不能保功之禍勸感發之以九歌因其出於人心者還以勸之使之自不能已俾使勿壞敗此因益儆戒無虞之意而啓帝念以保九功也以德為政而養民修和敘而歌矣方戒董勸之使其成者勿壞焉俾者聖人裁成輔相以贊消息盈虚之理一念之無窮也吕云正徳以正其心利用厚生以養其生養其生亦所以正其心所謂日用飲食徧為爾德也戒董以刑賞示之在外之事也九歌以聲音養之在内之事也一說六府以養民之心教之也一說帝以念哉敘九功帝曰俞信禹之言地平天成六府三事允信治萬世永長賴藉依時此乃汝功洪水之害不特地失其髙下之宜而天所以始萬物者亦不能成功所謂平成允治者禹平水之功也惟勿壞故永賴萬世之逺可於其一念預占之帝曰格來汝禹朕宅居帝位三十有三載自除堯喪即位後耄八十九十曰耄期百年曰期頤倦怠于勤汝惟不怠總統朕師禹有正天下之大功則可以為天地主舜時年九十五心不息而精力衰於勤之中察其若倦政欲以禹之不怠代己蓋聖人不以天下為樂而以為憂不敢一念息也禹曰朕德罔克能勝民不依歸附此舜讓于德弗嗣之意禹克艱而以罔克自處此所以為不怠也臯陶邁逺種如農種植栽培德德乃降沛然下及黎民懷愛之帝念念臯陶哉念兹在兹釋兹釋而不念在兹亦在此名言指其事而言之兹在兹允出不言而反其心之所出兹在兹惟帝念功民懷之功此禹舉臯陶自代而使舜不忘也念不念言不言皆在臯陶如參於前倚於衡也帝曰臯陶惟兹臣庶罔或有干犯予正法汝作士士師明明示于五刑以弼助五教刑教對立出此則入彼期望也立意至此地也于予治刑明刑期于無刑民協合于中時此乃功懋勉哉此舜因禹讓臯陶而美之也士刑官也而惟以弼教期於治期於無刑而已協於中則不干於正矣此其功有超於刑官之外者不亦懋哉臯陶曰帝德罔愆過臨蒞下臣以簡不苛細御制衆民以寛不急迫罰罪弗及嗣子孫賞功延長及于世後世宥恕過誤無大雖大必宥使得自新刑故故意無小雖小必刑使不長惡罪疑重而疑輕惟輕寧從輕功疑輕而疑重惟重寧從重與其殺誤殺不辜罪寧失誤故縱不經常好生生民生之德洽浸入于民心兹此用所以不犯于有司士師此臯陶因舜美已而推其原於舜也罔愆意極淵源非盛德之至剛健純粹質天地而不疑開百聖而不慚歴萬世而無弊者何以至此臨而簡有統宗㑹元之意御而寛有天覆地載之意好生之德皆自此發上不忍薄其民民忍自薄乎此其所以不犯也刑故者滅趾之義也易噬嗑卦初六履校滅趾无咎上九何校滅耳凶無此則好生之德不備蓋不俟其大而戢之厚德深仁無越於此漢宣綜核信必何舜於名實之不定功罪之多疑也漢宣焰火之光舜天地之量也帝曰俾使予從如欲以治四方風君子之德風動惟是乃之休美罔愆以下皆舜所欲使如所欲者臯之弼教也風動則如風之披拂有使民遷善而不自知之妙是臯之刑非刑也德教也休孰大焉帝曰來禹洚水水逆行謂之洚水儆天戒予成允信成功惟獨汝賢災異之來天所以儆聖人也聖人以天地萬物為一體一物不順無非儆予公孫𢎞謂堯使舜治水未聞舜有洪水也舜當時認為己責而𢎞於百世下欲歸之堯聖人小人之用心相萬也鯀湮洪水人方疑之而禹遽能使人之信必有不言之孚矣信成於未治水之先功成於人已信之後當堯之世一人而已克勤于邦在邦不自怠克儉于家在家不自奉不自滿假大惟汝賢成大功之後而方勤儉焉則滿假之心何自而生汝惟不矜誇能天下莫無與汝爭能汝惟不伐誇功天下莫與汝爭功天下之理無獨必有對矜伐者爭之對也不矜伐則無我無我則無對無對則無爭矣予懋盛乃徳嘉美乃丕大績功天之厯數帝王相繼之次第如歲時節氣之先後在汝躬汝終陟升元大后君以不矜伐之徳而見於平成大功之後禹之心純乎天也天之厯數非自外至不可辭矣人心動與物接惟危難安道心靜與理俱惟微難見惟精不雜惟一不二允信執守厥中不偏人心氣情欲動出應喜怒哀樂之已發道心理性理靜入定喜怒哀樂之未發危過動不過動微過靜不過靜精明不差察動靜之理一誠不二守動靜之正堯之一言允執中中則不危微舜之三言精一危微允執則精一天下雖大治之在道四海雖廣治之在心舜將傳天下於禹故告以傳道傳心之要焉帝嚳執中以徧天下堯以允執其中命舜而舜之命禹也又以帝允執之一言演為危微精一之三言心一心也其未發而靜為道下愚亦有之其已發而動為人上聖亦不能無道心善人心亦無不善也惟一於動而膠擾焉則危矣一於靜而寂滅焉則微矣人心道心心之本體然也危微則不能養心之過也惟精焉以察之而不差一焉以守之而不二則危微之失去而心之本體全矣允執則精一之謂也中則不偏不倚天所賦人所以之正融道心人心為一乃心體之全當其可而不危不微者也舜之三言所以釋堯之一言也治天下國家之要無餘藴矣吕云人心私心也道心善心也或云人心危則道心微人衆而勝天也精一執中則天定而勝人矣或云危溺於卑汙為不及申韓是也微蕩於髙虛為太過老莊是也中則無過不及而不危微矣無稽考於古之言勿聽弗詢言於人之謀勿庸用此恐其為心害也閑防邪所以存誠允中也孟子論養氣而必曰我知言夫子曰不知言無以為君子蓋聽用之際一有不審則耳目官誘於物有不搖其心之官者乎勿聽勿庸此亦用工於精一處也可愛惜非君乎可畏者非民乎衆民非元大后君何戴仰望后非衆民罔無與守邦欽哉慎乃有位天子位敬修治其可願可欲之謂善四海困窮天祿永長終孔云能無困窮則祿長保其終夏云若民窮則天祿長絶戒之也前既傳以道以心此乃言傳天下之事也民非君何戴則可愛者非君乎君非民罔守邦則可畏者非民乎君民相須之勢如此可不欽不慎不敬乎欽之一字此堯舜心法也一云君位固可樂民碞亦可畏可不保民以終君之祿惟口出好賞興起戎兵罰朕言不再出好口也興戎亦口也遜位之言一出其可再乎所謂天子無戲言也禹曰枚枚如箸數一二之籌卜功臣惟吉之從禹前讓臯陶帝不允矣又請枚卜之帝曰禹官立時人作卜筮占惟先蔽斷志心昆後命于元大龜朕我志先定詢謀僉同鬼神其依倚龜卜筮蓍協從卜不習重吉心者神明之舍志定矣以次而謀之人謀之鬼謀之卜筮非泛然無主而委之占卜也豈容有習吉乎禹拜稽首固堅辭帝曰毋無惟汝諧固辭者恐天人之未從也諧則和同天人之際矣正月朔旦受命于神宗祭法夏后祖顓頊而宗堯率百官若如帝舜之初初位若帝之初謂在璿璣以下至巡守也帝曰咨禹惟時是有苗弗率循也從也汝徂徃征正其罪禹攝位代總萬幾而舜之尊為天子自若也國有大事猶稟命焉有苗之國左洞庭右彭蠡負恃固險不服舜誅四凶竄其君於三危更立一君以紹其國至三載黜陟後又分北其黨至此卒不率教命禹征之禹乃㑹合羣后誓告于師兵曰濟濟盛和有衆咸聽朕命以上伐下有征無戰況堯舜之時不戰屈人兵猶誓云者臨事而懼故也濟濟整肅不亂也蠢無知兹有苗昬暗迷亂不恭不恭者百罪之總也侮慢自賢反道敗德君子在野小人在位民棄不保天降之咎肆故予以爾衆士奉辭天討之辭伐罪爾尚庻一乃心力其克有勲雖聖人不得不戒彼宋襄之不擒二毛者是自欺以教其衆心力之不齊也三旬苗民逆違命此一氣之春萬𩔖發生而隂崖深谷固隂凝結獨未芽甲也益贊佐于禹曰惟德舜徳動感天無逺弗届至滿招損謙受益時乃天道易曰天道虧盈而益謙帝初帝側微時于歴山耕歴山徃于田日號泣于旻閔天于父母負自任罪引引歸已慝惡祗敬載事見瞽瞍夔夔恐懼齊敬栗戰瞽亦允信若順至極誠德和感神矧況兹有苗贊如贊化育之贊禹本有此心而益助成之也不罪苗而自反謙也瞽之允若舜亦自反得之舜德之誠如此神且格矣而況苗乎禹拜昌善言曰俞班還師振整齊旅帝乃誕大敷布文德舞干武舞羽文舞于兩階賔主階七旬有苗格神領心㑹拜而俞之如曽子之唯無疑滯也班師振旅略無躊躇之意帝德之敷素矣至此不間以用兵而益大敷之兩階之舞朝廷閒暇禮文之彛非有意以服苗也而苗自格蓋陽和之暢至是而寒谷皆春矣苗始叛至是五六十年然後心恱誠服聖人優游寛大之政天地之造也臯陶謨第四虞書臯陶謨曰若稽古臯陶選衆舉臯不仁者逺左禹右臯分位皆亞聖也故禹臯古與二聖並稱曰允至誠迪啓厥君德謨進言明弼輔諧和此臯與禹言人臣以至誠啓迪君德謨明矣而弼欲諧蓋不諧則詆訐太甚非優游饜飫以入之道也孔云言人君當信蹈行古之德謀廣聰明以輔諧其政吕云有德必有言此史臣言臯陶惟允蹈其德故以謨則明以弼君則諧允蹈者實用工踐履之地謨之所從出也禹曰俞如何此禹問謨明弼諧之道何如也臯陶曰都慎厥身修思永長久之理惇厚敘次序九族庶衆官明明白勵勉翼輔戴其君吕云敢也邇近可可以逺及逺在兹此理身修則家齊國治天下平皆自此出此至近而可及逺之理也禹拜昌言曰俞孟子所謂禹聞善言則拜不自滿假之工夫也臯陶曰都在知識人在安民此逺在兹之綱目也在者兹定而理决無大於此者矣知人安民臯謨一篇綱領九德以下知人之道也天敘以下安民之道也禹曰吁歎其大咸皆若如時此惟帝堯其難之知人則哲明能官使人安民則惠黎民懷之能哲而惠何憂乎驩兜何遷乎有苗何畏乎巧言令色孔甚壬佞也此靜言庸違之共工也四凶不及鯀為親者諱也禹實知用工非學問口耳間者故聞臯謨而驚歎謂堯猶難之也蓋堯之哲必無一人之不知堯之惠必無一民之不懷其道至大所謂其猶病諸者非病其難而不能行也兢兢業業思其難以圖其易何憂何遷何畏難之之效也臯陶曰都亦行人之德有九德亦言其人有德乃言曰載行采采事此言人之行為德有九亦言其有德矣猶恐其為空言也乃又言以告於衆曰其載之行者事事可考也夏云取人以身必已之行有九德也乃可言人之德禹曰何問九德之目臯陶曰寛而栗有栗則寛而不縱柔而立有立則柔而不懦愿誠樸而恭貌曰恭則愿不失之太樸亂才能治亂也而敬敬則不恃才而傲物擾馴而毅果毅則擾不至於弱直而温温和而直不至於徑行簡略而㢘有亷隅則簡不至於疎剛不屈而塞塞實則剛不為虛氣彊執己見不為衆撓而義則彊不失之自任彰明而不昬厥有常德之長久不變者吉為國家之福哉簡亷疎剛德三剛剛善塞剛惡虚氣彊義自任亂敬恃才正直三直近剛善温惡徑行擾毅弱寛栗縱柔德三柔柔善立柔惡懦愿恭太樸此洪範三德也寛柔愿柔德之三也亂擾直正直之三也簡剛彊剛德之三也上九字人之性質所固有者下九字學問涵養能長其善救其失者也有此九德而能常焉彰而用之吉孰大焉日日日宣達三德九德之中有是三者夙夜浚深明浚明之象整整有條而不紊也有家卿大夫之家日嚴莊祗誠敬尊禮六德九德之中有其六者亮明采事有邦諸侯之國翕合受容敷分施用九德咸皆事任事俊才過千萬人乂才過百人在官百僚同官師師相法百工官惟時惟理之是一說作四時之時綴下五辰撫于五辰木火土金水天之五星庶衆績功其凝聚而不散此言天子所用木火土金水木春夏季秋冬春前言九德之目此言天子諸侯大夫治有廣狹其用德有詳略三德六德言家邦得此足以為治非謂不可在三六之上若孝經所謂爭臣幾人之𩔖若天子則非合九德而用之不可天以五行布萬化人稟受五行之秀清氣以生在人之九德即在天之五辰也其撫其凝一理而二分天人二天人分而一共此理也無教君者臣之師逸安欲私有邦有國之常或曰侯邦也兢兢戒慎業業恐懼一日二日萬事幾微無曠廢庶官天工事人其代之兢業者敬之形容也幾者動之微也一日二日之間幾事有萬少有不敬善惡判焉敬天德也君臣代天理物非交致此敬如天之為不可也天敘子人自然之序有性中有此典常理勑正齊我自君五典見舜典五使皆歸惇厚也惟民生厚天命之性本有此五常之理勑之歸厚還其本然之天也哉天秩有禮人羣則禮生其等差皆天理之自然自我五禮有庸用哉同寅敬協恭和衷天降之善哉五禮吉祭凶喪軍兵賔客嘉冠昬典敘禮秩天命之謂性也五惇五庸修道之謂教也寅恭衷典禮之根本也君臣聚精㑹神與天無間則所惇所庸皆天不然則虛文矣同協和敬畏之意有加無已也一云同協君臣之寅恭以和民之衷一云同協和君心之無間也天命有德五服見益稷五章彰其徳哉天討有罪五刑五用哉政大綱事小紀懋勉哉懋哉典禮言我而命討不言我者典禮必自天子出而賞罰則純乎天而已天者此理之公也爵人於朝與衆共之刑人於市與衆棄之天子不得而私焉勉而又勉與天不息息則有我之私乘間而生矣天聰聽明視自從我民聰明天明顯畏可畏自我民明威明畏福善禍淫明威撫后虐讎達于上天下民敬哉有土有土之君奉天畏民前言典禮命討皆本之天然天豈髙逺茫昧哉民心之天即天之天也民不可欺天可欺乎聰明則於典禮命討之得失了然善淫撫虐之分而禍福后讎豈不顯而可畏乎天民一理徹上徹下有土之君奈何不敬臯陶曰朕言惠順可底致行否禹曰俞乃汝言底可績用臯陶曰予未有知不敢自足思日贊贊相助襄成哉可者質之禹問其可不可也禹以為可矣方退然自處於未有知但思日相與助成而已賈誼治安策視知人安民之謨未能萬分之一也而才略如不勝用曰醫能治之而上不使其氣象何相逺哉孔知思絶句以贊贊襄哉為贊奏上古之事而行之一云惠安民也知知人也知人難於安民故於惠曰可而於知曰未也益稷第五虞書益稷此與前篇文勢相接以便竹簡分為三帝曰來禹汝亦昌言承前篇臯己昌言言禹拜曰都帝予何言予思日孜孜不忘此禹深見天下之理無窮其用心在純亦不已之地孔子所謂不知老之將至云爾也禹憂其職之未盡如此何暇分其心於陳謨臯陶曰吁如何臯用工造到禹地位故歎而問孜孜之㫖禹曰洪水滔天浩浩懷山襄陵下民昬瞀墊溺予乘四載水陸泥山隨山刋伐木除障蔽暨益烈山澤奏進庶衆鮮新殺食鳥獸魚鼈予決疏滌九川九州之川距歸至四四方海濬深畎廣尺深尺澮廣二尋七尺深二仞八尺距川暨稷播種奏庶艱食穀洪水時難得鮮食以鮮食兼之懋勉民遷有無遷有置於無之地化質易居所積烝衆民乃粒粒食萬邦作乂治水乘舟泥乘輴以板為之狀如箕以擿行泥陸乘車山乘樏以鐵為之形如錐長半寸施之履下以上山不蹉跌乃者深見艱難之意洪水之平非一手一足之力一朝一夕之故然後乃得粒食以其成之之難而思保之之不易正其持敬不息之工夫所謂日孜孜者非自誇其功也遷化貨也洪範一曰食二曰貨臯陶曰俞師法汝昌言禹雖退處於何言不以謨自鳴然所言如此昌孰加焉禹曰都帝慎乃在位帝曰俞典謨之例吁者憂懼之辭都者歎美之辭謹位當曰吁而曰都者禹體得艱難戒懼中有樂地也禹曰安宅汝止心所止大學所謂於止知其所止為人君止於仁是也惟幾微者著之端惟康安者危之伏其弼輔直忠告不欺惟動幾者動之微動者幾之發丕大應答徯志天下徯望治之意以昭昭然無愧受當上帝天心天其申重命用休美以以形體謂之天主宰謂之帝安止幾康則内得其養弼臣忠直則外得其養内外交養則有不動動而答民情當天心皆自人主一心中來矣吕云康靜時言安止之工夫微時靜時最切天佑下民作之君師能應徯志則能昭受矣帝曰吁臣哉鄰近哉臣之道當如鄰之職鄰哉臣哉鄰之職乃盡臣之道夏云鄰禹之僚屬也禹曰俞帝領禹之言知左右頃刻不可無人帝曰臣作朕股足肱手耳目鄰之喻禹俞之矣帝心未巳也又申以股肱耳目之喻蓋心所欲為股肱耳目不待命令而應又切於鄰也予欲左右扶持有民汝翼輔此作肱之事也手能左右扶翼予欲宣布治功力四方汝為代君為之此作股之事也奔走四方待力乃至予欲觀古人黄帝堯舜垂衣裳而天下治之象衣裳繪繡以物象德日月星辰三者象其照臨山象其靜而能興雲致雨龍象其變化無方華蟲雉象其文作㑹繪上衣六章以采色繪畫宗彛宗廟尊彛為虎蜼之狀亦以山龍華蟲為飾藻水草象其有文火象其炎上成物粉象其潔白米象其養人黼白黒相半象其能斷黻亞兩已相配象其辨善惡以青白線刺絺刺繡下裳六章以絺繡之以用五采五等采色彰明施用于於繪上五色作五色繪繡作服汝明視虞五服天子十二章上衣六日月星辰山龍華蟲下裳六藻火粉米黼黻孔氏說鄭氏說諸侯八章公山龍而下龍至黻卿六章侯伯華蟲而下藻至黻大夫四章子男藻火而下藻火粉米士二章卿大夫粉而下藻火周五服周以日月星辰畫於旗冕服九章而已公九章衮冕以龍名龍首卷然上衣五龍山華蟲火宗彛下裳四藻粉米黼黻侯伯七章鷩冕以華蟲名鷩雉名也上衣三華蟲火宗彛下裳四藻粉米黼黻子男五章毳冕以宗彛名彛虎蜼狀毛淺亂上衣三宗彛為虎蜼狀下裳二黼黻孤三章希冕上衣一粉米下裳二黼黻卿大夫𤣥冕衣無文裳刺黻此作目之事也鄭以宗彛為下裳第一章而粉米為一章絺孔云細葛也鄭云讀為薾紩而栗反也紩以為繡也予欲聞六律五聲八音在察政治忽亂以出納五言仁義禮智信五德之言汝聽此作耳之事也詩言志歌永言聲依永律和聲八音克諧無相奪倫聲音之道與政通矣此舜欲審樂以知政也納採民詩也出颺之樂還以教民也觀其言合於五德則治不合則忽吕云受君之言播之樂為出採民之言播之樂為納五言使合於宮商角徵羽之五音也欲者予之心也翼為明聽所以從予欲者汝也此猶股肱耳目之從心所欲也予違過汝弼正陳汝無面從面是退有後言背非前以有民四方觀象作樂托之矣至此遂以一身之是非盡付之委之切也違也面從也舜禹無是也而不忘是言此其為大聖人也欽四鄰左輔右弼前疑後丞此欲禹比肩聯事之人皆以弼違為職也師臣者帝賔臣者王友臣者霸自古無不以欽大臣而興者庶頑不率教讒邪說若如不在時是侯射侯之禮射者心正而後能中揖讓升下非教不可以明之發明其敬心吕云本明其善惡撻教刑也或云射之籌以記使記憶之書簡用識記其過使見而媿心生哉欲並皆生還其有生之善心哉工樂工掌誦詩之官採詩以觀民風以納言庶頑之言時及時而颺播之詩者人之性情也觀其言可驗其格否格改則承章之庸任用之否則威刑之前言欽鄰敬君子也此言庶頑化小人也唐虞之時天下無小人也非無小人也難乎其為小人也何難乎為小人蒙聖人之教不得而為小人也一云取其言之是者諷之樂以感化之侯禮也言詩也禮以制之之嚴猶未若詩以感之之貞也夏云讒說小人有才辨正所謂面從退言者禹曰俞哉然其言而猶有可言帝光德光照天之下至于海隅角蒼生草木蒼然而生之地萬邦黎衆獻賢共皆願惟為帝臣惟隨帝時是舉用敷納以言明庶衆以功車服以庸誰敢不讓敢不敬應帝不時若是敷普同日日日奏告罔無功前言撻識規模似迫故禹未盡以為然謂帝統大體示大法以臨警之則孰不精白承休遜讓而敬應何頑讒之足憂不然則人皆以罔功告矣無若丹朱堯子傲惟慢遊是好傲虐是作罔晝夜頟頟不休息之狀罔水行舟逞力朋黨淫于家用殄絶厥世堯不與以天下舜豈有是哉聖人以天地萬物為一體一物順無非所以發吾之良心一物不順無非所以警吾不善之端所謂思齊自省者也予禹創懲也見惡而為善之力因而得致也若時是丹朱娶于塗山氏辛壬癸甲辛日娶妻甲日即徃治水啓禹子呱呱泣聲而泣予弗子愛字惟荒大也詩云大王荒之度土治土水功禹過家門不入以天下為已憂而忘其私愛弼助成五服甸侯綏要荒之制自古已有洪水圯之水平復舊至于五千每服五百里東西相距五千里南北相距五千里州十有二師自甸至綏十二州之内每州一師外薄迫四海要荒在四海之外咸皆建立五長各迪蹈行有功苗頑弗即就工事帝其念哉五服五千圖見禹貢成五服立師長内外相維人人皆迪功矣而苗獨不即工禹使帝念正欲其致力於未盡之工夫不特苗頑當念天下事盡在艱難中天命之不已也帝曰迪導朕德時是乃汝功惟敘秩然有序臯陶方祗敬承厥敘功方施象刑惟明迪德歸迪有功之功於禹也象刑任弗即工之責於臯也舜一無所與焉君臣一體本無間也敘則所以迪德者不迫矣象刑而祗其敘焉豈徒刑哉夔曰戛擊柷敔鳴球玉磬石音也搏拊以韋為之實以糠所以節樂也琴瑟絲音也以詠歌人聲也祖考來格虞賔丹朱帝子以客禮之在位羣后德讓此堂上之樂也郊特牲曰歌者在上匏竹在下貴人聲也下堂下管竹音也鼗鼓小鼔有柄摇之而自擊出音合止柷柷如漆桶中有椎柄連底撞之令左右擊樂始作柷以合之敔敔狀如伏虎背上鉏鋙刻以一尺木擽之樂將終敔以止之笙列管於匏中又施簧於管端二十三管為簫十三管為笙鏞大鍾以間迭奏鳥獸蹌蹌和簫參差管言細器之備韶舜樂名九成九變而樂成鳯雄凰雌來儀有容儀此堂下之樂也治定功成而樂作焉泰和之氣鼓舞動盪如此虞賔羣后鳥獸鳯凰百獸皆在舜和氣中史臣以此結虞書五篇之終也夏云案古文尚書簫字從竹從削舞者所執左傳季札觀周樂見舞韶箾者說文箾字注云舜樂名箾韶曰簫管者非古書本意也戛擊搏拊皆擊考之義夔曰於予擊石拊石百獸率舞庶衆尹官之長允信諧和獸且舞況庶尹乎季札曰至矣盡矣如天之無不覆地之無不載雖甚盛德蔑以加矣孔子曰不圖為樂之至於斯也下之千餘年見聞之者如此況當時乎此豈徒樂所能及哉夔蓋推美舜德非自誇也帝庸用此作歌曰勑整天之命惟時惟幾時之微維天之命於穆不已天下萬事無非天命之流行勑之工夫少間則不得其正矣時者時時而勑之頃刻之際幾微之中無一豪不勑純亦不已也此舜居太平極治之心也夏云天命眷顧已安已治然必趨時察微以保之乃遂歌曰股肱大臣喜樂於赴功哉元首君起興起不留滯哉百工羣臣之事熙廣哉此三百篇之權輿也君對臣言則先股肱臯陶拜手稽首颺宣言曰念哉念帝所歌率相率作為興起事功慎乃憲法欽哉屢數省察乃成成者事之所成一云已成之功欽哉颺言以宣告於庭也於作興中而必守法焉且屢省而後成其持敬也至矣乃賡和載成歌曰元首明哉識大體股肱良忠哉庶事康安哉君明而已臣良而已事康而已行其無事此持敬於作興中之意也臣稱君則先元首又歌曰元首叢雜脞細也不識大體則不明哉股肱惰哉君行人臣之事則臣廢事萬事墮壊哉九官分職帝不親也反是則墮矣帝拜曰俞徃欽哉徃欽哉一語古人所謂堯舜雖没千百年而其心至今猶在也治定功成陶為至和不知手舞足蹈而歌作焉曰勑天之命其至樂乃在警戒畏懼中臯陶聞之天機自動當鋪張揚厲而不出規矩準繩之中所以見情性之正也舜之時恭已南面禮樂著法度彰羣賢布職但總其大綱不可復加所謂无妄之徃何之矣君父無拜禮而拜焉者言為帝者師也尚書詳解卷二
