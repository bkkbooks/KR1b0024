body:
  text: 尚書詳解卷十宋胡士行撰君奭第十八周書召公為保周公為師相成王為左右召公不恱不喜久居重位周公作君奭留之周公昔有明農之請矣不欲居成功也召公之不恱此意也或以為不恱於周公誤矣君奭周公若曰君召公封燕奭以名相命周初猶質弗弔殷道不至天降喪于殷殷既墜厥命我有周既受我不敢知曰厥基業永長孚信于休美若順天棐輔忱誠我亦不敢知曰其終後出于不祥美殷喪而周受之天何常哉其休其不祥我敢曰知以必之天哉惟盡吾誠而已嗚呼君奭已向已嘗曰時是我在我我亦不敢寧安逸于上帝命弗永逺念天威越於我民罔尤怨違背惟人在人我不敢知惟疾敬德之説召誥言之是召公往日所言已曰在我可必而已豫敢寧帝命而不念其威乎天民一也民無尤違責亦在人召公正當與周公共圖之可去乎在我後嗣子孫大弗克恭承上天下地遏絶佚失前人光在家不知注絶句天命不易天難諶信乃其墜命弗克經歷久嗣前人恭明德在今豫小子旦非敢克自謂能有正正君迪啓導惟前人文武光明德施用于我沖子成王天之命前人之德後人未必深知也萬一有之遏佚弗經歷之禍可不凜凜故豫非敢謂能正君而其以前人光施之沖子者則不敢怠召公可不體此而勿去乎又曰天不可信不敢知我道我之道惟寧王德延長天不庸輕釋廢于文王受所受命天無聲臭儀刑文王求天於天不若求天於文王也公曰君奭我聞在昔成湯既受命時則有若伊尹格感于皇天遍覆包含以形體言在太甲時則有若保衡太甲以先朝老臣呼為保衡在大戊時則有若伊陟臣扈格于上帝以主宰言巫咸乂治王家天帝一也此章對言之則見聖賢之分焉帝以存主言也天則渾然天體不可以存主言也前之尹即後之尹而後之甲戊非前之湯也咸之治功在王室而精微之藴猶愧二臣故别言之在祖乙時則有若巫賢在武丁時則有若甘盤舊學率循惟兹此道有陳列保乂有殷湯甲戊有聖賢之異尹事湯甲有前後之異咸陟扈有優劣之異巫賢甘盤各著一朝均為乂殷無所疑混舍説舉盤者盤源説委流先河後海也一云率惟有陳以下乃總結伊尹以後一代輔相之事故殷禮祀陟上配合天多歷年所天惟純全佑命則商實富貴百姓民此輔相有人之效也夏以百姓為百官族姓王人商王夏氏以為王人雖微之王人罔不秉守德明顯恤比小臣內言小臣舉其目也小則大可知屛藩侯甸外言侯甸舉其綱也矧咸內外皆奔走宣力惟兹此惟德稱舉用乂助治厥辟君故一人有事政事于四方若卜筮神罔不是孚信此亦輔相之效也王秉德以明恤內外之臣而內外之臣皆稱德以助王苟有為焉民有不顒若者乎公曰君奭天壽所壽者平至平無私格道徹三極之君一云至也保乂有殷有殷嗣紂天滅亡之威可畏今汝召公永念則有固定命厥亂治明我新造立邦天所壽者平格無私壽也保殷方切紂不平格則遽奪之矣何可常也召公能永念則天命乃固其相與亂新立之周邦可也而可去乎公曰君奭在昔上帝割制注絶句申重勸勉寧王文王之德其集合大命于厥躬惟文王尚庶克修治和柔我有夏亦惟有若虢封國叔字文王弟有若閎氏夭名有若散氏冝生名有若泰氏顛名有若南宮氏括名五臣共輔文王又曰文王猶曰無人能往來奔走兹迪道彝常教文王蔑精微德降下于國人亦惟五臣純佑助秉執德迪知天威乃惟時是昭顯文王迪蹈行見顯見冒下民覆聞上聞于上帝天惟時受有殷命哉割申勸詩帝謂文王之意也注以亦惟純佑為文王亦如殷家惟天所佐佑武王惟兹四人孔云虢叔先沒尚庶迪輔武王而行有祿天祿後暨及武王誕將天威咸皆劉殺厥敵紂惟兹四人昭武王惟冒冒天下丕大單盡稱舉德武王之德在今豫小子旦若遊浮度大川無津涯豫往暨汝奭其濟渡小子成王同如未在位即政時誕召公大無我責責我強留收召公若收藏罔不勗勉不及所未到耇老造成德不降下我則鳴鳥鳯凰太平乃出不聞矧曰其有能格感文武聖人猶以五臣四臣而興召公可舍成王而去乎公曰嗚呼君肆其監于兹前所舉商周輔相之事我周受命無疆惟休美亦大維艱難告君乃猷謀裕寬裕之道我不敢以後人迷裕則休迷則艱矣君與我當交盡其心可也公曰前人文武敷開乃心乃悉盡命汝作汝民極準命汝為民立極曰申命汝明勗勉厥偶配佐王王者在亶信乘服職兹大命文武命惟文王德丕承舉無疆之恤惟難前所監者我之説公猶可辭也此文武之命尚可辭乎公曰君告汝朕允確信非茍言保奭其汝克敬以豫監于殷喪大否亂肆念我天威以殷覆轍念天可畏豫不允信惟若兹誥豫惟曰襄助王格天我二人在我二人汝君之心有合於我哉言亦言曰在時二人天休休則無畏矣滋益至來惟時二人弗戡亦不敢當之以自恃其汝克敬德明顯用我俊賢民人在讓注絶句後人于丕太平時監殷則天威矣我二人可不自警縱使威已為休猶合弗當益克敬求賢以圖無疆之恤太平之時付之後人今日則未可言也嗚呼篤厚棐輔時二人二公我式用克至于今日休我咸成文王功于不怠丕冒海隅出日之處罔不率俾將成文王功以冒海隅可以今日休自足乎公曰君豫不惠順汝欲去若如兹此多誥豫惟用閔憂于天越及民天民之責至無窮也公曰嗚呼君惟乃汝知民德民罔尤違亦罔不能厥初惟其終善終之難祗敬若兹止其所往敬用治敬則誠誠則不息民德終則天休亦有終矣蔡仲之命第十九周書蔡叔既沒王命蔡仲踐居諸侯位作蔡仲之命始猶望蔡叔之改終則已矣乃命仲周公豈藏怒於叔哉蔡仲之命惟周公位冢宰正百工羣叔流言乃致辟法誅管叔于商囚制其出入蔡叔于郭鄰中國外地以車從車七乘少降霍叔罪輕于庶人三年不齒録三年後封霍蔡仲蔡叔子克能庸用祗敬德周公以為卿士巳卿士叔卒乃命諸王親賢邦封之蔡此史敘作書之意王若曰小子胡仲名惟爾率循德文王德改行叔行克愼厥猷道肆故豫命爾侯于東土往即就乃封敬哉爾尚庶蓋掩覆前人叔之愆過惟忠惟孝爾乃邁進迹行自身自仲為一國始封之祖克勤無怠以垂憲乃後子孫率乃祖文王之彞訓無若如爾考之違王命皇天無親常親惟德是輔民心無常惟惠之懷為善不同質文異尚同歸于治為惡不同強弱異態同歸于亂爾其戒哉愼審厥初始惟思厥終終以不困不惟厥終終以困窮懋勉乃攸所立績功睦乃四鄰鄰國以蕃衛王室以和兄弟康濟小民率循自用中中道無作敢為聰明亂舊章法詳審乃視聽罔以側巧言改厥度常度則豫一人汝嘉美王曰嗚呼小子胡汝往哉無荒棄朕命成王東伐淮夷成王即位淮奄乂叛遂踐滅奄作成王政一書亡成王既踐奄將遷徙而化之其君於蒲姑齊地周公告召公作將蒲姑一書亡多方第二十周書與多士辭一口出入成王歸自奄踐奄在宗周鎬京為天下所宗誥庶邦作多方多方惟五月丁亥即政明年王來自奄至于宗周周公曰王若曰猷道告爾四國多方因管蔡商奄并及多方者示其公也惟爾殷侯尹長民我惟大降爾命教命爾罔不知洪大惟思圖天之命弗永長寅敬念于祀祭惟帝天降下格戒譴告于夏桀有夏誕大厥逸豫不肯戚憂言于民乃大淫昏不克終日終一日勸勉于帝之迪道乃爾攸所聞厥桀圖帝之命不克開明于民之麗所依附乃大降罰崇重亂有夏因甲始于內亂妹喜不克靈善承奉于旅衆人罔丕惟進用之恭恭德洪大舒慢于民亦惟有夏之民叨貪懫忿日日日欽尊敬劓殘割害夏邑天惟時是求民主乃大降顯明休美命于成湯刑殄絶有夏惟天不畀豫純大乃惟以爾多方之義民夏雖多有知義之人桀不能用不乃不克能永長于多久享享國惟夏桀之恭所敬多士衆人大不克明保安享有于民乃胥相惟虐于民至于百百端為所為大不克開明乃惟成湯克以爾多方簡大代夏作民主愼厥麗君道所依乃勸勉厥民刑儀法用勸勉以至于帝乙罔不明德愼罰亦克用勸要察囚囚情殄戮多罪亦克用勸開釋放宥無辜亦克用勸勉于愼罰今至于爾辟君紂弗克以爾多方享有天之命嗚呼王若曰誥告爾多方非天庸輕釋廢有夏非天庸釋有殷乃惟爾辟君紂以爾多方大淫圖天之命屑屑屑數數有辭民傳播天非棄殷也殷自棄爾乃惟有夏更説桀圖厥政不集成于享天降時喪有邦湯以七十里間代之此言桀之所以亡也乃惟爾商後王紂逸安厥逸豫圖厥政不蠲潔蒸進善天惟降時喪惟聖通明之稱非大而化之聖罔念作狂惑惟狂克念作聖天以此望紂改不遽絶之天惟五年以湯故遲遲須待暇緩之子孫誕大肆作民主罔可念聽無一善可聽可念此言紂之所以亡也天惟求民上于爾多方大動警之以威祲祥譴告開發厥其顧天能受眷顧於天者惟爾多方罔無能堪當顧之天眷惟獨我周王靈善承奉于旅衆克堪當勝用德惟典主神天祀天惟式用教我用休善簡大畀豫以殷命尹君正爾多方此言周之所以興也靈承者承接拊循可近不可下也克堪所謂德輶如毛民鮮克舉者也其勇過孟賁矣力薄而私欲奪之則不克舉矣典神天使之主祭而百神享也式教用休者天理日新左右逢原思也或起之行也或翼之用以昌大休明也天命周以定於一矣爾多方猶有洶洶不靖者欲何為也今我曷何敢多誥我惟大降下爾四國民命教命一云天命言告民以天命夏云與汝生命言不誅殺爾曷不忱誠裕寬之于爾多方忱誠則寬裕不復躁擾各安於其國爾曷不夾協介助乂治我周王享有當天之命天之所興不可毁天之所廢不可輔今爾尚庶宅安爾宅居畋耕爾田爾曷不惠順王周王熙廣天之命此望其從教也爾乃迪開導屢屢數不靜猶不安靜爾心未愛有愛爾乃不大宅安天命爾乃屑輕播棄天命爾乃自作不典常圖乃謀忱見信于正不典而圖信於正道何不自反之甚我惟時其教告之大誥多士之誥我惟時其戰要囚之東征踐奄之師至于再三監淮夷叛至于三成王即政又叛乃有今若又不用我降爾命教我乃其大罰殛誅之不可望恩貸非我有周秉執德不康安寧靜乃惟爾自速辜此戒其不從教也王曰嗚呼猷告爾有方多士暨殷多士今爾奔走臣事我監王命監成周之民者五祀年越於惟有殷多士有助於成周者胥衆胥伯之長小小官大大官多衆正官長爾罔不克臬守法自作民有自作不和者爾伯正惟和和調之哉爾室親近室家不睦爾惟和哉爾邑新邑克明教化修明爾伯正惟克勤乃事職爾尚庶不忌疾惡于凶德之人亦則以反正本身穆穆和敬在居乃位官克閲視監于乃邑新邑謀介助天室王云憂悔吝者存乎介吕云介微也爾乃自時洛邑尚永力畋爾田不作能念天惟畀豫矜憐爾我有周惟其大介助賚豫爾迪啓簡拔在王庭尚加爾事有服列在大僚多士序商人有服在百僚之怨辭繼以大義裁之此以大僚為勸豫奪闔闢之大用王曰嗚呼多士爾不克勸相勸忱信我命教爾亦則惟不克享享上凡民化汝惟亦曰不享爾乃惟逸放惟頗僻大逺棄王命則惟爾多方探取天之威怒我則致天之罰離逖逺爾土前勸之以賞此董之以威命討皆天也王曰我不惟多誥我惟祗敬告爾命吉凶之命即前命討之天也一云前所誥命又曰時此惟爾初洗滌自新之始不又不克能敬于和輯睦和平自取誅戮則無我怨王曰又曰所以形容周公拳拳之意情話已終猶有遺語顧盼之光燁然簡册之上也立政第二十一周書無逸立政相為經緯無無逸之心則立政方册而已無立政之體則勞於細故秦皇隋文之程石傳餐矣周公作立政此周公告歸絶筆也治之大綱任人而已立政周公若曰拜手稽首告嗣天子王矣先以王矣警之使不以幼沖自待乃若以王左右用咸戒于王曰王左右常任準人此下章三宅之事大臣議政王左右者有安危之寄焉綴衣掌幄帳者如幕人掌次司裘之屬虎賁衛士如虎奔走虎賁氏旅賁氏之屬小臣供役在左右者有染習之移焉王之尊重矣則在王左右者其可輕乎綴衣虎賁雖微然朝夕親狎其熏陶移養之功直與伯任準之彌綸康濟者相似此冏命僕臣正而后正意政之大者也孔説常所長事謂三公常所委任謂六卿準人平法謂士官蘇説牧民之長曰常伯三百一十國為州州有伯以顧命考之芮伯彤伯皆以公卿兼牧任任事之公卿曰常任守法之有司曰準人吕云三代書他無見意者公卿輔相之别名夏云常伯太保也職最親故曰伯又曰牧養之義也常任太傅也必有建明自任者乃能之準人太師也王親以為標準者已用者為三宅亦為三事居事牧準之職待用者為三俊有事牧準之材周公曰嗚呼休治之美兹在此王左右得賢知恤憂念之者鮮少哉人主玩焉而不察者多也此先言知恤之鮮下乃歷告以禹湯文武知恤之事則王聽之者精古之人迪允蹈之者惟有夏元后乃有室國家大競強矣籲方呼招俊賢以尊敬上帝賢天所生吕云幹父之蠱迪知真知忱誠恂信于九德臯陶所陳之行乃言曰載采采乃敢夏之臣見其君於賢真知篤信乃敢告教厥后曰拜手稽首后矣即告嗣天子王之意矣曰宅得賢居乃汝事常任宅乃牧常伯宅乃準準人兹惟后君道之大矣謀博詢之人面面察之己用丕大訓順德則乃宅人事常任任人牧常伯牧夫準準人準夫此夏后之知恤也夏后惟實蹈乎此而非茍知之也故雖有室強盛之餘方尊敬天生之賢不特招納之廣而且採納之精總名曰俊既皆籲之矣而德行有九隨其鑒裁必迪以知之恂以恱之而非茍知輕信也故當時羣臣乃敢告教以宅人之要使謀之人面之已三宅重任必得大順於德者乃宅之焉而君道盡矣事牧準大臣也所謂政也政柄有歸則庶官之任蓋有司存非人主之職也孔云夏禹時卿大夫室家大強猶招賢事天蹈知誠信九德之行乃敢告君以立政后矣猶王矣事六卿掌事者牧九州伯牧民者準平法者兹乃三宅無義民義剛德也非不賢也然較之丕訓德者之渾然剛猶覺圭角之露也夏三宅之選嚴矣雖偏於義德者無之也其必如臯謨所謂常吉者而後膺是選歟吕夏以禹下文言桀乃三宅之任曾無義民孔云三居以宅無義之人桀德惟乃弗不作為往往日先后所為任是惟暴德小人罔無後後世此桀之不知恤也亦越于成湯陟升丕大釐治上帝之耿光命典禮詩書昭著於天下者皆是也乃用三有宅事牧準之職克能即就宅居位而不曠其職曰定論三有俊有事牧準之才他日以備三宅者克即俊有德而不浮其名嚴尊事惟丕大式法效之所謂學而後臣克用三宅三俊其在商邑近而畿甸用協合和于厥邑其在四方逺而四方用丕大式法見德此湯之知人也湯之陟所以丕釐帝命者曰圖任三宅三俊而已用者定其位曰者定其論以待用者也如高帝之儲蕭何曹參王陵陳平周勃諸葛蜀先主相名亮之儲蔣琬費禕董允薑維所以為社稷長慮也嚴事之效式之得大賢而大受焉在商邑在四方近者協焉逺者式焉用賢之功大矣哉嗚呼其在受紂德暋昏惟羞進刑戮暴德之人同于厥邦乃惟庶衆習諸逸醜德之人同于厥政帝天欽罰之乃伻使我周有夏中國式用商受命受帝命奄合甸治萬姓此紂之不知恤而天改畀之周也亦越文王武王克真知三有宅心非貌親口惠灼洞照見三有俊心以敬事上帝即前所謂尊帝釐帝命立民長伯建諸侯立政文武立政之本任人常任準夫準人牧常伯作三事三宅虎賁綴衣趣馬掌馬之官小尹小官之長左右攜攜持器物僕百司內百司若內府內司服之屬庶府太府之屬大都之長小伯小邑之長藝人卜祝巫醫執藝事者表外臣百司外有司若外府外司服之屬太史書諱惡公天下後世之是非尹伯有司之長庶衆常久用吉良士司徒司馬司空侯國三卿亞次於卿旅衆大夫夷大微邑盧邑蒸衆師三亳蒙為北亳榖熟為南亳偃師為西亳邑歸之王者三阪險危之地尹長此文武之知恤也文武之敬帝立民以知見俊宅之心而已其立政之大端曰任準牧三事矣而自虎賁至尹伯若內若外無小無大以至侯國之卿亞夷蠻內附之君長無不得人則文武之所以知恤者至矣文王惟克厥宅安心乃克立兹常事衆官有常事於朝司牧人立政養民以克俊敏有德宅心者宅人之本也傳之以庶官約之以一心文王罔無攸所兼于庶言奏請詞訟庶獄刑辟訊鞠庶愼兵事謹愼惟付之有司之牧夫是訓人之以用用所當用違違所當違庶獄庶愼文王罔敢知于兹宅心其原也罔攸兼其體也罔知于兹者所以能深知宅俊之心也亦越武王率循惟思敉安功文王一怒安天下之功不敢替廢厥文義一怒德率惟謀文之謀從容寬德不殄不隕以並受此丕丕基論文以心自其本原言之也論武以功自其發用言之也義德曰不敢替不得己也容德曰從其本心也一云用義德之賢以戡定用容德之賢以計安立政任人之意也嗚呼孺子王矣繼自今今日以往我王其立政自我立政不可委之周公矣立事任準人準牧夫伯我王其克自能灼知厥若順即前所謂丕訓德者也丕大乃俾使亂治相助我受所受之天民和謂我庶獄庶愼時是則勿無有小人間二之自一話一言一話言間不忘我則末終惟思成德之彥賢以乂我受民此以下望王之知恤也王前此委政於公今公歸則自今以始政自王立矣事牧準之知王當自克矣必得丕訓德之賢任之且勿間以小人一話言間末惟成德之彥然後任之勿二而可以當上天托民之責矣嗚呼豫旦已受人之徽美言咸皆告孺子王矣繼自今文文德子之子文孫其勿誤于庶獄庶愼惟正正人孔云正道是乂治之文王罔兼也而可誤乎必得正人以治之可也自古商人亦越我周文王立政與下二章三立政字提一書之大目當作絶句立事注絶句牧夫準人三宅則克能宅之使宅其官矣克又能由因其行事繹尋思之兹乃俾乂國商周國則罔有立政用憸小人捷給不訓順于德是使君罔無顯名在厥世宅之則人與位相稱繹之則表與裏相符乃俾之則一聽其所為矣難於先使小人不得投其隙易於後使君子得以盡其心反是則罔顯矣繼自今立政其勿以憸人其惟專用吉順德士用勱勉相助我國家此用前俾乂罔用之法也今文子文孫孺子王矣其勿誤于庶獄重事惟專擇有司之牧夫養民一云以養民之賢用刑前言庶言庶獄庶愼次言庶獄庶愼至此專言庶獄獄民命所係所以祈天命長王國者在焉他事誤猶可改獄可誤乎勿誤獄而擇牧夫則有生之者無傷之者矣其克詰治修爾戎兵車馬器械以陟升禹之迹芒芒禹迹畫為九州方嚴整行天下至于海表蠻夷戎狄罔有不服以覲見文王之耿光以揚發武王之大烈功兵刑之大者刑之誤且不可況兵乎天下雖安忘戰必危必安不忘危有奮張無惰偷使姦萌潛折然後前人之光烈不墜周官巡侯甸征不庭克踐此語矣嗚呼繼自今後王立政其惟克用常吉人曰吉曰常德也憸人則才者也有德之人如穀粟布帛得之生不得死一日不可無也而重遲木訥不能與小慧新進者爭長於頰舌之間世主惑於取舍而治亂分焉故周公於卒章特慨歎而申告之周公若曰太史太史當書簡以垂後世故呼而告之司寇蘇公蘇忿生為武王司寇式用敬爾由用獄重民命以長久我王國兹式治獄者當以此為法有愼以列條用中罰中則輕重不差立政所重在獄故篇終舉蘇公長國之事呼太史書之使用刑者式之以用中焉一云太史掌典法則凡司寇所用皆出於太史所掌二職相關康叔為司寇必及內史而蘇公之能長國太史預有力焉故周公兼舉以為用刑者法也尚書詳解卷十
