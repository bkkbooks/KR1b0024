body:
  text: 尚書詳解卷九宋胡士行撰洛誥第十五周書大甲復亳成王卜洛而伊尹周公告歸所以處大臣之變嚴萬世之防也然周尚有頑民未定故公未得遽去召公既相宅周公徃營成周使使來告卜作洛誥此序與召誥相顧成文洛誥周公拜手稽首曰朕復還子明辟君政先此周公攝政王之為君未明也今公歸政而王即政則為明辟矣王向日如若弗敢及天基命文王命之始定命武王命之成予乃𦙍繼保大相視東土洛在鎬東其基始作民明辟向也王如恐不能及文武之基命定命也予乃繼保之以營洛洛邑既成則中天下定四海王其始為民明辟矣予惟乙夘攝政七年三月十二朝至于洛師衆所在我卜河朔北黎水卜不吉我乃卜澗水東瀍水西渡河而南今河南王城定鼎之所惟洛食先用墨畫龜而後灼之兆循墨而行如食則吉我又卜瀍水東亦惟洛下都遷殷民之所食伻使人來以圖地圖及獻卜卜兆召公前卜定鼎之所矣未卜遷殷之地故周公至洛并兩地皆在卜之黎在河北去紂都近商民所欲周公不欲重拂民而天意不在也乃渡河南而卜焉洛在澗西跨瀍東故瀍東澗西皆歸之洛王拜手稽首曰公不敢不敬天之休美來相宅其作周築匹配休天休命公既定宅伻來注絶句來視示予卜休恒常吉我二人王公共貞正固保守公其以予萬億年敬天之休拜手稽首誨言求公誨言公復辟告歸而王留之周公曰王肇始稱舉殷盛禮祀大享于新邑咸皆秩序無文祀典未載者予齊整百工官伻使從王于徃周予惟曰庶庶幾乎有事王有大事為以慰天下今王即命當即出命曰記錄功勲功宗最大者以功作元大祀祭之記功宗功之大元祀祀之大惟命申命曰汝功臣受命襃賞之命篤當厚注絶句弼助王室丕王乂當大絶句視功載功臣載書乃汝主其悉盡自自任教丕視之公以教工百官定都之初肇舉盛禮享羣祀修曠典有祀焉有祈焉始建新都昭假上下告成事也雨暘時若大役以成報神賜也自今以始終奠中土祈洪休也人主齊祓一心對越天地以此精明放於四海助祭諸侯下逮胞翟皆有孚顒若收其放而合其離君心萃天下之道莫要於此公也齊百工以從王於洛庶幾贊新政以有事焉耳王當即出命以宗功作元祀記人之功小大有序公襃賞激勸之權以勵百工而申命以啓其篤弼之忠凡載功之書大加閱視以示羣工之教此皆王所當自服者也可復如前日之倚重於公乎兹汝受命篤我周邦受天厚矣弼丕當輔大天命夏云即命元祀公欲禮樂自王出也王乃命公曰汝受文武之命當厚輔我孺子公以家人呼王其念朋朋比之禍孺子其朋其戒其徃自今以徃無若如火始然燄燄微厥其攸所及灼灼然敘有次序弗不其絶厥若順彝常道及撫安事國事如似予周公惟以在周工徃新邑伻使嚮即就有僚官聯明昭作起有功事功惇厚大廣成裕寛裕之德汝永有辭前告王以自教工矣此申告以教工之道最作有朋比朋比之禍始微終著惟擇其若彝撫事如予者用之於明作之中有惇大之裕則永有令聞矣漢文近惇大而無明作漢宣近明作而無惇大於此見周之治體非後世可及也公曰已汝惟沖子雖小惟終王業所頼以善終汝其敬識百辟諸侯享心奉亦識其有不享心不誠享多儀威儀之敬儀不及物心不敬則升降俯仰之間必有不與物相及者惟是曰謂不享惟不役用志誠敬于享凡民國人皆化之惟曰不享無尊上之心惟事國政其爽差侮僭此告王以統御諸侯之道也儀誠敬之寓也惟敬能識之乃惟孺子頒行朕公不暇前所未暇為者聽朕教汝于棐助民彝常性汝乃是不蘉勉乃時是惟不永哉篤厚敘次乃汝正父武王所行皆正罔不若如予公不敢廢乃命王如公行武王之道則民不敢廢王命此告王以教養兆民之道也汝徃洛敬哉兹予其明農退老明農事哉彼徃彼新邑裕能寛裕我民無遠民用皆用戾來吕云彼裕民之道無逺棄違戾之言斯須不可離也此公與王訣别之辭民為邦本故重言之王若曰公明保師保教誨成就予沖子公稱舉丕顯德以予小子揚奉文武烈功奉答天命和恒常四方民居安師衆惇厚宗尊將禮肇稱殷禮稱舉秩序元祀咸秩無文惟公德明光光者明之發于上天下地勤不息施施教于四方旁徧作起穆穆民敬心又云王穆穆之德迓迎衡太平不迷惑文武勤教予沖子夙夜毖謹祀此王頌公功德而留之也文武之烈盛矣不揚之則不進必退矣答天和民稱祀皆揚烈之事非公不可曰明曰光公之德文武之德也勤者所以運此德於不息也迓迎其方來不以目前之治為足也公之勤施至則文武之教勤益大昭明於天下而不迷矣予小子垂拱仰成謹其祭祀而已予之歸重於公如此公可去乎林云政必大臣而後明禮則人主所當敬王曰公功棐助迪啓篤厚罔不若如時是前所言徃天下無不順而是之王曰公予小子其退自此朝以後即辟于周洛命公後封公子伯禽於魯四方迪始開亂治之端未定于宗尊上禮亦未克敉寧公功禮未定則功未敉迪公留啓迪將助其後后來一云命公后監監率我士師衆工官誕大保文武受受於天民亂治為四輔左右前後王曰公定留予徃新邑已公功肅敬將大祗歡天下敬樂之公無困捨去困我哉我惟無斁厭其康安民事公勿替廢刑儀法四方其世世世享來享周公拜手稽首曰王命予來洛承安保乃汝文祖受命民越及乃光增光烈考武王王以文武挽公𢎞大朕恭敬大其敬者使不以前日之敬王為足也此公以文武許為王留也孺子來相宅其大惇厚典法則殷獻賢民人亂治為四方新辟作為周周家一代恭恭敬之君先第一由後溯為先曰其自時中乂萬邦咸休篤恭而天下平惟王有成績予旦以多衆子卿大夫越及御事治事之臣篤厚前人文武成烈答其師衆望作周孚信德之臣先第一此立治之規模君盡君道臣盡臣道也恭治之原治原自君出臣但作孚信之先而已蓋不欺者臣之大節也考察朕昭明示子王刑法乃單盡文文王祖德伻王使注云文武使來我來毖謹治殷殷民乃命寧命之以寧吕云命如射命中之命期必之辭予以秬黒黍鬯香草二卣中尊曰明潔禋精意以享拜手稽首休以治之美享祭告予不敢宿經宿則禋于文王武王惠順篤厚敘次無有遘遇至自疾自疾害之事萬年人皆厭飫于乃汝德殷民乃引日漸月漬考有所成王伻使殷民乃承繼序次敘萬年其永長觀仰朕我子子孫懷感德公昔所以示王者文德而已今王使公留而來寧殷民公既許留即告文武一去一留對越無愧遂勉王以惠篤敘無遘疾以成寧殷之效而至于萬年也夏云王伻來命安慰我以二卣使我明禋拜稽以休享我以時不敢宿王命於家即以禋於文武戊辰十二月晦王在新邑烝冬祭祭歳歲盡文王騂牛一武王騂牛一王命作冊告神之冊逸史逸祝册讀其辭以禱神惟告文武周公其後命周公子伯禽王賔助祭諸侯殺殺牲禋禋祭時咸皆格至王入太室清廟太室祼圭瓚酌鬱鬯酒獻尸尸受酒不飲因灌於地王命周公後作册命伯禽之書逸史逸誥告伯禽此史記當時事也在十有二月惟周公誕保文武受命惟七年此史記公攝政之年也多士第十六周書成周王城下都之總名一云專指下都既成遷殷頑民周公以王命誥慰安之作多士多士惟三月七年之明年三月周公初于新邑洛用告商王士貴之也洛邑始成以周公衮舄臨之於此發王命焉光景之新繪畫莫陳序言頑民賤之也所以記其實書云商士貴之也所以開其善王若曰爾殷遺餘多士弗弔商道不至旻天大降喪于殷我有周受天佑命將奉天明威致行王大公罰勑正殷命終革于帝肆告爾爾多士非我小國周自謙敢弋如弋取鳥殷命惟天不畀予殷允信罔無有固堅亂栽培傾覆天道然弼天助我我其敢求位惟帝不畀予殷惟我下民皆秉秉心為為周惟天明畏味其言矜憐懇惻略無忿疾之意不知商民之為頑也我聞曰上帝引退逸逸豫之人有夏禹不適縱逸則惟帝降下格至嚮意在于時禹夏弗克庸用帝大淫泆縱有辭播人口惟時天罔念聞桀厥惟廢元大命降致罰乃命爾先祖成湯革代夏俊賢民人甸治四方自成湯至于帝乙罔不明德恤祀致敬鬼神聚其德而神明之亦惟天丕建立保佑乂治有殷殷王亦罔敢失帝天心罔不配合天其澤澤民此援商代夏以為殷監也在今後嗣王紂誕大罔顯明于天天理矧況曰其有能聽念于先王祖宗勤家創業之難誕淫過厥泆縱罔顧問于天顯天之明威民祗民之敬畏惟時上帝不保降若兹大喪惟天不畀紂不明厥德凡四方小大邦喪亡罔非有辭無辜之辭于罰受罰此言紂之所以亡也王若曰爾殷多士今惟我周王丕大靈善承奉帝天事有命天命周曰割正治殷紂告勑正于帝惟我事不貳適上帝臨汝無貳爾心惟故爾殷王家我適適我周予其曰惟爾殷洪大無度法我不爾先動自從乃殷邑自取禍予亦念天即就于殷大戾罪肆故不正此言周之不得不興也王曰猷告爾多士予惟時此其遷居商民西自河北而洛為西爾非我一人奉承德不康寧安靖時此惟是天命無不可違朕不敢有後遲留天命無我怨惟爾知惟殷先人注絶句有册書有典則法殷亦革夏命今爾又曰夏夏王迪啓簡拔在王商王庭有服列在百僚予一人惟只聽主用德有德者肆故予敢求爾于天邑商貴之予惟率皆肆大矜憐爾非予罪時惟天命此告以遷商之故因其以商迪簡下至怨周不用而告以用德使踐修以應周之求也王曰多士昔朕來自奄奄國予大降下爾四國管蔡商奄民命教我乃明致天罰移遷爾遐逖棄逺妹土世習比近事臣我宗周多為遜順踐奄之餘嘗降命教爾矣猶未同故不得不明致罰以遷之然豈若屏之逺方者哉宻爾王室正以玉成爾也王曰告爾殷多士今予惟不爾殺予惟時命教有申重今朕作大邑于兹洛予惟四方罔無攸所賔外一云賔禮外朝者亦惟爾多士攸服事奔走臣我多遜爾乃尚庶有長有爾土新邑所居爾乃尚寧安幹立止居勿啓他望爾克敬天惟畀予矜爾爾不克敬爾不啻但不有爾土予亦致天之罰于爾躬今爾惟時是宅安爾邑繼續爾居爾厥有幹立有年永年于兹洛爾小子子孫乃興起從爾遷遷善王曰又曰時此予我注絶句乃或言教注絶句爾攸所以居遷居予之忠厚乃詳告爾所以遷居之故若他人則有威行以裁之耳奚若是諄諄哉注云爾當是我勿非我我乃有教誨之言則汝所當居行也王曰之下必有脫簡無逸第十七周書師長尊而不親族黨親而不尊嚴厲潤澤不得而兼焉此篇上自天命精微下至畎畝艱難閭里怨詛以至夀夭之際此合師長族黨之言也周公作無逸無逸治源也無逸周公曰嗚呼更端七言嗚呼竦王聽也君子所居止其無逸先知稼穡之艱難乃後逸處安逸地則知真知小人之依所依相視小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺叛注絶句既誕大欺否不答則侮厥父母曰昔古者之人無聞知健行不息天德也君德也以無逸為所如魚水獸林安之而不得離也周公曰嗚呼我聞曰昔在殷王中宗大戊嚴謹重恭降下寅肅莊畏兢業天命注絶句自度以天自律治民祗懼不敢荒寧肆中宗之享有國七十有五年其在髙宗武丁時舊勞于外為王子時父小乙使居民間爰暨及小人作其即位乃或亮信隂黙三年不言其惟不言言乃雍和不敢荒寧嘉善靖安殷邦至于小大無時或怨肆髙宗之享國五十有九年其在祖甲太甲不義惟王敗度敗禮舊為小人居桐作其即位爰知小人之依能保惠于庶民不敢侮鰥寡於庶民中加意鰥寡肆祖甲之享國三十有三年此無逸之驗也自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從自時厥後亦罔或克夀或十年或七八年或五六年或四三年此無逸之反也周公曰嗚呼厥亦惟我周太王王季克自抑損畏祗文王卑服卑下其事注云惡衣服即就康安民功田養民功徽美柔徽則柔而能立懿美恭懿則恭而有禮懷念保安小民惠愛鮮鰥寡自朝日出至于日中昃日側不遑暇食急於養民緩於自養用咸大和萬民文王不敢盤樂于遊田以庶衆邦侯惟正正道之供應庶邦取法注云所供貢惟正不以盤逰役之文王受命即位惟中身五十厥享國五十年紂在上而文王以方伯欲率侯邦以和萬民其勤勞如是也無逸之驗如此後世猶有為文王憂勤損夀之說以啓人主之逸如鄭𤣥者周公曰嗚呼繼自今嗣王則其無淫于觀于逸于遊于田以萬民惟正之供無皇暇曰今日且眈樂乃非民攸所訓為教非天攸若時人丕則有愆無若殷王受之迷亂酗于酒德哉周公曰嗚呼我聞曰古昔之人猶胥訓告格言訓廸胥保惠善道保養胥教誨民無或胥譸誑張大為幻惑此厥亂君不聽人乃訓化之乃變亂先王之正刑法至于小大民否不如意則厥心違背怨否則厥口詛罵祝周公曰嗚呼自殷王中宗及髙宗及祖甲及我周文王兹四人迪允蹈哲真知厥或告之曰小人怨汝詈汝則皇總自敬德厥愆曰朕之愆允若時不啻止不敢含藏怒此厥不聽人乃或譸張為幻曰小人怨汝詈汝則信之則若時不永念厥辟君道不寛綽緩厥心亂罰無罪殺無辜怨有同是叢聚于厥身周公曰嗚呼嗣王其監于兹無逸圖揭七嗚呼而列之屏真百王龜鑑也尚書詳解卷九
