body:
  text: 尚書詳解卷四宋胡士行撰湯誓第一商書伊尹相湯伐桀升自陑地遂與桀戰于鳴條地之野作湯誓五就桀而桀不悛則伐罪弔民之舉尹不得不相湯而湯亦不得而不順天應人矣陑師行所經地耳或以為湯間道出桀不意則豈王者之師哉湯誓王史追稱湯曰格來汝衆庶悉皆聼朕言非台我小子敢行稱舉兵亂以侯伐王有夏多罪天命殛誅之今爾有衆夏民汝曰我后桀不恤我衆舍奪我穡事農時而割正割剝之政夏豫惟聞汝衆夏衆言夏氏有罪豫畏上帝不敢不正征今汝其曰夏罪其如台我所聞夏王率皆遏絶衆力率割夏邑有衆夏率怠弗協曰時此日桀曷何時喪豫我民及汝汝桀偕亡夏德惡德若兹今朕必往爾尚輔豫一人致天之罰豫其大賚賞汝爾無不信朕不食虛也如食而吐之言爾不從誓言豫則孥戮汝罔有攸赦臨事而懼不得不然非德不足也湯既勝夏欲遷其社不可作夏社疑至臣扈三書亡社五土之神稷五穀之神共工氏之子勾龍配食於社烈山氏之子柱配食於稷湯革夏命變置社稷欲遷社而無人可代勾龍臣扈湯臣議遷社者夏師敗績湯遂從追之遂伐三朡桀去保三朡故伐之俘取厥寶玉國之寶器即祭天地諸神寶玉之類誼伯仲伯湯二臣作典寶多得國之常寶非常寶則不取書亡仲虺之誥第二商書湯歸自夏勝夏至于大坰地仲虺作誥仲虺之誥成湯放不窮追之桀于南巢桀竄其地惟有慙愧德曰豫恐來世以台為口實堯舜出揖遜而湯伐桀恐後世篡奪者以藉口仲虺乃作誥湯忸怩之發若不能一朝居不消散之則過而不化有害日新之業矣故虺不待至亳而誥曰嗚呼惟天生民有欲喜怒哀樂愛惡欲情之動也有欲必有爭無主治乃亂爭則亂惟天生聰明時是乂治有夏昏德與聰明反民墜塗炭亂天乃錫與王勇有斷智有謀表立儀表正萬邦纘繼禹舊服服行之事孔云五服兹率循厥典常奉若順天命湯之興畏天命而憫人窮也豈有毫髮之私而何慚焉聰明體也勇智用也典者萬世不易之理湯之所纘禹之所服率而奉之純乎天也夏王桀有罪矯詐誣欺上天以布命于下帝用不臧善桀式用商受命用爽清明厥其師衆夏之季而湯出焉如晦冥之日月醉之醒夢之覺也簡桀黨簡忽賢湯之賢附依勢桀之勢實實繁多有徒黨肇始我邦商國于有夏夏世若苗之有莠似苗草若粟之有秕莠實小大商民小大戰戰懼色罔不懼于非辜無罪被辜矧豫湯之德有諸中言形諸外足聼聞不可掩此言桀囚湯於夏臺也湯在夏季桀黨惡之如苗粟之莠秕欲鋤簸之商人深恐非辜況湯德日著尤宜為惡黨所忌惡乎惟王不邇近聲音色女不殖生聚貨利德懋人德勉者懋官陽勉以官功懋懋賞用人取人之善惟己為己之善改過己之未善不吝惜克寬克仁彰昭信孚兆民不邇殖此非富天下之本心也如此則一毫私欲不存本原清矣故樂人之善改己之不善如舜之取人顔子之不二欲去理全而仁之體在是矣寬者仁之施仁者寬之體克者實有是理其心之廣大為安天下而非富天下民昭昭然信之久矣吕云惟己取人以身也乃葛伯仇餉事詳見孟子初征自葛東征西夷怨南征北狄怨曰奚何獨後豫攸所徂至之民室家相慶賀曰徯望豫后君湯后來其蘇解蘇更生民之戴商厥惟舊久哉湯之征誅其君弔其民以布其寬仁而已非若後世兵師所至荆棘生焉者也故民喜色相告於征伐之時而有唐虞都俞揖遜謳歌朝覲之氣象焉佑賢輔德顯忠遂良兼并弱攻昧取亂侮亡推亡固存邦乃其昌盛此欲湯大新政以副民望遏惡揚善行其無事也賢德忠良則佑輔顯遂之弱昧亂亡則兼攻取侮之亡者推之存者固之栽培傾覆皆所自取造化何心哉夏云天理如此則桀之亡乃皆所自取而湯之興何心哉德日新萬邦惟懷志自滿九族乃離湯之盤銘曰茍日新日日新又日新一念少息不進則退差毫釐而繆千里以慚之念橫乎胸中則於日新之功有害矣王懋勉昭明大德建立中于民以義事之宜制為則事以禮理之節制心垂裕優足後昆子孫此欲湯以其立一世之極開萬世之極也中降衷之理即自得之德昭之此而立之彼以性覺性也制事義以方外也制心敬以直內也本末並用俾有典則詔之子孫六百年之商皆自此出一說以為制民之事民之心豫聞曰能自得師者王謂人莫已若似者亡好問則裕大自用則小尊德樂道人主知之者固有之矣然人以為有道德而尊之則非自得矣惟自有真見以得師而學焉然後臣之則不勞而王矣好問則天下之善皆吾善矣謂人莫若而自用則反之嗚呼慎厥終惟其始於其始而思其終殖封有禮覆昏暴欽崇天道永保天命福善禍淫天道也欽崇則能永保矣欽而又加以崇敬之至也此勑天時幾之意湯誥第三商書湯既黜廢夏命復歸于亳作湯誥因四方朝新君而誥之湯誥王歸自克勝夏至于亳誕大告萬方王曰嗟爾萬方有衆明聽豫一人誥立一代之規模新天下之耳目垂六百年之基業皆在焉明聽提警振起作其更新之意惟皇上帝降衷于下民若順有恆性克綏厥猷道惟后降衷天命之性也若性率性之道也綏猷修道之教也仲虺天生聰明時乂即此意但仲虺於情言之自末及本湯於性言之自本及末理歸於一而聖賢之間亦見矣夏王滅德性作威私欲以敷布虐于爾萬方百姓爾萬方百姓罹被其凶害弗忍堪荼荼苦毒毒螫並告無辜罪于上天下地神天祇地天道福善禍淫降災于夏以彰厥罪肆台小子將奉天命明威不敢赦敢用𤣥牡夏尚黑牲用𤣥敢昭告于上天神后請問罪有夏聿遂求元大聖伊尹與之戮盡力以與爾有衆請命救民命於塗炭之中上天孚信佑助下民罪人桀黜廢伏竄藏天命弗僭差賁飾若然草木兆民允信殖物與民皆遂則天佑湯可見矣俾使豫我一人輯集寧安爾邦家兹朕未知獲得戾罪于上下栗栗戰戰危懼若將隕墜于深淵此湯任大責重所以自警也凡我造立邦侯無從匪非彝常無即就慆樂淫各守爾典常以承天休爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡别在上帝之心其爾萬方有罪在豫一人豫一人有罪無以爾萬方湯自責如此諸侯敢自恕乎嗚呼尚庶克時忱誠乃亦有終善終君臣警省如此則善始可占終咎單臣名作明居明居民之法一書亡伊訓第四商書成湯既沒太甲元年伊尹作伊訓肆命徂后三書一序二書亡湯太丁外丙仲壬太甲孟子湯崩太丁未立外丙二年仲壬四年太史公案世本湯沒二帝七年而後太甲太丁子立序以太甲元年係於湯沒之後者以書言烈祖成德故爾伊川以為湯崩太丁未立而死外丙方二嵗仲壬方四嵗故立太甲伊訓惟元祀夏曰載商曰祀周曰年十有二月商正建丑以十二月為正月乙丑伊尹祠祭于先王湯奉嗣王太甲祗見厥祖侯甸羣后諸侯咸在百官總己以聽冢宰孔氏謂湯崩太甲逾月即位居憂冢宰攝政夏以為仲壬之喪伊尹乃明言烈功祖湯之成德以訓于王烈祖如在其上羣后百官環其旁於此時乘其初心之虛而訓之所以先入太甲而為之主也故太甲雖不免於迷而終歸於復者以此也曰嗚呼古有夏先后欲言湯先言禹方懋勉厥德罔有天災日月星辰之變山川鬼神亦莫不寧無山崩川湧之類暨鳥獸魚鱉咸若順其性于其子孫弗率循皇天降災假借手于我商有命天命造自取攻伐自從鳴條桀所都野朕我商載始自從亳湯所都方者常常如初無一毫停滯也德者天地萬物實然之理德懋則天地萬物莫不得其理矣弗率此德則自絶於天湯奉天討而已惟我商王布敷昭明聖武聖武則非血氣之怒易所謂神武不殺者也代虐夏之虐以寬兆民允懷今王嗣厥德罔不在初謹始立愛立愛之道惟親自愛我親始立敬惟長始于家邦終于四海湯以德得天下太甲何以嗣之哉惟親惟長始家邦而終四海焉守約而施博也嗚呼先王肇始修桀廢而湯修之人紀三綱五常本秩然有紀從諫弗咈違先民先覺之人時是若順居上為商之君克明君道為下為夏之臣克忠臣道與用人不求責備檢責身已若不及以至于有萬邦兹惟艱哉人紀者天下事事物物之理也敘於天修於君從諫若先民所以講明此紀也克明克忠所以躬行此紀也不責人而責己修己之要在己而已湯之工夫積纍如此乃至於有萬邦創業亦難矣哉而太平何可不念居上為下者湯處人道之難也湯之本心忠於桀耳升陑之舉豈得已哉此文王三分有二以服事殷之心也一云為去聲言愛民而能盡道敷廣求哲人識治之人俾使輔于爾後嗣制官刑警戒于有位湯之所以創業者責之己而已而所以為後人計者則不得而恃己也求之廣矣又制刑以警之其警有位者所以警後嗣其為後嗣計者所以為天下計其家天下之道乃其公天下之心也曰敢有恆舞于宫酣歌于室時謂巫風巫歌舞以降神敢有殉忘死求之于貨色恆于遊畋時謂淫風敢有侮聖言逆疏忠直逺耆老成德比親近頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡正君其刑墨具皆訓于蒙愚士此所謂官刑也德不孤惡亦不孤有其一則二則三而九者從之矣卿士邦君之愆至喪家亡國而其下不正焉墨刑之未為過也吕云蒙童蒙也嗚呼嗣王祗厥身念哉聖謨謀洋洋大嘉言謨之發孔甚彰明惟上帝不常作善降之百祥福作不善降之百殃禍爾惟德罔不在小積小而大萬邦惟慶蒙福爾惟不德罔大大由於小墜厥宗族祗念二字一篇之旨歸也故歎而後言聖謨嘉言即前官刑所云也三風十愆之戒森然如法律而其中皆天理焉能反而默識見其顯然有洋洋發動之意惟心之敬者能之敬即天也天命固不常而理未嘗不常此敬常存則作善惟德之工夫由小至大而百祥降矣否則墜宗之殃豈在大哉罔小罔大之義觀復姤二卦可見肆陳命天命徂往后君也陳往古明君以戒二書亡太甲上第五商書太甲既立不明謂明者為思之原伊尹放諸桐三年復歸于亳思念庸常道伊尹作太甲三篇三年居憂百官聽命冢宰太甲惟嗣王不惠順于阿衡伊尹保國如阿平國如衡故尊曰阿衡猶太公為尚父也伊尹作書曰先王顧省察諟提撕天之明命以承接上下神祇社稷宗廟罔不祗肅勑天者此心交神者亦此心易革渙之卦必言王假有廟蓋祭祀之時洞洞屬屬心無不敬尹欲收太甲之放心故必指湯之收心者以治之也天監厥德用集大命撫綏萬方惟尹躬克身任天下之重左右厥辟君宅安師天下民肆故嗣王丕大承繼基業緒統顧諟以下湯德也尹又同德故能代天理民遺太甲以無疆之緒惟尹躬先見于西邑夏夏邑在亳西自周忠信有終善終相輔臣亦惟終其後嗣王桀罔克有終相亦罔終主聖則臣直此尹責任太甲之意吕云周者謹畏之至如孟子周於德周於利之周夏之方有道也無一毫虧闕疏漏之處嗣王戒哉祗爾厥辟君辟不辟盡君道忝辱厥祖王惟庸如常罔無念聞不念故聞如不聞伊尹乃言曰又諄誨之先王昧晦爽明丕大顯明坐以待旦旁求俊彥啓聞迪導後人無越違厥命湯付託之命以自覆敗湯未明求衣大自顯明洗濯澡雪無一毫物纍不俟日之東升也旁求非一路也湯之為子孫謀其艱如此而可違越以自敗乎吕云命正理也慎乃儉節德德者本然之理慎者用功之地惟懷思永長圖謀若虞虞人機弩牙張上弦往省視括矢末于度合法則釋發矢欽厥止為君止仁為臣止忠之止率循乃祖攸所行惟朕以懌喜萬世有辭稱美儉非特節制一念收斂無非德之所聚所謂以約失之者鮮尹所以針太甲欲縱之病根也放心收則圖永其發心如射之審而知止如乃祖矣尹受湯之托至此乃懌而太甲亦有無窮之聞此曲盡誘掖之術也王未克變伊尹曰兹此乃不義非義之事習與性成性無不善為習所移豫弗不可狎復使親習于弗順謂聲色逰畋營造于桐宫湯所葬地密親邇近先王其訓無俾世永世迷昏亂王徂往桐宫居憂克終允信德尹不指太甲之非但以先王反覆言之使其善端生而非心自格觀伊訓之作乃太甲過未形之時其言哀痛嚴備如武庫之矛㦸森列也至太甲首篇太甲之過已形而尹之戒乃一節緩於一節溫乎春風和氣中有陶然自得之意蓋臣之事君如子之事父敬不違勞不怨色愈恭氣愈和言愈從容而不迫也以尹元老事太甲幼主而如此此所以為聖也太甲中第六商書惟三祀十有二月朔伊尹以冕冠服衮奉嗣王歸于亳畢三年喪作書曰民非后罔克胥相匡正以生后非民罔以辟君四方皇天眷顧佑助有商俾嗣王克終厥德實萬世無疆之休美福太甲自怨自艾於桐天啓之也此尹痛定之語使太甲終不變尹當若何克終矣喜慰如何哉王拜手稽首曰豫小子不明于德自砥至不類善欲嗜好無節敗度法縱志氣昏惰敗禮節以速戾罪于厥躬天作如水火之災孽災生牙孽猶可違自作孽不可逭緩既已往前背反師保尹之訓弗克于厥初尚賴藉匡救之德圖惟厥終桐宫之放太甲不以為怨而以為德所見明矣方其不明也視縱欲為安愈之地視禮度若荆棘束縛然既明矣乃知縱欲之荆棘而禮度乃安愈之地也得不力求匡救之訓乎其未明也尹惟恐太甲之不聽其已明也太甲惟恐尹之不言矣伊尹拜手稽首曰修厥身允誠實德協合于下惟明后協于下驗諸民也協則果修而真足為明后矣先王子惠困窮德民服厥命協罔有不悅並等其有邦為諸侯厥鄰鄰國乃曰徯望我后湯后來無罰虐政此以證協于下之說也湯以七十里與服國等侯耳德之感如此況太甲已為明后君萬邦而可不協乎王懋勉乃德視乃烈祖無時豫怠奉先祖思孝接下臣思恭視逺不溺於近惟明聼德不流於欲惟聰朕承奉王之休美無斁厭斁也太甲明矣當終以誠故以懋而無豫怠勉之思者日加省察之謂也伊訓言立愛立敬立始事思終事也聰明本然之有也逺則不以近蔽之德則不以欲雜之而本然之聰明見矣如此則王之休孰大焉太甲下第七商書伊尹申重誥于王曰嗚呼惟天無親私親克敬惟親民罔常懷懷于有仁鬼神無常享享于克誠天位艱哉德惟治否不德亂敬天德也仁人心也誠鬼神之德也上得天心下得民心幽得鬼神之心始足以當天位所以艱也德即敬仁誠也總於己為德見於外則有三者之異德則治出治則入亂矣與治同道事不必同同此理而已罔不興與亂同事亂之事無不同罔不亡終始慎厥與與治與亂與者治亂之初也惟明明后與治同事未必興也必同道而後興燕噲宋襄學堯舜湯武之事者也亂之事同則道無不同周厲弭謗秦皇禁偶語紂巨橋隋洛口倉無不亡者能於其與之端而謹之非明而又明者不能也先王惟時懋敬厥德克配上帝今王嗣有令美緒尚監視法兹哉明明生於懋敬敬天德也人心放於昏敬則存也若升高必自下若陟遐逺必自邇太甲悔過之勇尹恐其躐等故告以循序而進無輕易民事惟難無安厥位惟危無輕無安防其心也惟難惟危明其理也慎終于始有言逆于汝心不可謂其逆必求諸道有言遜順于汝志不可喜其遜必求諸非道逆未必皆道然合道者多遜未必非道然非道者每以遜入此畫一之戒也嗚呼弗慮謹思胡何獲得弗為力行胡成一人元善之長良善萬邦以貞正君罔以辨言言僞而辨者亂舊政臣罔以寵利貪居自有成功邦其永長孚信于休美咸有一德第八商書伊尹作咸有一德太甲悔過既力入道既深故尹以入道之極告之堯舜禹執中伊尹一德孔子忠恕子思中庸孟子仁義各有自得之地皆以發明不傳之蘊咸有一德伊尹既復還政厥辟將告歸乃陳戒于德曰嗚呼天難諶信命靡無常常厥德保厥位厥德匪常九有州以亡未露一德之名先𨼆言一德之用難言之也夏王桀弗克庸用德慢神虐民皇天弗保監于萬方啓迪有當有命天命之人眷求一德俾作神主典神天此一德之反也惟尹躬暨湯咸有一德克享當天心受天明命以有九有之師衆爰於是革改夏正夏正建寅商正建丑周正建子尹躬暨湯之語先己後君尹豈昧於君臣之義哉孟子知其心曰伊尹自任以天下之重其相湯伐桀放太甲而又反之任之至也非天私我有商惟天佑于一德非商求于下民惟民歸于一德一者不二以二參以三也私焉求之則非一矣德惟一動罔不吉德二三動罔不凶惟吉凶不僭差在人惟天降災祥在德吉凶悔吝生乎動吉一而已凶悔吝居其三動可不謹乎罔不吉則周旋泛應皆合於理吉孰大焉吉非福祥恬愈安養之謂凶非災害拘畏急迫之謂理之合背即吉凶也雖降于天實在於德無毫髮差也今嗣王新服踐厥命天位惟新澡雪興起厥德終始惟一純時乃日日日新其為物不二則其生物不測衆人所謂新蓋變法易令耳聖人所謂新則始乎是終乎是也如天地之運終古不變而四時之氣俄春俄夏無一日不新也任官惟賢才左右左右大臣孔云侍御之臣惟其人臣為憂上君為德一德為下臣為愛民其難其慎難而慎之擇君子而勿閒以小人也惟和和其心惟一一其德此以輔成一德也為德為民君民一也一說和一屬下段發而皆中節謂之和和則一矣德三德九德無常定師德皆可法主善以剛善柔善為主則不入於剛惡柔惡為師善剛善柔善無常主善皆所主協合于克一萬殊一本是萬為一詳見通書第七章第二十二章此一德之原也於德而擇其善於善而㑹於一克一而萬善備矣俾使萬姓咸曰大哉無不該王言心之聲又曰一哉無不貫王心言之本克綏安先王之祿天命永長底定蒸衆民之生此一德之驗也德一矣證諸民而咸曰又曰焉則其高明盛大乃可以上承先王而下安蒸民矣嗚呼七世之廟可以觀德天子七廟祖有功宗有德親盡遂毁有不祧者以有德也萬夫諸侯曰萬民之長可以觀政有政乃能統衆后非民罔使民非后罔事無自廣大以狹小人匹夫匹婦不獲自盡不得盡其意而怨民主罔與成厥功穆穆穆七世祖太昭昭昭七世觀德古今一也萬夫觀政天子諸侯一也非民非后君民一也無自廣狹人人已一也自廣則無以盡民矣非德之一也沃丁既葬伊尹于亳咎單遂訓暢伊尹事功德作沃丁一書亡伊陟孔氏謂伊尹子相大戊沃丁弟太庚之子亳都有祥不善之祥桑榖共生二木共生七日大拱于朝非生木地伊陟贊告于巫咸臣名作咸乂告咸以自治之說四篇四書亡大戊贊以桑穀之祥告于伊陟作伊陟原命二書亡原臣名以言命原故書名云遇災懼而修德為商中宗仲丁遷于嚻作仲丁一書亡河亶甲居相作河亶甲一書亡祖乙圮水毁于耿作祖乙一書亡尚書詳解卷四
