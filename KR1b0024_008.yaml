body:
  text: 尚書詳解卷八宋胡士行撰康誥第十一周書成王既伐管叔蔡叔以殷餘民不遷洛之民封康叔文王子作康誥酒誥梓材三監既伐商之大家世族皆遷洛周公君陳畢公始中終之所式化也其存而不遷者為餘民衛地康叔所封也康誥惟三月哉始生魄十六日周公初基立基址作新大邑于東國洛四方民大和恱㑹如靈臺子來侯甸男邦采衛五服之邦五服男居中言邦則五服可知此史臣立言之體百工官播鼓舞民和見著士事功于周周公咸勤勞來慰撫乃洪𢎞大誥治治道作洛邑者欲以遷商民也命康叔者所以撫不遷之商民也脉絡正相關係卜洛之先已封康叔矣當宅洛時臣民畢㑹誥於時作焉所以大警衆也故不曰命而曰誥云大誥東征所作書也前此誥雖作而人方為疑猶未盡孚至此大和㑹乃洪前日大誥之意而發明之則人無不孚者矣王若曰孟侯諸侯之長朕其弟周公以王命告故弟康叔小子封康叔名惟乃丕顯顯德考文王克明德日月照臨慎罰視民如傷不敢侮輕鰥寡庸庸用所當用祗祗敬所當敬威威懲所當懲顯民公道暴白於民用肇始造有我區域中夏中國越我一二邦以修始修之一二邦我西土惟時怙恃之如父時怙絶句冒屬下句冒覆之如天聞升聞于上帝天帝休美天乃大命文王天之命非本心殪滅戎大殷誕受厥命越厥邦厥民惟時敘次敘乃寡少有兄武王勗勤以成厥勳肆故汝小子封在兹東土衛自古明斷之君多恃其明而於細微之失不復知文王以丕顯明德而曰謹曰不敢於庸祗威毫釐不苟焉此王業所以興也然文王之本心不過修我之一二邦耳至西土怙冒而天命歸焉則非其心也故終逃之其身而後不能逃其子焉以文武艱難如此然後汝康叔得此東土為諸侯可不深自警歟林云此篇首尾多及刑左傳曰周克商蘇忿生以溫為司寇立政所謂司寇蘇公是也又曰康叔為司寇則成王時繼蘇公者康叔也康誥之作雖使即封本國外亦并告以司寇王朝內詰姦之事故書有曰外事外庶子外正者以衛言也曰內者司寇之事也王曰嗚呼封汝念哉今民將在在叔祗敬遹述乃文考紹繼聞所聞衣佩服德言父兄道德之言往敷廣求于殷先哲王賢聖之君六七作用保乂民汝丕遠惟商耉老成人故家遺老猶有存者宅安宅心知訓老成之訓一云訓民有所宅則有所知虛靜不礙誠而明也别又求聞多聞由用古先哲王羲黃堯舜禹湯之法用康保民𢎞學問廣充于天與天同大若德裕足乃身粹面盎背不廢在王命遹文考矣又求之殷哲王商耉成人猶未巳也又求之古先哲王凡羣聖心傳之妙制作之法悉聞悉見則學問精深衆理該貫道之大原其出於天者裕然在乃身而後王命可以不廢矣曰不廢者言至此僅可免過而已人臣職分豈易盡哉必如舜與曾子方能不廢父命必如舜與周公方能不廢君命叔懋之哉王曰嗚呼小子封恫痛瘝病乃身敬哉天畏明畏棐忱民情大可見明威小人難保撫后虐讎往盡乃心無康安好逸豫乃其乂民民乂則天棐在其中我聞曰怨不在大亦不在小無大無小皆可治亂惠當順不惠不順者懋勉不懋已汝惟小子乃服所服行政教惟𢎞大王王道應答保安殷民亦惟助王宅安順天命作興新民衛之封以商民恫瘝汝非可忽以為富貴之具也天可畏而難諶民可見而難保皆爾侯憂責也可二爾心乎乂民亦所以奉天也民情難保召怨之端不在大小必於其不順不勉者而順之勉之焉則庶幾可以無怨矣於以𢎞王助王應保作新定宅天命皆以汝小子是望可不勉諸王曰嗚呼封敬明乃罰人有小罪非眚過失乃惟終怙終不悛自作注絶句不典常式用爾知此有厥罪小乃不可不殺乃有大罪非終乃惟眚災橫過適偶爾既道說極盡厥辜罪時是乃不可殺此司寇事也虞書宥過刑故之義王曰嗚呼封有敘為治有敘時是乃大明明其事服民服惟民其勑相正懋相勉和協若有疾視民如身調護醫治惟民其畢盡棄遠咎罪若保赤子保民如子心誠求之惟民其康乂非汝封刑人殺人刑殺天討非汝得私無或刑人殺人戒其刑殺非汝封又曰劓割鼻刵割耳人劓刵輕刑亦非汝得私無或劓刵人戒其劓刵若疾若子以待吾民可也刑可輕刑殺劓刵之乎一說非汝封得刑殺人也又不可使刑殺人不出於汝封句又曰下亦如上文非汝封得劓刵也又不可使劓刵人不出於汝封承上省文耳王曰外事司寇王官為內衛國所封為外汝陳列時是臬法司官師法注絶句兹殷罰有倫敘又曰要察囚情服服膺念思五六日至于旬十日時三月丕大蔽斷要囚此衛國事也用法天下通用然殷罰又衛之民所素習也故師之服念之久謹之至孔云司師絶句司主師衆也王曰汝陳時臬事罰蔽殷彞常法用其義合義刑義殺勿庸用以次就汝封私意乃汝盡遜用刑盡順於理曰時是敘有條理惟曰當自謙曰未有遜事此申言上意也已汝惟雖小子未其有有人若如汝封之心善朕心朕德惟獨乃汝知凡民自得作罪孽寇竊取攘强取姦外亂宄內亂殺越取人于貨取其財睯强凶不畏死罔弗憝惡以汝之心知朕之心尚德不尚刑而已民有自得罪而人無不惡以至不得不刑焉此豈朕心也哉王曰封元惡自得罪為大惡大憝已大可惡矧惟不孝不友子弗祗敬服幹厥父事大傷厥考心于父不能字養厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠養子哀劬勞大不友于弟惟弔兹至此不于我政人為政之人卿大夫得罪不教之罪乎天惟與我民彝天降秉彝大泯沒亂上不教以致泯亂曰上不自責而曰乃其速由用文王作所立罰注絶句刑不孝不友之刑兹無赦不率身率而徒欲大戛擊之可乎自得罪者人可惡刑之已非朕心況不孝不友而亂民彝者乃政人不教之罪於此不自責而思正身以率之乃徒欲罪而戛擊之又可乎哉矧惟外衛庶子訓公族之官訓人掌教人惟厥正人長人者越小臣諸節有符節者乃當别分播散敷布造成民大譽稱頌弗念念此弗庸用此瘝病厥君時是乃引長惡惟朕憝已汝乃其速由兹義率皆殺亦惟君惟長不能善教厥家人越及厥小臣外衛正官長惟威惟虐大放王命乃非德用乂汝亦罔不克敬敬敷典五常之教乃由用裕在寬民惟文王之敬忌慎罰乃裕民曰叔曰我惟有及及文王則豫一人以懌喜民彝泯亂且當自責矧庶子正人諸節乃臣職之當播敷造譽者顧不念庸以病其君焉於是以其可惡而速殺之是汝為人君長不能正家以正人徒尚威虐而小臣外正亦效之矣豈天命汝以德義之意乎汝知刑之不足尚則必敬敷五教在寬而以文王之慎罰為法可也汝能法文王之敬忌而自任曰有及焉是乃豫尚德之意也而豫云胡不懌乎王曰封爽明惟思民當迪導以吉康之道我時是其惟殷先哲王德用康乂民作起求矧今民罔迪不適之善不迪則罔政在厥邦刑不可尚則有迪之以德而已人無有不善無迪之而不從者若不迪則是上之人自無善政非可徒咎之民也王曰封豫惟不可不監商先王告汝德尚德之說于罰慎罰之行事今惟民不靜安未戾定厥心迪導屢數四矣未同皆化爽明惟思天其或罰殛我不能化民我其不不敢怨怨天惟厥罪已有罪無在大亦無在多不大不多且不可矧曰其尚猶顯大聞上聞于天既不咎民則當自責而已先王之明德慎罰不可不監也民之迪而未同是我君師之責未盡天且罰我我不敢怨也王曰責如此叔當如何罪未有不自微而著者叔其兢兢焉可也王曰嗚呼封敬哉無作怨結怨勿用非謀正言非彝常道蔽斷以時是忱至誠不息丕大則法敏疾德用康安定乃心顧日月省乃德遠深長乃猷謀裕寬乃以民寧不汝瑕疵殄絶非謀非彝則結怨於民矣不可用也惟明善而守之以誠康焉顧焉遠焉躬自厚而薄責於民寬裕優柔納民寧謐則汝豫嘉而肯瑕殄之乎王曰嗚呼肆陳告汝小子封惟命我所命爾不于常大而非常汝念哉無我殄棄絶我言享知未八殄明不迷其意乃服命所戒全篇之命髙尊乃聽所聞用康乂民此篇將終警叔以深領其告命也孔云天命不于常享有國土當明汝服行之命夏云無殄絶其享上之意髙聽殷上古王逺大之事王若曰往哉封勿替廢敬典前所謂罔不克敬典聽朕誥汝乃以殷民世享世世享國此申前意而期以無窮之效也酒誥第十二周書紂為長夜之飲臣下化之此當時大病故一書專戒之酒誥王若曰明詔布大命于妹邦衛也紂都乃穆敬詩穆穆文王考文王肇始國在西土厥誥毖戒慎庶邦庶士越及少正官之二副御事朝夕不息曰祀兹酒惟祭乃用酒惟天降命置酒肇始我民惟獨元大祀天降威罰我民用大亂喪德亦罔非酒惟行越小大邦用喪亦罔非酒惟辜紂沉湎之化溺人者深故文王所以訓其屬者朝夕不息謂夫所以置酒者以奉祀事耳外此而湎酒者則得罪於天而喪德喪邦矣文王誥教小子及其未流而先正之有正有官長臨之不敢飲有事若三農九穀之類不暇飲無彝酒常飲越庶國飲惟獨祀祭飲福德將以德將之無醉惟曰我民祖父迪又自教小子子孫惟土物愛愛土所生之物不敢糜秫稻為酒漿厥心臧善聰聽子孫用心聽祖考之彝常訓教越於小飲酒大修身大成德小子惟一視小如大無二汝心文王誥毖庶邦下至小子者謹其初也既教之又使其祖考自教之謂酒小節也而大德之敗實自此始故愛土物者所以臧厥心小大一也爾小子謹無以不飲為小德而忽之彝酒之二字正妹土受病之源懲之不得不力也妹土提妹土而教之嗣續爾股足肱手純純一無怠文王之德之純其藝種黍稷奔走事厥考父厥長兄肇牽車牛遠服事賈商用孝養厥父母厥父母慶喜子遠歸自洗潔腆厚致用酒慰勞乃得飲前言文王所以教西土此以後成王告康叔所以教妹土粒食懋遷仰事無歉至此乃得飲則其飲也有節矣庶士衆官有正長越庶伯官長君子其爾典常聽朕教爾大克羞養耉老成之人惟君盡君道爾乃飲食醉飽成王周公開飲酒之門不過三事祭祀用酒父母慶用酒養老用酒三者皆良心所發於適情之中有養性之術孔云羞進老成之道丕大惟思曰爾叔克永長觀顧省察作動稽考中德爾尚庶克羞進饋祀祀祖考爾乃自介介然自守於己用逸飲福得自安適之時兹乃允信惟王正事德中則能正事之臣兹亦惟天若順元善之長德永長不忘在王家觀省之永則一動作一飲啄不少放肆得飲福矣猶介然不自縱如此則能稽此中為此正而進於元矣元天德也天且不違而王能忘之乎孔云介大也夏云助也王曰封我西土文王在西土棐輔教徂往日邦君御事小子尚庶克用從文王教不腆厚于酒故我至于今克受殷之命紂以酒亡而周以不腆酒興可以酒為小德而輕之乎王曰封我聞惟曰在昔殷先哲王迪啓知畏天顯顯道小民難保經常德秉執守哲天命之哲自成湯咸皆至于帝乙賢聖之君六七作成王王業畏敬相臣惟御事厥棐輔君有恭不敢自暇自逸矧曰其敢崇尚飲越於在外王畿外服有事侯甸男衛邦國君伯長越在內畿內服百僚屬庶尹正惟亞副二惟服宗工服事尊官之人越百官姓族里田居不在位閒居者罔敢湎于酒不惟不敢亦不暇惟助成王德顯明越尹正人祗敬辟法此舉商先王不湎酒以為教也君以畏天畏民之心畏相而臣皆以敬畏應之其不敢飲也猶有所畏而力制也至不暇則安之矣雖誘之不為也惟助成君德之顯使其所以正人者能敬法而已敬商人所尚敬則不飲此止酒第一劑也我聞亦惟曰在今後嗣王酣樂沈醉身厥命令罔顯于民祗所敬保所養越方在於怨結怨不易改變誕大惟厥縱淫和泆蕩于非彝常用燕飲喪失威可畏儀可象民罔不䀌痛貌傷心惟紂位荒縱腆厚于酒不惟思自息止酒乃逸自以飲為安厥心疾凶狠戾不克畏死酒使之然辜在商邑越殷國滅亡無不罹以為憂弗惟德馨香注絶句祀登聞于天誕惟民怨庶羣自酒腥聞在上故天降喪于殷罔愛于殷惟逸安于酒天非虐惟民自速辜此言紂湎酒之禍以為戒也王曰封豫不惟但若如兹此多誥戒古人有言曰人無於水監鑑水照妍醜當於民監監民照興亡今惟殷紂墜厥命我其可不大監紂撫安于時當時之民監殷撫民於叔乎望誥之多夫豈徒哉豫惟曰汝劼固毖慎殷獻賢臣侯甸男衛孟侯所統矧太史掌六典八法八則友叔所親友內史掌八柄之法友越獻臣百宗工賢臣為尊官者矧惟爾事汝事一云師事服休坐而論道多暇逸者一云告老歸休服采作而行之治事者矧惟若順疇衆人之事圻父司馬掌九圻之法尊之為父薄回違民非心農父司徒厚民若順保民居宏父司空定辟君必慎擇司徒司馬司空三卿則君道定矧汝剛力制于酒劼毖者敬重之也即前畏相棐恭之意也殷獻臣侯甸男衛固劼毖之矣況太史內史宗工乎況爾所事休采乎況國之三卿乎然將毖人不可不自毖也況汝叔又自當剛制於酒乎夏云劼毖使羣臣不湎酒剛制使叔不湎酒也厥或誥曰羣聚飲汝勿佚縱其逃盡執捉拘以歸于周京師豫其將殺又惟殷紂之迪所化諸臣惟工乃湎于酒勿庸用殺之姑惟教之有斯明享祀也勿殺而姑教之曰此酒止以奉祀不可湎也可謂厚矣乃又不用從我教辭姑教之辭惟我一人弗恤不恤我不殺厚意弗蠲潔乃事時是同于殺至此乃不得不殺曰其殺矣又曰勿殺而姑教之至教之而又不用弗恤弗蠲乃殺之不殺者本其心殺者其大不得已也王曰封汝典聽朕毖慎勿辨使乃司民主民之臣湎于酒此正身正官以清不飲之原也故以終篇梓材第十三周書梓材王曰封以厥庶民暨及厥臣以一國民之情達通之於大家以厥臣又以大家臣民之情達王惟邦君為國家之綱領在通上下之情流言之變由上下之情不通耳故妹土之化以通一國之情為急大家彊而難通者也天子尊而難通者也於此脉絡相貫則亂無從起矣此為邦之本也汝若順恆常道越於是曰我有師師以典常之師為師司徒司馬司空國之三卿尹正官旅衆大夫曰亦曰豫罔無厲虐殺人亦厥君先敬如承大祭勞慰勞其民肆故徂我所往宜厥敬勞肆往姦宄殺人歷人賊所過歷如今干證宥肆亦見厥君事戕賊敗禍人宥好生之德不特撫新國當然亦三代得天下之本也叔能師典常而明德慎罰焉則其三卿以下皆以不厲殺自許亦其君以敬勞先之故其往而宥刑者亦見其君宥刑之故耳王古王啓聞立監民監諸侯之長如三監之監自黃帝立左右監之官以監觀萬國厥亂治為民曰無胥相戕無胥虐至于敬不侮寡至于屬連屬存恤婦婦妾合合為一體由用以容包王成王其效致此命於邦君越及御事厥命曷何以引和緩不迫漸而引之養引恬安自古王若如兹此監監呼康叔而告之罔無攸所辟刑此承前因厲殺之意古王所以啓監者為民而無戕虐寡必敬婦必屬視民如一體也則今王所以命邦君者亦優游和緩以漸而安康之耳豈以刑而操切之邪惟曰若如稽考治土宜田既勤用力敷開布菑去草惟其陳陳設修修治糞壤之類為厥疆畔塍所以蓄水畎洫所以瀉水若作室家既勤垣卑牆墉髙牆惟其塗泥塈仰塗茨蓋若作梓材梓木之良材既勤朴坯略治斫詳治惟其塗漆丹朱雘采飾既勤喻前人創業之難也惟其喻今日嗣業之不可不成其終也吕云周自大王王季文武積纍周公復為定亂十已八九今所少者隄防覆蓋粉飾而已康叔茍不撫摩餘民復為變亂前功皆廢矣命之之意至切也今王惟曰先王文武既勤用徽柔懿恭不遑暇食明德懷懷撫諸侯為夾為夾輔庶邦享來朝作如兄弟親密方萬方來亦既盡用明德文武以德先諸侯以德應后成王為元后式用典文武舊典集合庶邦丕大享皇天既付托中國禮樂法度之區民越厥疆土于先王肆大也一民莫非其臣則尺地莫非其有王今王惟專德用和調懌恱先挽後推迷民商民未感周化用懌恱先王受命天付民之命此以實前既勤惟其之論也先王既勤德以懷庶邦矣今王可不式典以益集之乎惟皇天以中國民托之先王以其用德之勤故也於中國民之中有迷民焉天與先王之意必不懌矣今王得不純於任德以和懌迷民者而懌先王受命乎一云先迷民紂之民後迷民武庚之民已歎辭若兹監呼叔惟思而曰言欲至于萬年惟王子子孫孫永保民用德者王也而體德以施之民者監也故致歎以深望康叔謂吾心所欲將萬年惟王世世保民而無有間此用德之意者焉監分吾民者可不深長思邪召誥第十四周書成王在豐舊都宗周文王廟在焉欲宅洛邑土中受四方朝㑹道里均使召公先相視宅作召誥后稷封邰公劉遷豳岐西北四百里大王遷岐邠西五百里文王都豐岐東南三百餘里武王都鎬豐二十五里史記武王克商遷九鼎於洛邑其言曰我南望三塗北望嶽鄙顧詹有河粵詹雒伊無遠天室營周居於雒邑而後去是宅雒武王本意而未成者也至周公相成王致太平將歸政遂營洛邑以居九鼎㑹諸侯而王都則常在鎬平王東遷始都洛而鎬為禾黍矣周公作洛有二瀍水西郟鄏為都定鼎曰王城曰東都瀍水東遷頑民曰下都成周王城在西下都在東春秋王子朝在王城曰西土敬王在成周曰東土或云成周王城下都總名召誥惟二月既望十五越六日乙未二十一日王朝早步行自周鎬則至于豐告文王廟惟太保召公先周公相宅越於若順王命來行三月惟丙午朏初三越三日戊申初五太保朝至于洛卜宅厥既得卜吉則經營規度朝市宗廟郊社之位太保二月二十一日離豐三月六日至洛豐至洛不必半月經涉之久者在道審定規模至洛舉而行之耳越三日庚戌初七太保乃以庶殷所遷殷民攻治位所經營之基地于洛汭越五日甲寅十一位成若翼日乙卯十二周公朝至于洛則達遍觀于新邑營既得卜一日乃攻位者相視籌度而後興工築也五日位成者庶民攻之不日成之亦見其不窮奢侈不待曠日持久也越三日丁巳十四用牲于郊天牛二后稷配越翼日戊午十五乃社五土之神于新邑牛一羊一豕一禮有以少為貴者越七日甲子二十一周公乃朝用書賦功屬役册書命庶殷侯甸男服邦伯方伯厥既命殷庶庶殷丕大作起赴功達觀之後三日而祭天明日而祭地又七日而命役遷延十餘日者事愈大則動愈遲反覆經營規模全備用工之後不愆於素蓋不於斧斤紛紜之時始有商議也庶殷讎民也而丕作綏來動和之妙如此太保乃以庶邦冡君出取幣贄見之幣乃復入錫豫周公曰拜手稽首旅陳王若及公誥告教庶殷越自根本在乃御事周御事一云如所謂敢告僕夫不敢斥王也洛事畢周公將歸召公以戒王之辭使周公轉達之王告殷自御事此旅王大意下文乃申言之嗚呼皇天上帝改厥元子紂為天子而天換易之兹大國殷之命轉為周惟王成王受命無疆窮惟休美亦無疆惟恤憂責之大嗚呼曷其若之何奈何弗敬天既遐棄終絶大邦殷之命兹殷多先哲王在天若可憑藉越厥後王紂後民紂之民兹服受厥命厥其終後智明智之人藏退休瘝病民之人在在朝夫受害之民知保抱攜持厥婦子以哀籲呼天徂往厥亡逃紂虐出方出執紂已拘執之嗚呼天亦哀憐于四方民被紂虐其故眷命周用懋篤王其疾速敬德敬天德也相視古先民古之人有夏禹天迪啓從順子傳之子保面禹仰稽考天意若順今時此既墜厥命今相有殷湯天迪格至保面稽天若今時既墜厥命今沖子嗣位則無遺忘夀耉老成人多識前言往行曰其庶能稽考我古人之德矧曰其有能稽謀自天天道夏殷之與天一如此今皆墜命命其可常乎前人其可恃乎惟有老成不特可以考古道況可以明天道則庶幾可以永保天命也嗚呼有王雖小幼沖元子天之元子哉其庶幾丕大能諴和于小民今即休美王不敢後用當躬用力顧視畏于民碞險載舟覆舟安輿駭輿王來洛紹繼上帝自服行于土中民一也而其中有小民焉有民碞焉尤王者代天子民中天下而定四海者所當加意也旦曰其作大邑其自時此配合皇天毖謹祀于上神下祇其自時中土中又治王厥有成命天命之定一云君命治民今休此召公舉周公之說以證自服土中之論也作大邑則有大規模大功業所以配天祀神治民而致命之成民之休者皆在此可不重歟王先不敢後服治殷御事化殷民在治御事比近介副二于我有周御事合商周御事為一以漸染陶成之節折性商臣之性惟日日日其邁進善王敬作所以敬為所止其所止不可不敬德不得不然不待勉强性本善也習之遠而有不善焉比介于周則節而日邁其善之天還矣然又當祗德以先之不可徒諉之御事而已也我不可不監視于有夏亦不可不監于有殷我不敢知曰有夏服受天命惟有歷繼歷年多年我不敢知曰不其延長惟不敬厥德乃早墜厥命我不敢知曰有殷受天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命今王嗣繼受厥命我亦惟兹二國夏殷命天命所以長短嗣繼若順功敬而有功者國之興亡長短既視之又視之其敬不敬耳王乃初服宅洛即辟初行政嗚呼若生子罔不在厥初生保養於初自貽與哲人心自有之明哲命命在我不在天今天其將命哲命吉凶命歷年哲則吉而永年不哲則不永不延天之命其幾皆於女而占之知天已知今我王初服宅新邑肆惟王其疾敬德服初邑新天命占焉敬可不疾王其德之用祈求天永命邑之新政之新天命之新也敬則永矣其祈也其諸異乎禱祈之祈矣天之命曰其未可必也哲之貽曰自所可必者在我而已祈者未定之辭也其惟王勿以小民淫用非彝亦我亦敢果過殄絶戮殺用乂民民自過我自不過民自無常我自有常若若欲有功其惟王位居上位在德元元者善之長乾元坤元之元小民乃惟刑儀用用德于天下越王顯先如春氣著物無所不遍所以顯也非彝者民之過也王可以其過而亦敢過於嚴刑以治之乎若欲有功惟在德元元則如天之覆民皆儀刑而王之顯何以加此孔云若順禹湯所以成功上君下臣勤勞恤憂其庶幾曰我受天命丕大若如有夏歷年四百三十七年式用勿無替廢有殷歷年六百二十九年欲王以小民受天永命君臣祈天永命在小民而已民惟邦本國之興亡不在諸侯不在姦雄盜賊止在小民之身故召誥屢致意焉拜手稽首曰豫小臣敢以王之讎民商民百君子商臣越友順民周民從化者保安受從王威命明德德威德明王末終有成命王亦顯當顯其德我非敢勤自謂勤勞言無補國家惟恭奉幣帛用以供待王注絶句能祈天永命前言小民此并合讎民友民為一以待王之威明而保受之則所以祈天之道盡矣抑此在王之能而已豫何力之有焉故曰非敢勤而用供王者所以歸重於王室矣尚書詳解卷八
