front:
  text: 欽定四庫全書經部二
  hash: sha256:0cc932f81e16f40609470aaa0474e8369dec60a220254d8de2f21651552b055d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0024_WYG_000-1a, image: WYG0060/WYG0060-0281a.png}
body:
  text: 尚書詳解書類提要臣等謹案尚書詳解十三卷宋胡士行撰士行廬陵人官臨江軍軍學教授是編焦竑國史經籍志作書集解朱彛尊經義考又作初學尚書詳解稱名互異其實一書也其解經多以孔傳為主而存異説于後孔傳有未善則引楊時林之竒吕祖謙夏僎諸説補之諸説復有所未備則以己意解之堯典星辰之伏見列為四圖以驗分至洪範初一曰五行則補繪太極圖以釋初字見五行生尅之有本雖皆根據舊説要能會萃以成一家言猶解經之篤實者也所引漢晉人訓詁間有異字如益稷篇引鄭康成云黹紩也紩以為繡也與注疏所載不同凡斯之類亦見其留心古義不但空談名理矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀尚書詳解原序尚書史官所紀孔子刪之始皇燒之孔襄藏之至漢文帝時伏生口傳二十篇以其上古書加尚字尚上也藏書既出增為五十八篇武帝詔孔子十一世孫安國注并作此序古者伏犧氏風姓之王以木德王天下也始畫八卦伏羲時河中龍馬負圖畫八卦乾坤震巽坎離艮兑造作書文字契刻木書其側各持其一以相考合以代替結繩上古結繩而治大事大其繩小事小其繩之政由因是此文字籍記生起焉此言書所由起也乾三連天父震仰盂雷長男坤六斷地母巽下斷風長女坎中滿水中男艮覆碗山少男離中虛火中女兌上闕澤少女伏犧神農炎帝薑姓以火德王黃帝軒轅姬姓以土德王之書謂名之三墳大言大道也少昊金天氏已姓黃帝子以金德王顓頊高陽氏姬姓黃帝孫以水德王高辛帝嚳姬姓以木德王唐帝堯姓伊耆氏自唐侯為天子都陶帝嚳子以火德王虞帝舜姓姚顓頊六世孫以土德王之書謂之五典常言常道也至于夏禹姒姓以金德王商湯子姓以水德王周文王武王姬姓以木德王之書雖設立教不倫類雅正誥告教奧深義理其歸一揆度是故歷代寶愛重之以為大訓八卦之説此書説八卦之義謂之八索求求其義也九州之志記謂之九丘州丘聚也言九州所有土地所生如禹貢厥貢厥篚風氣所冝如周禮職方其榖種與民冝皆聚此書也此歷考上世衆書之名也春秋左氏傳曰楚左史官倚相名能讀三墳五典八索九丘事見左傳即謂上世帝王遺書也此言孔子未刪前衆書之煩也先君尊其祖孔子生於周末衰世觀史籍史官所記之煩多雜文字懼覽觀之者不一無統遂乃定禮樂述而不改曰定孔子有德無位不可制禮作樂但於舛謬者定之而已明發舊章典法禮樂定則舊章明矣刪就而減削詩本三千篇為三百篇三百十一篇此舉大數約準依其事曰約史魯史記所記而修春秋春秋經依魯史成文以寓褒貶讚因而佐成曰讚易道文王衍易六十四卦孔子作干翼以明之以黜棄八索易道明則八索不必用矣述職方顯而明之日述周禮職方氏志九州以除九丘職方述則九州所有粲然几丘不必用矣此言孔子修禮樂詩書春秋易及職方下文却專説定書討尋求論講究墳三典五斷斬截自從唐虞以下訖至于周高辛以前世代久逺書不無雜亂者故只始唐虞芟除夷平煩雜亂翦截浮浮華無實辭舉揭其宏大綱如網之綱撮收取其機如弩之括要要則不泛足以垂下示世後世立教典謨訓誥誓命之文凡百篇歷世久歷君多書止百篇而已所以恢廣𢎞大至道二帝三王至要之道示人主以軌如車有軌行者共由範如器有範作者共則也帝王之制制作之法坦平易然明白可舉而行皆實用非虛言三千之徒孔子弟子三千並皆受傳其義孔子定書皆有用之學出非時而不見用但傳之弟子而已及秦始皇滅絶除先代典籍欲愚黔首焚書坑瓜丘儒見通鑑始皇二十四年天下學士逃難解分散我先人孔子七世孫子襄用藏其家書于屋壁兩壁中漢室高祖起兵滅秦龍興如龍興起開設立學校亦學旁四散求儒雅雅正之儒以闡開明大猷猷即六經濟南郡伏姓生名勝年過九十失其本經口以傳授教裁近二十餘篇以其上古之書謂之尚書百篇之義世漢時莫無得聞伏生始皇子二世時博士漢文帝時求治書者聞伏生治之欲召老不能行詔朝錯往受之得二十九篇他篇名存而書不可得聞矣至魯共王景帝子好治宮室壞孔子舊宅以廣其居於壁中得先人所藏古文科斗字頭粗尾細狀似科斗虞夏商周之書及傳詩書禮樂易春秋為六經非經者為傳論語孝經皆科斗文字王又升孔子堂廟聞金石絲竹樂之音聲神異乃不壞宅悉盡以書還孔氏科斗書廢自秦不用已久科斗書始蒼頡至三代不改周宣王時史籀大篆與科斗並行秦滅古文别立八體故科斗書經秦至漢久廢時漢人無能知識者以所聞伏生口誦之書對壁書考參論文字義理定其可知者為𨽻字秦六體之一當時所用古定用𨽻字作古文以定之更改以竹簡竹長一尺一寸殺青書之謂之竹簡寫之增添多伏生二十五篇并伏生所傳共五十五篇伏生又以舜典合於堯典以二篇合為一益稷合於臯陶謨二篇為一盤庚三篇合為一康王之誥合於顧命二篇為一復又出析出此篇共五篇并序舊簡百篇自為一篇凡五十九篇為四十六卷其餘五十八篇之外錯雜亂摩擦滅盡弗可復知悉上送官藏之書府祕府以待能能識者承奉詔武帝命為與五十九篇作傳解以傳道經意於因是此遂即研覆究精審覃深靜思思索博廣考究經籍六經採求托摘羣言百家書以立作訓訓字傳解意約省文字申明義理敷分布暢條達厥其旨意庶幾望有補益於將來後出書序孔子所作百篇序序鋪述所以為作者之意昭明然義一篇之義見觀序可見宜當相附粘近故引分之各冠如冠在首其篇首舊書序自為一篇今分之各置逐篇之首定五十八篇既畢終會值國有巫蠱事蠱從蟲從皿怪惑之名經籍道息武帝本好經籍因巫蠱事擾遂息滅武帝末年惑鬼神信巫術江充先於太子宫埋桐人告帝云太子室有蠱氣帝使充治之果於太子宫得桐人太子知充陷已殺充帝不知太子心發兵討之太子自殺用因不復臾以聞奏命傳私傳之子孫以貽與後代若若有好古博多學雅正君子與我同志志慕明古道亦所不隱也庶幾所作訓傳不至隱蔽尚書詳解原序
