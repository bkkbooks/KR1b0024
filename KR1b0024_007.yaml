body:
  text: 尚書詳解卷七宋胡士行撰洪範第六周書武王勝殷殺受紂自焚而死立武庚紂子以箕子歸作洪大範法殷之當勝紂之當殺武庚之當立箕子之當以歸並行而無心循天命之正由至公之理也以者箕子之心不歸周以之歸者武王也箕子嘗言罔為臣僕矣然天以是道畀禹傳至箕子非武王莫可傳也且武庚之立武王遇商有禮矣此箕子所以歸也洪範書所陳治天下大法故名惟十有三祀商曰祀以年為祀緣箕子不忘商之意王訪問于箕子訪不敢屈而致謀焉則就之也王乃難辭天道大法王乃問言曰嗚呼箕子惟天隂黙騭定下民相輔協合厥居生生之理我不知其彞常倫次攸所以敘即九疇之先後一云常道次序降衷秉彞起居飲食凡民所以生者皆天也人主代天裁成輔相可不知乎武王豈真不知哉聖學無窮與湯未知獲戾之心一心也箕子乃思慮乃對言曰我聞在昔非臆説鯀陻塞洪水鯀以為土勝水故陻水當䟽通陻則汩矣汩亂陳其五行五行一曰水水汩則五者皆汩帝乃震怒不畀洪範九疇九者如田疇之布彞倫攸斁敗九疇何嘗斁哉鯀自斁其身之彝倫也鯀則殛死禹鯀子乃嗣興天乃錫禹洪範九疇彞倫攸敘天豈在身外哉彞倫天理也一毫人為不可加鯀作為而汩之所以斁禹行其無事自然攸敘孔云天與禹洛出書神龜負文以出列於背數至九禹因而第之二七六戴九履一左九五一三右七二四四三八為肩六八為足五居中位九五一七五三二七六二九四六一八四三八四五六二五八縱横數之皆十有五初一曰五行初一絶句物莫不有初大極動而生陽静而生隂一動一静互為其根陽變隂合而生水火木金土二氣五行之精妙合而凝化生萬物則五行者萬物之初也故次於一自五事而下皆自五行推而用之故獨不言用猶乾易不言所利而所利愈大也次二曰敬用五事人禀五行之秀以為人吾身之五事即二氣之五行故次二敬者身所以修也次三曰農厚民用八政身修則可出政故次三次四曰協以人事合天時用五紀出政必協天時故次四次五曰建立用皇大極中至五中數極中理為九疇之主故次五居中次六曰乂治用三徳正直中經剛柔時中權極中也三徳時中也執中不可無權故三徳次皇極次七曰明明白洞達不蓄疑用稽以卜筮考決疑前所言本末已備似無可疑至次七復謂之稽疑者聖人至公之體不敢自信也次八曰念念念不忘用庶徴以天時證人事稽吉凶於卜筮尤不若證休咎於天念則心與天一矣次九曰嚮嚮此者用五福威背此者威以用六極君子修之吉小人背之凶出太極圖説福極豈自外至哉次八言休咎所以正后身之是非也次九言福極所以正萬民之是非也故疇以是終焉一五行自此以下箕子以所傳詳釋疇義也五行順布循環無端流行無息故謂之行一曰水天一生水地六成之水隂根陽也二曰火地二生火天七成之火陽根隂也三曰木天三生木地八成之四曰金地四生金天九成之五曰土天五生土地十成之生數天一地二天三地四天五水火木金土成數地六天七地八天九地十天數五陽一三五七九地數五隂二四六八十此五行自然之數也水冬位仲冬一陽生故為水數火夏位仲夏五月隂不竒必以耦故以季夏二隂生為火數木春位仲春二月陽不耦必以竒故以孟春三陽生為木數金秋位仲秋四隂生故以為金數土四季春季為先故以五陽生為土數水曰潤下火曰炎上木曰曲直金曰從從人革變土爰於是稼穡春曰稼秋曰穡此五行自然之性也潤下作鹹流下至海為鹹炎上作苦炎焦作苦曲直作酸幹枝花實則酸從革作辛生綉而辛稼穡作甘此五行自然之味也天生五行民並用之明其性别其味不得而略也二五事形色天性物則也所當從事一曰貌木二曰言金三曰視火四曰聼水五曰思土始孩而貌稍長而言於是能視能聼而思終焉呂云孔門四勿視聼先言動箕疇五事貌言視聼者顔子為己舉目皆用工之地人君動容作命天下觀聽繫焉故也貌曰恭言曰從順理視曰明聽曰聦思曰睿通微此踐形之學所謂敬用也恭從明聰睿形色中本有此性特不敬用而非有事焉則失之耳曰如水曰潤下云者本然之體也恭作用工肅動容貌逺鄙倍從作乂出言善則千里之外應之明作哲無不知聰作謀善謀睿作聖禮自其本體而用工焉則徳成矣夏云作成也三八政一曰食粒食二曰貨懋遷三曰祀報本反始立國先宗廟作器先祭器四曰司空度地居民五曰司徒掌教六曰司寇掌刑七曰賔朝覲㑹同八曰師軍旅食為急貨次之食貨足則報本神得其所而後民安其居逸居不可以無教弼教不可以無刑此内治也來庭焉則賔之不庭焉則師之此外治也此即周官六典之所從出也食貨冢宰之職祀賔春官之職師夏官之職也四五紀五者人事之經紀不協則先時後時紛亂無統矣一曰嵗紀四時二曰月紀一月三曰日紀一日四曰星二十八宿迭見以敘氣節辰十二辰以紀日月所㑹五曰厯數以日月星辰之度數作甲厯以授民時此堯典羲和之事也一説嵗為嵗星每嵗厯一辰十二年一周天月顯乎夜日行十三度有竒日顯乎晝目行一度星辰即嵗月日所行之次五皇一曰大一曰君極中至横渠云極其大則中可求止其中則大可有皇極之體也一云皇君也猶言主極有極者天建極者君也朱氏專主至之説有皇極辨皇建立其有極極率性之道也不為堯存不為桀亡聖非豐愚非嗇也特凡民有之而不能有其有必有聖人焉立之此修道之教也斂聚時五福極建於此則福具於此用敷布錫與厥庶凡民人受天地之中以生能者養之以取福不能者敗之以取禍福非極外物也聖人先㑹此極則福聚於聖人矣遂敷之訓而還以立民之極則福散於民矣惟時厥庶民于往汝君極錫與汝保守極極本民所有也民不能有賴君之敎而有遂以此極為君之極君者萬民之取中一民弗保君之職有虧故曰錫汝凡厥庶民凡庶之民無有淫邪朋黨人臣無有比阿私徳惟皇大作興起極一説臣民所以無淫比以君能立極極性之所固有者也淫比習之所當無者也固有者有則當無者無有矣此天理人欲之界限也凡厥庶民有猷道有為能為有守執汝則念不忘之不雖不協合于極不亦不罹入于咎罪皇大則受容之而汝康安和而色載色載笑匪怒伊敎曰民言予攸所好徳汝則錫告予之福極中之五福孔云爵禄時人斯則其惟皇之極有極而無淫比則天下皆可教之人矣故此下詳言設教之術猷為有守能進取者也固當念之不協不罹有所不為者也亦當受之随其氣質色笑以教之而其好善之機動焉則随以嚮用之福利導而大歸之極皇極聖人其委曲成就斯人如此也一以曰好徳為君之言無虐煢單獨弱而畏髙明强人之有能有為使羞進其行徳而邦國家其昌盛凡厥正人才徳兼全能正之人既富禄之方又榖善持之汝弗能使有好愛于而汝家國時此人斯則其辜罪于其無好徳汝雖錫之福其作為汝用咎罪聖人之教一公平之心而已不陵弱不畏彊惟於其有才者進之徳以立邦家之基而已此正人之必富且榖所以勸天下之善以興民俗也茍正人不見尊用以無好于而家焉則人不知為善之福斯其辜而無好徳矣於此時而方欲以錫福誘之何及也夫人之生均禀此極而其氣質則不無上智下愚中人上下之間焉上智者不待教皇極之教為中人設故利導之術不得而不詳此綏猷為后之責也不然則陷吾民於其辜而胥為自暴自棄之下愚矣可乎哉無偏不正無陂不平遵用工從守王道粹為王無駁雜之意之義無有作私意妄作好遵王之道無有作惡遵王之路義路也道若大路然無偏私於己無黨私於人王道蕩蕩大而難名無黨無偏王道平平平而易見孔云平治無反如身當仰而反無側如身當正而側王道正直正直王道之本體㑹出而動合其有極歸入而静歸其有極此聖人所以建極之本有諸己而後可以求諸人聖人将以極敎人必先置吾身於醇粹之地遵者用工之始也力去其所謂妄作以遵之自外而入之辭也至蕩蕩以下則人欲淨盡天理渾融無事於遵而出入往來無往非極矣極之在我者全而以之建極何難焉呂云此反復吟咏皇極之體先有㑹而後自歸㑹如㑹聚之㑹歸如歸宿之歸一云君㑹極則民歸極曰箕子曰皇極之敷布言教是彝常是訓教于帝天命之謂性其訓修道之謂教凡厥庶民極之敷言君之言是訓自更相敎是行踐履以近庶㡬天子之光性之覺曰箕子曰天子作民父母以為天下王任修道之責此箕子總結前説也皇極之敎秉彝之天而已帝降之衷君民同一初性天光湛然虚明洞達何間而有氣質之異習而逺焉未覺者視先覺始相絶逺矣然其本同之性未嘗泯也有聖人焉以天訓之而民遂以君之訓我者父詔子兄詔弟更相訓而行之則天性一覺而民之天即天子之天矣覺有先後覺則無先後先覺後覺均一覺也而豈其逺而此天生烝民而王者代天作子又能全上天不全之功以更生之乃元后作民父母之職分故箕子於皇極之疇以是終焉一云此民頌君之辭六三徳此時措之宜也人謂剛柔非皇極之徳不知乃以納民於中所謂舉偏補弊如易之大過理本無過大過者乃所以使之無過也一曰正直此皇極之本體也中也二曰剛克勝於柔三曰柔克勝於剛此皇極之用也權也平康之時正直用正直彊暴很弗友順剛克治以刑法燮和友順柔克勸以爵賞此時而措之也周禮刑平國用中典刑亂國用重典刑新國用輕典正直行所無事剛克所以抑其過而柔克所以進其不及權所以為中也未可與權是不中也非中之外别有權也沈伏也潛蔵剛克髙亢明顯柔克剛勝矣而沈潜之使不流於暴柔勝矣而髙明之使不流於委靡此抑揚之妙剛柔所以不離於正直也孔云沈潜謂地雖柔亦有剛能出金石喻臣當執剛以正君髙明謂天為剛徳亦有柔克不干四時喻君當執柔以納臣呂云沈潛重厚之人教之以剛高眀有才之人教之以柔惟辟君作福慶賞惟辟作威刑威惟辟玉食珍臣無有作福作威玉食臣之有作福作威玉食其害于而汝家凶于而國人臣用側不正頗不平僻不中民用僭越忒差也如魯三家晉六卿此言操利勢以用三徳也名分嚴然後闔闢運量由已推移否則徳将安施乎惟辟所以嚴一人之分也臣無有所以安天下之分也呂云中者天下之大本人君亦天下之大本臣有之是二本也非中亦非權矣七稽疑擇建立卜龜筮蓍人乃命卜筮蓍龜至公無私之物必擇人之至公無私者乃通乎蓍龜曰雨兆霏霏似雨曰霽兆舒豁似雨霽曰蒙兆蒙暗隂黯曰驛兆絡繹相連屬曰克兆交錯相勝此龜卜也灼通視其兆之形曰貞内卦静而正曰悔外卦動而悔此蓍筮也大衍之數五十其用四十有九揲蓍以成爻卦内外凡七卜龜五占蓍用二衍推忒差疑以卜筮推知其忒而防悔吝立時是人作卜筮三人占則從二人之言周官三兆曰玉兆瓦兆原兆三易曰連山歸蔵周易俱有三法故必建三人從二人從衆也汝君則有大疑如遷亳誅管蔡謀及乃心先蔽志謀及卿士謀及庶人詢謀謀及卜筮昆命元龜汝則從龜從筮從卿士從庶民從是之謂大同順身其康彊子孫其逢所遇吉此成王定鼎郟鄏卜世三十卜年八百之事聖人與天地萬物為一無所不順流慶無窮汝則從龜從筮從卿士逆庶民逆吉此如盤庚遷亳筮龜無心之物既從則他雖有逆或别有私心何妨於吉卿士從龜從筮從汝則逆庶民逆吉此如周公誅管蔡之事庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作内祭祀吉作外征伐凶聖人洗心滌慮假無私之物以寓吾誠一有不從必有未盡作内猶可作外則必不可矣龜筮共皆違背于人皆從用靜吉用作動凶汝卿士庶民從矣何拘於枯莖朽骨哉古人卜筮與後世異此理此義至精至微盖有天下舉以為然而不知又有未然者歟八庶徴以天之五氣時與恒驗君之五事休與咎曰雨曰𤾉日曰燠暖曰寒曰風雨暘燠寒風貌言視聽思五者隂陽往來之氣曰時五氣往來之時五者來備皆以時至各以其敘當雨而雨當𤾉而𤾉庶草舉其細則大可知蕃滋廡豐一極備多凶一極無凶來備以敘休徴也極備極無咎徴也曰休君政美徴證驗曰肅貌恭收斂無散慢時雨當雨而雨非淫而也若應順曰乂言從明辯時𤾉若曰哲視明不昧時燠若曰謀聴聦作謀深沈時寒若曰聖思睿化妙時風若各以類應若桴鼔影響也天人豈相逺哉曰咎君政惡徴曰狂顛倒恒雨雨極滋而無陽若曰僭躁急恒𤾉若曰豫逸恒燠若曰急迫切恒寒若曰蒙闇恒風若蒙視聖不啻天壤何為以蒙對聖盖純一未發之蒙能養其正即作聖之功矣曰王省察惟嵗嵗功之成總其綱也卿士惟月月要師尹惟日日成嵗月日時無易易位百穀用以之成乂治象用明修俊賢民用章顯家國家用平康日月嵗時既易百穀用不成乂用昬不明俊民用微卷而懐之家用不寧前所言以天證人此所言以人法天也王總其綱卿士師尹理其目尊卑繁簡不易位則為休否則咎矣庶民民衆惟星如星繁星箕有好風星畢有好雨日月之行度則有冬日進而北月秋西從白道冬北從黑道有夏日退而南月春東從青道夏南從赤道月之從星經箕多風離畢多雨則以風雨星之好無常也日月之行則有常自有體統若不可有所徇也然月之行乃有從星而風雨何也然則安可謂治之自有體統而恝然不從民欲乎一説月失道妄行則風雨九五福一曰夀永年二曰富足財三曰康寧無疾病四曰攸所好徳五曰考成終命父母全而生之子全而歸之六極一曰凶不考終短折不夀二曰疾三曰憂四曰貧五曰惡不好徳六曰弱不能自强順理者自與福㑹逆理者自與極㑹兩開其端所以使民知所趨向也然豈可盡委之民哉董仲舒謂堯舜行徳而民仁夀桀紂行暴而民鄙夭此又人主為民之極者之責也五福不言貴者外物也弱何以與於六極盖學者大患在不能自强於善或牽引於惡而不能自拔者皆懦而無力者也武王既勝殷封封有功諸侯班分賜宗廟彝彞器作分尊卑有分器一書亡旅獒第七周書西旅戎國獻獒犬髙四尺知人心可指使大保召公作旅獒旅獒惟克勝商遂通道路于九夷西八蠻南西旅厎致貢厥獒大保乃作旅獒用訓于王舟車所至霜露所墜莫不來王而旅獻獒焉武王固嘗驅虎豹犀象矣獒奚為而來哉曰嗚呼明古王慎徳慎之一字傳心之法四夷咸賔朝無有逺邇近畢盡獻方各方所生物惟只服食器用無他珍竒王乃昭眀示徳有徳之致所獻方物于異姓之邦若成王分陳以肅慎之矢無使異姓邦無替廢厥服事上之誠分寳玉于伯叔同姓之國若分魯以夏后氏之璜時是庸用展布親親親之義人不易改物惟徳有徳其物物重眀王慎徳以來四夷其所獻自服食器用外無異物也且不以奉一身而公之天下又以至公大同之中必文理宻察而昭徳所致與寳玉之分各有差等焉凡人受其所分之物即明王得之所獻之物初無改易之異然無替服庸展親所以能行乎異姓同姓之邦者惟有徳寓乎其物之中故耳若獒之珍竒則豈逺人所當獻而又豈一人所可昭徳之物哉徳盛徳盛之至動容周旋中禮不狎玩侮慢狎侮君子勞心者罔以盡人心狎侮小人勞力者罔以盡其力不役受役於物耳目心之官為主不為耳目所役百度法度惟貞正玩人以人為玩喪徳䘮己之徳玩物以物為玩喪志物交物則引之矣志豈復能帥氣哉志以道集義寧不助長孟子所謂養氣也言人言以道接接以道則其言不能惑孟子所謂知言也狎侮之病惟盛徳之至者無之下是或不免可不謹乎不作無益害有益功乃成不貴重異竒怪物賤輕用官用物民乃足犬馬非其土本土性不畜養珍異禽竒怪獸不育養于國不寳愛重逺物則逺人格來至也周穆王取白鹿白狼物不至所寳貴惟賢則邇人安自近始人心不可不重用也入此則出彼入彼則出此所作所貴所寳其界限之嚴必如此而後可也嗚呼夙夜罔或不勤此明王慎徳之工夫不矜持細行終累損大徳為山九仞八尺功虧一簣九仞虧於一簣可以獒為細事而不加謹乎允信誠迪蹈行兹生民保厥居惟乃世世世王允迪非姑言之而已兹一念也民業之安王業之所繫焉其本至近其效至逺此召公所以拳拳也巢南方國伯爵來朝慕義而來芮伯王之卿大夫封邑於芮作旅陳玉威徳巢命命巢書亡金縢第八周書武王有疾周公作金縢金縢既克商二年王有疾弗豫和樂二公太公召公曰我其為與王穆敬卜吉凶周公曰未可以使武王戚死近我先王公乃自以為功己事為三壇封土坐北面南以禮太王王季文王同墠除也為壇於南方坐南北面向北周公立焉植璧植三壇以禮三王秉珪秉之手乃告太王王季文王史史官乃冊祝執冊而祝曰惟爾元孫某冊本書武王名史作書諱之代以某遘遇厲危虐暴疾若爾三王是有丕大子武王於文王為子之責疾不可救于天以旦周公名代某之身予仁若考父能多材多藝能事鬼神乃元大孫武王於太王王季曰孫不若旦多材多藝不能事鬼神乃命受命于帝天庭敷布佑助四方用能定安爾子孫于下地四方之民罔不祗畏嗚呼無墜敗天之降寳命我先王亦永長有依托歸今我即就聴命三王命于元大龜爾之許我我其以璧與珪歸俟待爾三王命許代之命爾不許我我乃屏棄璧與珪激切之辭乃卜三龜玉兆瓦兆原兆一習因吉啓開籥鎻見書所蔵之書乃并是吉公曰體兆王其罔害予小子新命受命于三王惟永王長年終終周王業是圖謀兹三王攸俟能念予一人使武王疾瘳公歸乃納蔵冊冊祝于金黄金縢緘縢之匱中王翼次日乃瘳疾愈夀夭定數死何可代或謂周公忠愛所迫不暇顧理非也公之心天也天莫之為而為公之誠意亦莫之為而為於此可以見天命一原之理矣武王既喪疾瘳後四年死管叔及其羣弟武王母弟十人長伯邑考次武王次管叔次周公次蔡叔霍叔周公以冢宰攝政管叔以己為兄而周公以弟居已上與蔡霍挾武庚以叛乃流播言於國曰公将不利於孺子成王幼沖周公乃告二公曰我之弗辟法誅管蔡我無以告我先王不誅管蔡則周室危何以見先王於地下周公居東東征武庚二年不忍速則罪人二叔武庚斯得伏辜于後公乃為詩以貽與王名之曰鴟鴞見詩豳風王雖未盡悟亦未敢誚讓責公秋大熟未穫刈天大雷電以風禾盡偃倒大木斯拔邦人大恐王與大夫盡弁質服以應天以啓金縢之書請命乃得周公所自以為功代武王之説二公及暨王乃問諸史祝史與百執事昔從周公請命者對曰信噫公命我勿敢言王執書以泣曰其勿不必穆卜昔公勤勞王家惟予沖幼人弗及知今天動威以彰顯周公之徳惟朕小子其新逆迎我國家禮亦宜當之王出郊将迎周公天乃雨反回風禾則盡起二公命邦人凡大木所偃拔盡起而築之嵗則大熟天人之際閒不容髮其驗至切也大誥第九周書武王崩三監孔云周分商畿内為三國邶封武庚鄘封管叔衞封蔡叔鄭云管蔡霍三叔監殷及淮夷徐奄之屬叛周公相成王将黜絶殷作大誥大誥王若曰猷大誥爾多邦越爾御事周公攝政以王命告弗弔周道不至天降割凶害于我家不少延長洪大惟思我幼沖人嗣繼無疆限大厯天厯數服五服弗不造作哲迪導民康安矧況曰其有能格至知天命此自歎禍速力小任重也已發端歎辭予惟小子若涉淵深水無津涯予惟往求朕攸濟濟難敷布賁大道夏作賁飾之賁敷布前人受所受命天命兹不忘大功文武創業此言難之當必濟而前人之不可忘也予不敢閉蔵隐于天降威用天威用以征伐寧王孔云安天下之主謂文王也呂云武王遺予我大寳龜國鎮紹繼介天明即就命曰卜言有大艱難事于西土周所都西土人亦不静安越於兹此后蠢果驚動殷武庚小腆厚誕大敢紀經紀其敘舊敘天降威武王崩而管蔡流言知武庚知我周國有疵病也管蔡民不康曰武庚曰予復復商舊業反鄙邊鄙我周邦寳龜即命大誥一篇綱目也事至於天而定矣今蠢今翼次日民獻賢有十夫人予翼輔以于敉安寧定武武事圖所圖功我有大事休美朕卜并吉三龜皆吉十夫予翼卜并吉焉人謀鬼謀之大同也休吉何疑焉夏云前言寳龜武王崩後所卜也此言卜吉将征武庚之初也肆故予告我友順邦君越及尹氏庶官之正庶士上中下士御治事曰予得吉卜予惟以爾庶邦于往伐殷逋竄播亡臣武庚爾庶邦君越庶士御事罔不反曰艱難大民不靜亦惟只在王成王宮邦君周公室越謂予小子考察翼予翼之夫不可征伐武庚王害何不違卜王以卜吉告邦君御事矣而邦君御事顧以艱大為疑至謂民之不安咎在王與周公且謂予翼之夫當察而未可遽信至并卜而欲棄之焉此大誥之所以不得不作也肆予沖人永長思艱艱大之説曰嗚呼允信蠢動鰥寡哀可憐哉予造為天役所使遺内大投畀艱于朕身越於予沖人不卬我自恤邦君艱大之説非也然而有是説予亦長思之矣征伐之舉使鰥夫寡婦思其子從軍誠勞動也然天方役我遺投以艱大之責我雖欲自恤不可得也而豈故欲勞民也哉義以義言之爾邦君越及爾多士尹氏御事綏當安慰予曰無毖勞畏于恤憂不可不成乃寧安民考父孔云寧祖聖考圖功此責以大義言爾當以無毖安慰我而可以艱大疑我乎已予惟小子不敢替廢上帝命東征天命也天休美于寧王興我小邦周百里而有天下寧王惟卜用泰誓朕夢協朕克綏安受兹命今東征天其相助民矧況亦惟卜并吉用此以寧王證卜之不可違也嗚呼天明顯然畏可畏弼助我丕丕基憂勤啓聖多難與邦其降威之可畏乃所以弼其丕基而使之丕丕也而何艱大之疑乎王曰爾惟舊人於邦君御事中提出舊人逮事文武者爾丕大克逺省察爾知寧王若如此勤創業之艱哉天閟塞毖勞我成功所之所予不敢不極卒終寧王圖事寧王之興也亦勞矣則今之閟塞勞毖乃我成功之所也敢以艱大自沮而棄寧王之勤乎肆予大化誘善道我友邦君天棐助我忱辭凡大誥所言字字皆實其考察孔云成我民民歸則天輔予曷何其不于前寧人圖功攸終天亦惟用勤毖我民勞之者所以定之若有疾因疾而慎茹以勞而圖安予曷敢不于前寧人攸所受休休命畢終之我之毖民之毖一也皆天所以畏而弼之也何可疑其畏而不察其為弼乎王曰若如昔前日竊意孔云順古道朕其逝已往朕言亦言艱艱大日日日思深思之故遲至今若考父作室既底定法規模厥子乃弗肯堂為基矧況肯構立屋厥父菑田一嵗厥子乃弗肯播種矧肯穫刈厥考翼已敬其事其肯曰予有後子弗棄基肆故予曷敢不越於卬我敉安寧王大命汝艱大之説我亦遲遲思之矣然終不可已者何也譬之父底法菑矣而子弗堂播焉則父之敬事創業者必以不肖子目之矣肯言其能不棄基乎如此則寧王大命卬何敢不敉也若兄考王周公自喻乃有友喻三監伐厥子喻民民養厮養喻邦君御事其其可勸弗救乎前堂播之喻以自責此民養之喻以責邦君御事王曰嗚呼肆哉鋪陳言爾庶邦君越及爾御事爽明邦國體由用哲明哲之人亦惟十人民獻迪誠意踐履知上帝命越於天棐忱爾時平時罔敢易變敗法大法矧今天降戾罪于周邦惟大艱人三監大艱亂之人誕大鄰近胥相伐于厥室周室爾亦不知天命眷佑不易輕變乎予永念曰天惟喪亡滅殷若如穡夫去草去根予曷敢不終朕畝黜殷所以終畝天亦惟休美于前寧人予曷何待其極究卜敢弗于從從天率循寧人有指意疆土矧今卜并吉肆朕誕大以爾東東面征天命不僭差卜陳列惟若兹天之眷寧王至矣何待卜而後知乎我敢不從以率其疆土也不卜且可無疑況又卜并吉而東征之舉尚何疑乎微子之命第十周書成王既黜殷命殺武庚命微子啓名代代武庚殷後封於宋存湯杞作微子之命史記宋世家武王克商微子啓抱祭器造軍門肉袒面縛左牽羊右抱茅膝行而前以告武王乃釋微子使復位至殺武庚後封之宋微子之命王若曰猷發語辭一云言道以命殷王帝乙元子長子惟稽古封先代後自古皆然崇徳尊湯之徳象賢擇啓之賢統傳緒承繼先王湯修其禮物商之典章文物如尚質尚白作賔待以不臣于王周家與國周咸同休福永世無窮夏尚忠商尚質周尚文黑白赤此稽古也可以觀三代易世至公之意矣周命維新車旗正朔本末數度皆一新矣而宋得獨修商之舊焉消息盈虚如循環殷因夏周因殷其或繼周百世可知先王禮物之不修後聖有作扶捄之用何所稽考自微子至戴公止得商頌十二篇孔子刪詩五篇而已禮物不修之故也後世廢興之際芟夷藴崇惟恐影響之存哀哉嗚呼乃祖成湯克齊一也無不敬聖化也無不通廣大也無不達淵深也不可測皇天眷佑誕受厥命撫民以寛除其邪虐桀功加被于時當時徳垂後裔此崇徳也齊聖廣淵湯之全體如元亨利貞非成王深入閫域不足以識之湯之徳代虐以寛而已傳以謂湯尚嚴商人先罰而後賞豈知治體者哉六百年之基一寛仁耳如霸者之機巧智術加於一時則有之能垂於後乎爾惟踐行修進厥湯猷道舊久有令善聞聲也篤實則輝光恪恭慎克孝肅恭神人此孝道也予嘉美乃汝徳曰篤實不忘不可忘上帝時歆享下民祗協庸用建立爾于上公尹君兹東夏亳在岐東此象賢也欽哉往敷乃訓教慎乃服所行命令一云上公九服之命率循由行典常以蕃屏王室𢎞大乃烈祖湯律齊乃有民永綏厥位毗輔予一人世世享朝徳為善萬邦作式觀法俾我有周無斁厭嗚呼往哉惟休惟為美政無替廢朕命惟休之語從容涵養無一語及武庚之事聖賢所過者化天討天命何心哉殺武庚義氣秋殺也封微子和氣春生也唐叔成王母弟得禾異畝隴同頴穂天以彰成王周公異體同心獻諸天子王命唐叔歸周公于東東山作歸禾一書亡周公既得命王命禾旅陳天子之命作嘉禾一書亡言本君有嘉徳武庚叛而周公出微子封而周公歸尚書詳解卷七
