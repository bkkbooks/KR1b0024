body:
  text: 尚書詳解卷五宋胡士行撰盤庚上第九商書盤庚五遷亳嚻相耿亳將治都亳殷殷亳之别名民咨嗟胥相怨作盤庚三篇耿水圮不容不遷矣然小民安土且耿地沃饒魚鹽利重巨室緫貨浮言摇衆以致咨怨故書以訓之上篇作於未遷時民未悟故其辭切中篇作於將遷時民漸悟故其辭緩下篇作於己遷後民既從故其辭益緩或云上篇告臣中篇告民盤庚盤庚遷于殷民不適之有居殷商之遷屢矣而前數君未聞委曲告諭者風俗日不如前之淳盤庚不臨以勢而訓以書厚之至也率皆籲呼衆慼憂遷之人出矢直言曰我王祖乙來既爰宅于兹耿重我民無盡劉殺不能胥匡正以生卜稽曰其如台盤庚呼怨咨之人而告之曰自祖乙來都耿水圮而未即遷者不忍虔劉我民也然終不能相正以生則不得不遷矣故卜以稽之而曰如我所志也先王有服歴服恪恭謹天命兹猶不常寜不常厥邑于今五邦此引先王以證其不得不遷今不承繼于古湯都亳罔無知天之斷斷然不易命矧況曰其克從先王之烈功天意欲遷斷然矣若不知何以能從先烈乎若顚倒木如耿水圮之有由蘖萌芽復生如遷亳復生天其永長我命于兹新邑亳紹繼復先王湯之大業厎致綏四方遷亳生意之回也京師定則天下定矣盤庚斆敎于民由始從乃在位巨室以常先王以遷舊故服事正法度今日當遷法度曰無或有人敢伏抑遏小人貧民受水害者之攸所箴箴巨室利己之言耿圮而沃不利小民而利巨室故巨室簧鼓小民而抑遏其箴己之言如風邪之痺脉絡故原其受病之處教之自有位始謂遷都自有先王故事以此故事正今日當遷之法度而勿伏小民欲遷之箴焉則巨室從而小民無不從者矣一云攸箴即咨怨之言也不沮抑之川不可防也與後世誹謗妖言之禁異矣王命衆悉盡至進于庭邇近則言易入王若曰格來汝衆予告汝訓汝猷謀黜去乃心私心無傲慢上從康安土遷之利公也不遷之利私也傲康之失皆自私心中來古我先王亦惟圖謀任用舊老成人共政王播布告之修治不匿隱厥指意王用丕大欽敬罔有逸過言民用丕大變化今汝聒聒多言起信險傾膚淺之言予弗知乃汝所訟所言何事非予自荒棄兹徳惟汝含茹徳愛不惕畏予一人予若觀火燎原予亦拙謀始謀不嚴謹作致乃汝逸慢康舊人則不隱先王播告之㫖故王恭已無言而民化矣今汝新進起而唱説言果何為者邪予非欲棄徳而用刑者也而汝含吾徳而不我畏是吾拙謀致汝之逸也此非盤庚眞悔其初之不用刑訓責之辭云耳夏以丕欽為敬舊人若網在綱網索有條理而不紊若農服事田力穡稼乃亦有秋歳汝克黜乃心施實德不遷則浮言遷則實徳于民至于婚姻友僚丕大乃敢大言汝有積德乃不畏戎大毒害于逺邇惰怠農自安不昬黽勉作勞勤不服事田畝越於其罔有黍稷此廣譬曲諭之也網在綱則不從康矣蓋不遷者一時之安此言浮言也豈實徳乎汝能去汝緫貨之私而佐遷焉則實徳及民且至㛰友而我乃言汝眞有積徳矣不然安土如惰農而何有久安之日乎汝不和温吉善言于百姓惟汝自生毒害乃敗禍姦宄以自災于厥身乃既先惡種惡于民乃奉受其恫痛汝悔恨身何及浮言則非吉言矣水圮之害及民則亦及爾身悔可追乎相觀時是憸小民猶胥相顧恤于箴誨言其發有恐有逸失口矧予制專制乃短長之命汝曷何弗告朕而胥動以浮言恐驚沈溺于衆若火之燎于原平野不可嚮邇近其猶尚可撲滅則惟爾衆自作弗靖安非予有咎小民猶恤箴言而恐有口過矧盤庚髙明剛果執賞罰之權而爾可不顧乎火雖燎原尚可撲也曽謂汝浮言之動而不可滅乎至此則罰爾自取而非予咎矣遲任古之賢人有言曰人惟求舊老成器非求舊惟新人與器異古我先王暨及乃祖乃父世臣胥及同逸安勤勞予敢何敢動用非罰不當罪之罪世選擇爾勞功予不掩蔽爾善兹予大享大烝之祭于先王爾祖其從隨與配享之作福福善作災禍淫予亦不敢動用非德不當賞之賞撲滅之説恐疑濫刑也故告以汝舊人之子孫予固不敢濫罰然先王先正臨之在上質之在旁濫刑不可也濫賞亦何可乎若縱浮言而不撲則為非德矣予告汝于難遷都之難若射之有志志精則中如遷有志則成汝無侮老成人老成則知乆安之計而欲遷無弱輕孤有㓜孤㓜則受水之害而欲遷即小人之攸箴者各長謀長于厥居亳勉出乃力聽予一人之作猷遷之謀遷雖難事也有志則竟成矣老成慮逺孤㓜受害皆欲遷者也其唱不遷之浮言者巨室新進而已汝能無侮無弱則能謀長以從上而不從康以傲上徳無有聞逺踈邇親用罪刑伐懲厥死浮言不悛有死之道也用德賞彰顯厥善助遷以施德於民者邦之臧遷而善惟汝衆之功邦之不臧不遷之禍惟予一人有佚故罰凡爾衆其惟致告轉相告自今至于後日各恭敬爾事齊整乃位所居度法乃口罰及爾身弗可悔盤庚一書前半篇涵養寛大後半篇嚴厲整肅反覆抑揚於勤懇中時露賞罰之意使人知有警懼無怙終以罹於罰此有虞明刑無刑意也盤庚中第十商書盤庚作起行惟涉河以民遷乃話話言陳説民之弗率從誕大告用亶信其有衆咸造進勿䙝慢在王庭盤庚乃登上進厥民曰明聽朕言無荒廢失朕命上篇未遷則未動也下篇已遷則既静也惟中篇則將遷將遷則動而未静時也跋涉險阻蒙犯霜露人情倉皇安危存亡所係正在此時故話之進之曰用亶曰明聽所以感化提撕之者尤切嗚呼古我前后罔不惟民之承順保民亦保后前后胥相慼憂鮮少以不浮如舟浮水順通無阻礙于天時殷降下大虐天時之災如嚻相耿皆廹於圮毁先王不懷懷安厥攸所以作起視民利去危就安用遷汝曷弗念我古后之聞后承民民保后后民相恤以順天嚻而相相而耿不敢懷安求民利耳徃事所聞如此汝何不念而疑今日之遷乎承順汝俾使汝遷惟喜康安共非汝有咎比近于罰予若籲呼懷念兹新邑亳亦惟汝故以丕從厥志亳之遷樂與民同其安也豈以殃罰之乎為汝故以從汝志耳豈以徇我之欲乎民不欲遷而以遷為丕從者欲安者民之大欲遷而久安乃所以丕從其欲安之本心其不欲遷乃一時暫蔽於浮言之私耳今予將試以汝遷安定厥邦遷矣而方曰將試辭意之婉厚之至也汝不憂朕心之攸困病乃咸大不宣布乃心欽念以忱動感予一人爾惟自鞠窮自苦若乗舟汝弗濟遲疑中流不急登岸臭腐厥載爾忱不屬聫屬於君惟胥以沈溺不其或稽考遷不遷之利害自徒自怒錮滯忿怒曷何時瘳愈汝不謀長遷為長久之安以思乃災不遷之禍汝誕大勸相勸憂沈溺之憂今其有今苟目前之安罔後後悔無及汝何生生業在上此詳告以不遷之禍也今予命汝一一心從上無起穢以自臭恐人姦人倚依乃身迂曲乃心予迓迎續接乃命于天予豈汝威虐用以奉承畜養汝衆汝心之未一以巨室之倚汝迂汝故也汝信之是自臭耳予之遷則所以續汝命而畜汝者也豈以虐汝乎予念我先神明后之勞亢爾先先祖予丕克羞進用爾用懷念爾然如此失于政當遷之政陳久于兹耿髙后丕乃崇重降罪疾於我曰曷虐沈溺朕商后民汝萬民乃不生生生其生暨與予一人猷謀同心以遷先后丕降與汝罪疾曰曷不暨朕㓜孫盤庚自謂有比同遷故有爽明德自上天其罰汝民汝罔能廸導廸求免以髙后在天之靈儆之殷尚鬼也古我先后既勞乃祖乃父汝共作我畜民養民之官汝有戕則戕民之象在乃心我先后綏安乃祖乃父乃祖乃父乃斷絶棄汝不救乃死兹予有亂治政之人同位在位具聚畜乃貝水蟲古人取其殻為寳如今用錢玉寳乃祖乃父丕乃告我髙后曰作丕刑于朕子孫廸啟髙后丕乃崇降弗祥此言不特髙祖之靈可畏而乃祖父之靈亦可畏也爾巨室職在治民乃不同於利民而惟戀耿之沃饒以為緫貨寳計則我髙后縱以爾祖父舊勞之故不欲降罰以傷其意而乃祖父自不汝救豈特不救且將啓告以降不祥矣嗚呼今予告汝不易注以豉反鄭如字變也永敬永則不止敬於暫大恤大則所恤不在小無胥絶逺不宣乃心踈外於君汝分猷謀念以相從各設立中于乃心敬不永而恤不大則惟緫貨是念而與中相逺矣汝試分汝所謀念者以從我而立中道以觀之則爾之謀不遷以緫貨予之謀遷以利民孰是孰非有定論矣分者不遽責以盡去己見也設中則公見立而私見自去矣乃有不吉善不廸道顚怪越踰不恭暫暫時遇所遇姦宄我乃劓小者劓殄滅大者殄之無遺餘育養無俾易以䜴反又如字變易也種惡種于兹新邑徃哉生生今予將試以汝遷永建立乃家盤庚下第十一商書盤庚既遷奠定厥攸所居民居乃正厥位分都邑立宗廟夏云正君臣之位綏安爰有衆曰無戲狎怠懋勉建大命奠居之始正大命建立之時可戲怠而不懋乎今予其敷布心腹腎腸歴徧告爾百姓于朕志罔罪爾衆爾無共怒協合比分䜛言怨怒予一人事擾無定事定追咎浮言之人寜無以此疑其上故明告之使勿懷疑以蓄怨也古我先王湯將多増于前契功適遷往于山商亳用降下降我凶德嘉美績功于朕邦此言湯居亳以大契之功也今我民用在耿蕩㪚析分離居罔有定極止爾謂朕曷何以震驚動萬民以遷肆故上帝將復我髙祖湯之徳亂治越於我家朕及篤敬篤敬之臣恭承民命用永地于新邑此言耿之圮而天使遷亳也肆予沖㓜人非廢棄厥卿大夫謀不遷之謀弔至由用靈善各非敢違卜用宏大兹賁大業此言遷之非徇己私意也嗚呼邦伯諸侯師長衆官之長六卿也百執事之人小臣尚庶皆隱惻隱哉予其懋勉簡㧞相助爾念敬我衆朕不肩任好貨敢果恭生生生民生之人鞠養人謀人之保安居敘敘用欽敬惻隱心之公也好貨心之私也不任彼而簡相敘欽於此好惡之意明矣今我既羞進告爾于朕志若順惻隱者否不任好貨者罔有弗欽敬從無緫衆于貨寳生生自庸民功曰庸式用敷布民德富而教之民心本然之德永長肩任一心一於民而勿貳於貨予告爾明矣所若所否汝無不欽則無於彼式於此而爾之心一矣向者貪於沃饒之私意盡去而中篇森嚴之令泯矣盤庚以口舌代斧斤其忠厚之至歟説命上第十二商書髙宗夢得説使百工營經求物色諸野得諸傅傅氏巖山險作説命三篇清明在躬志氣如神嗜欲將至有開必先誠則一一則通此周禮所謂正夢也説命王宅居憂喪亮信隂黙不言三祀年既免除喪其惟弗言當言而不言不敢易其言也羣臣咸諫于王曰嗚呼知之先知先覺曰明哲明之至明哲實作為則天下法覺後知後覺天子繼天作子惟君主萬邦百官承奉式法王言惟作命不言臣下罔無攸所禀承受令命此臣庶引領側耳以聽維新之令也蓋髙宗識見之髙固有隱然動人於不言之表者矣王庸用作書猶不言以誥曰以台我正表正于四方怠恐德弗𩔖與天地合德日月合明四時合序鬼神合吉凶所謂類也兹故所以弗言恭黙思道夢帝賚與予良賢弼相其代予言恭敬也黙用志不分也思道沈潛思慮玩索天下至理所在也心純不二則與天接矣乃審度厥象夢所見俾以形畫旁求于天下説名築傅巖之野傅巖在虞虢之界有㵎水壞道常使胥靡人築護之說賢而隐代胥靡築以供食胥相靡隨也相隨坐輕刑之名惟肖似爰於立作相王置諸其左右髙宗以一夢傅說一匹夫相位之重授受無留難髙宗必有以信說者而說亦必有以自信者矣命之曰朝夕納誨以輔台德工夫相續不可頃刻間斷也若金用汝作礪若濟巨大川用汝作舟楫若歲大旱用汝作霖雨雨三日為霖啓開乃汝心沃如水沃物朕心若藥弗瞑眩服之憒眊厥疾弗瘳愈若跣徒跣行弗視地厥足用傷金濟川大旱一節切於一節渴想之至也則說可不開誠以沃之乎瞑眩苦口之言也視欲說之作朕目也以髙宗之明哲而凛然以弗視傷足自處聖不自聖眞見輔德之不可無人也一說以作礪為治己舟楫為濟難霖雨為澤民惟暨乃僚屬罔不同心以匡正乃辟君俾使君率循先王廸蹈行我髙后以康兆民此欲其率屬佐王也嗚呼欽予時是命納誨之命其惟有終髙宗傅說之㑹遇可謂一時之懿矣善終之在說深體此納誨之命而已說復還白于王曰惟木從繩則正后從諫則聖后克聖臣不命命納誨其承奉疇誰敢不祗若王之休命髙宗欲說欽其命以納誨然臣之諫不諫不在乎君之命不命顧其從不從如何耳后之從諫能如木之從繩則主聖臣直雖無納誨之命而自承其從諫之意矣況有命而誰敢不從乎蓋髙宗欲責之人而說則使求之已也說命中第十三商書惟說命緫百官乃進告于王曰周官冢宰統百官此說受命居相位也嗚呼明王奉若順天道建立邦國設立都邑樹立后王天子君公諸侯承奉以大夫卿師長衆官之長不惟逸怠豫樂惟以亂民此原上天立君之意使知天子諸侯卿大夫所以上下相承者皆以為民而非以為逸豫之資惟天聦明無不聞無不見惟聖君時是憲法惟臣欽若順惟民從乂治聖之明哲即天之聦明也憲者充之使與天相似也人無所不至惟天不容偽聖人所以服人者曰天而已惟口樞機榮辱之主起兆羞言之失豪釐而羞辱彌滿散布不可收拾惟甲胄止以自衛起戎已有召戎之端惟衣裳服以章德在笥藏之笥未用之時當謹惟干戈以伐罪省察厥躬吾身無瑕乃可戮人王惟戒謹兹允信兹克明乃罔不休美此憲天聦明之條目也天之聦明曰命德討罪而已口方言之耳甲胄以自衛耳而羞戎且自此起焉況服之章刑之討顯然加之人而可不謹乎王能戒此則信克明矣克明即聦明之明也日月在天無不照若顯之照而幽之遺何足為明老氏談聦明多於虚空言之聖人之論聦明皆求之實如口甲胄衣裳干戈皆事為之粗也理無精粗粗者不蔽則精者洞然矣其設施何往而不休哉夏云以出於口為命一命再命三命皆口也口起羞故衣裳當在笥甲胄起戎故干戈當省躬吕云上二事人加諸我不可不防下二事我加諸人不可不謹惟治亂在庶官賢邪官任以事不及私愛昵近惟其能才爵王制論定而後官之任官而後爵之罔及惡德惟其賢徳官爵天所有出於私意則非天意矣慮思善事之理以動動惟厥時時措之宜善理也時幾也善必適時則善為有用如夏葛冬裘各當其可也有其善喪厥善矜其能喪厥功有之矜之則招損而非天道矣惟事事乃其有備先備有備無患一日二日萬幾事事非一事也或云事其事也無啓開寵嬖納取侮玩無恥諱過作非君尊如天孰敢侮之倖門開而朝廷不尊是自納之也過而更如日月焉何恥之有諱之増一過也歸之人又増一過也非自此日作矣惟厥攸居心所止政事惟醇醇粹不雜前所言皆憲天之事而此其本原也於止知其所止則心無非天而大政小事焉有雜之以人欲之私者乎黷煩數于祭祀時是謂弗欽禮祭煩則亂事神則難髙宗篤於奉先典祀豐昵皆持心之厚觀過可以知仁者也然禮天所秩何可増加故說即救之王曰㫖得味之美哉說乃汝言惟服佩服而行乃不良善于言予罔聞于行說拜稽首曰非知㫖哉則深知之矣之艱行之惟艱王忱誠不艱允協于先王成德惟說不言有厥咎過髙宗味說之言而欲行之且謂非說言之善則無可行也其知說至矣然說不喜其知而懼其不力行必王之誠而於行之難者不難以協先德焉乃自任不言之咎豈若襟量淺狹者一言遇主遽哆然自喜以為至足者哉說命下第十四商書王曰來汝說台小子舊學于甘盤既乃遯盤退處于荒野至荒野求之入宅于河入宅河涘自河自河求之徂亳又往亳矣暨及厥終後罔顯遂蹤跡泯没不復明爾惟訓于朕志髙宗聞惟艱之論講學益切悵甘盤之已去而期傅說於方來也孔云荒野河亳皆髙宗舊勞于外之事蓋髙宗父小乙欲髙宗知民艱苦使居民間故廢業而遂無顯明之德若作酒醴爾惟麴糵麴多則苦糵多則甘若作和調羮爾惟鹽鹹梅酸此作聖之喻也醴未成米水而已羮未和牲牢而已人之身百體皆備然非親善人以成就之亦天地間一物耳一説苦鹹酸相濟而成猶君臣剛柔相濟而成一説麴糵以發其未有鹽梅以和其已有爾交左右前後修輔予罔予棄如甘盤去我予惟克邁行乃訓敎此以終酒醴和羮之説也吕云交修者斆學相長互相發明也説曰王人求多聞時是惟建事學于古訓乃有獲得事不師法古以克永長世匪非説攸所聞王人為君之人猶君人也人君求聞之富豈以助文辭為觀美哉立天下之大經彌綸天下之大化而至於賛天地之化育所謂建事也然聞之多豈無邪正得失雜進者必以先王之格言大訓正之乃有得無失而可以必卜世卜年之長矣反是則匪攸聞者嚴其辭以明理之必無也惟學講學遜謙順虚志務專力時時時敏勤厥修進乃來源源自生允信懷念于兹念此不外用其心道積充實于厥躬惟斆教人學受教半教止一半猶一半待學者自悟如舉一反三聞一知二也念終始終而又始典常于學厥德修罔不覺知監視于先王成已成憲法其永長無愆此言道學之無窮也遜敏以來矣未也必允懷以積焉猶未也必斆學終始以罔覺焉猶未也必監先王以永無愆焉來有諸己也積充實之謂美也罔覺聖不可知之神也學至聖極矣而聖不自聖自聖則自用矣寜無愆乎惟既聖之餘方舉其終身而得之者置之若無之地則學問之道始粹罔愆德之至難也臯陶止曰帝德罔愆吕云徐行後長言道最近為學當辨此心升降心一升則髙傲滿假去桀紂之路不逺矣一降則卑遜退抑去堯舜之路不逺矣時敏者出入起居夢覺動静無非天命流行來如井泉愈汲愈來馴致日新又新之地源源自生也道我固有非自外來本未嘗散何以謂積蓋是心長存無間則道自參㑹貫通否則道自道我自我矣夏云積有迹罔覺則化而無迹惟説式克欽承旁招求俊乂列于庶位此説求賢而相與輔成聖學於無窮也吕云髙宗能如上所陳説乃能承意求賢心正而後四體可舉也王曰嗚呼説四海之内咸仰朕德時此乃汝風化德即前云來積罔覺罔愆者也舉仰德之功而歸之傅説風化之妙此髙宗遜志而望説之切也股足肱手惟人良臣惟聖人以體之全而成猶君以臣之良而聖主聖則風化之妙所由出也昔先正大臣保衡伊尹作興起我先王乃曰予弗克俾使厥后惟為堯舜其心愧恥若撻于市一夫不𫉬則曰時是予之辜罪佑助我烈有功祖格感于皇天爾尚庶明精白保輔予罔俾阿衡專獨美有商此以伊尹自任之重望説也惟后非賢不乂致治惟賢非后得君不食苟禄其爾克紹繼乃辟于先王永綏安民后賢相遇之難而髙宗與說適相值焉此興治之大機㑹也紹辟綏民於此時不能待何時邪說拜稽首曰敢對荅揚稱天子之休命敢之一辭說之自任其尹乎君臣之立志如此商其興乎髙宗肜日第十五商書髙宗祭成湯有飛雉升鼎耳而雊鳴祖己訓諸王作髙宗肜日髙宗之訓二書一序一書亡髙宗肜日髙宗肜日祭之明日又祭商曰肜周曰繹越有雊雉災異有二無道之君與天地隔絶其應常遲賢君誠與天地合為一體情性之差少有過失災異立應髙宗夢帝憲天精神與天地通久矣豐昵之過說前言之然人之過偏於過厚處難變此所以有雊雉之異也祖己曰惟先格正王正乃正厥事此孟子所謂先攻其邪心也孔以為言古先格王正事弭災乃訓于王曰惟天監視下民典常在厥義理降天年民有永善則降祥有不永不善降殃非天夭短絶民民中自中道絶命不義以絶其命民有不若順德不聽服罪天既孚信命降災異以警戒正救厥德乃曰其如台天如我何民不畏孚命之正是自絶其命也欲格君心乃言民事言在彼戒在此也嗚呼王司主敬民罔非天𦙍嗣子典祀無豐厚于昵代天理民若祖父皆天子也豈祖踈而父親乎豐于昵焉冝雉之不虚來也西伯戡黎第十六商書殷始咎紂不責己而責人周周人乗伐黎地近王畿輔紂為惡祖伊恐民歸周則商亡奔告于受作西伯戡黎文王脫羑里之囚紂賜之弓矢鈇鉞使專征伐其乗黎乃方伯之職其事君之小心則自若特紂増其惡而文増其德所以見咎惡而祖己以此占商周之興亡而恐也吕云西伯武王非文王也西伯戡黎西伯既戡黎祖伊恐奔告于王曰天子驚呼天既訖盡我殷命格至人元大龜占罔敢知吉非先王不相助我後人惟王淫戲用自絶故天棄我不有康安食不虞度天性不廸行率由典彛常今我民罔弗欲喪曰天曷不降威大命不何不摯猛今王其如台此時日曷喪之謂王曰嗚呼我生不有命在天聖人猶曰命靡常紂乃曰有命在天眞亡國之言也祖伊反出曰嗚呼乃罪多參列見在上天乃能責命于天殷之即喪指示乃紂功所成之事不無戮誅于爾邦㣲子第十七商書殷既錯亂天命㣲子紂庶兄作誥父師太師箕子少師比干史記紂母生㣲子時尚為妾改為妻而生紂紂父帝乙欲立㣲子太史曰有妻之子不可立妾之子乃立紂紂不可告而相與私議於家時事可知矣㣲子微子若曰父師少師殷其弗或庶亂治正四方我祖湯厎致行遂成功陳列于上上世我紂用沈溺酗惡于酒用亂敗厥德于下後殷民罔不小大無小無大好草苟且竊盜姦外宄内卿士在位師師相師非度法凡有辜罪乃罔恒獲敗獲紂為逋逃主有罪者皆倚貴戚避罪法無所施小民方興起相為敵鬬讎今殷其淪没喪若涉大水其無津渡處涯岸殷遂喪越至于今曰父師少師我其發出狂憂悶如狂疾吾家殷耄昏亂遜遯于荒野今爾無指意告一言予顚隕隮墜若之何其此微子見殷將亡無所措躬哀痛之至以告二子也父師若曰王子㣲子帝乙長子天毒酷降災荒亂殷邦方興起沈酗于酒乃罔畏畏畏所當畏咈逆其耇老長尊舊有位人賢今殷民乃攘取竊盗神天祇地之犧色全牷體全牲生殺用器實以容相容將食無災罪降下監視殷民用乂用從治者讎結怨斂聚斂召招敵讎不怠為不善惟日不足罪合于一同惡相濟多瘠窮民罔無詔詔救商今其有災我興起受當其敗商其淪喪我罔為臣僕決不為他人臣僕詔告王子出出去廸合道我舊云刻不出紂必害之子王子弗出我商乃顚隮不祀自各靖謀自安之理人自各獻告于先王我不顧問行去遯退微子嘗欲為帝乙所立盡言則為紂所疑害故去以存宗祀箕子比干則可罄其忠諫者也故微子抱祭器歸周而箕子囚比干死各盡其道求無愧於先王而已此其所以為三仁歟尚書詳解卷五
